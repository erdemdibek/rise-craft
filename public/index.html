<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>HAİN 3D LOBBY</title>
<style>
html,body{margin:0;background:#111;color:white;overflow:hidden;font-family:Arial}
#ui{position:absolute;top:10px;left:10px;z-index:9}
#panel{position:absolute;bottom:0;width:100%;background:#000c;padding:10px}
button,input{font-size:16px;margin:3px}
canvas{display:block;width:100%;height:100%}
#joystick{position:absolute;bottom:80px;left:30px;width:120px;height:120px;border-radius:50%;background:#2227;display:none;touch-action:none;}
#joystickThumb{position:absolute;width:50px;height:50px;background:#0f07;border-radius:50%;top:35px;left:35px;}
</style>
</head>
<body>
<div id="ui">
<input id="name" placeholder="İsmin">
<button id="joinBtn">Lobiye Katıl</button>
<button id="readyBtn">Hazır</button>
</div>
<canvas id="game"></canvas>
<div id="panel"></div>
<div id="joystick">
  <div id="joystickThumb"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let me = null;
let players = {};
let machines = [];
let role = null;
let time = 300;
let sabotage = null;

let moveX = 0, moveY = 0;

// Joystick mobil
const joystick = document.getElementById("joystick");
const thumb = document.getElementById("joystickThumb");
let dragging=false, startX=0,startY=0;

document.getElementById("joinBtn").onclick = ()=>{
  const name = document.getElementById("name").value;
  if(!name)return alert("İsim girin!");
  socket.emit("joinLobby",{name},(res)=>{
    if(res.error) alert(res.error);
    else machines=res.machines;
  });
};

document.getElementById("readyBtn").onclick = ()=>{
  socket.emit("playerReady");
};

socket.on("lobbyUpdate",data=>{
  players=data.players.reduce((a,c)=>{a[c.id]=c; return a;},{});
});

socket.on("gameStart",data=>{
  players=data.players;
  machines=data.machines;
  me = players[socket.id];
  joystick.style.display="block";
  alert("Oyun başladı!");
});

socket.on("state",data=>{
  players=data.players;
  sabotage=data.sabotage;
  time=data.time;
  me = players[socket.id];
});

socket.on("sabotage",s=>{
  sabotage=s;
  if(s) panel.innerHTML="⚠️ Sabotaj başladı!";
  else panel.innerHTML="";
});

socket.on("time",t=>time=t);

socket.on("gameEnd",msg=>{
  alert(msg);
  panel.innerHTML="";
  joystick.style.display="none";
  me=null;
});

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // Harita
  ctx.fillStyle="#222";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Makineler
  machines.forEach(m=>{
    ctx.fillStyle="#666";
    ctx.fillRect(m.x-50,m.y-30,100,60);
    ctx.fillStyle="#0f0";
    ctx.fillText(m.name||m.n,m.x-40,m.y-40);
  });

  // Oyuncular
  Object.values(players).forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,20,0,2*Math.PI);
    ctx.fillStyle=p.color||"#f00";
    ctx.fill();
    ctx.fillText(p.name,p.x-20,p.y-30);
  });

  // Zaman ve sabotaj
  ctx.fillStyle="#fff";
  ctx.fillText("⏱ "+time,20,30);
  if(sabotage) ctx.fillText("⚠️ "+sabotage,200,30);

  requestAnimationFrame(draw);
}
draw();

// Klavye hareket
document.addEventListener("keydown",e=>{
  if(!me)return;
  if(e.key==="w") me.y-=10;
  if(e.key==="s") me.y+=10;
  if(e.key==="a") me.x-=10;
  if(e.key==="d") me.x+=10;
  socket.emit("move",{x:me.x,y:me.y});
});

// Joystick hareket
joystick.addEventListener("touchstart",e=>{
  dragging=true;
  startX=e.touches[0].clientX;
  startY=e.touches[0].clientY;
});
joystick.addEventListener("touchmove",e=>{
  if(!dragging || !me) return;
  const dx=e.touches[0].clientX-startX;
  const dy=e.touches[0].clientY-startY;
  me.x+=dx*0.5; me.y+=dy*0.5;
  socket.emit("move",{x:me.x,y:me.y});
  thumb.style.left=35+dx+'px';
  thumb.style.top=35+dy+'px';
});
joystick.addEventListener("touchend",e=>{
  dragging=false;
  thumb.style.left="35px";
  thumb.style.top="35px";
});
</script>
</body>
</html>
