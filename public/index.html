<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>HAİN</title>

<style>
html,body{
  margin:0;
  background:#111;
  color:#fff;
  overflow:hidden;
  font-family:Arial;
}
#ui{
  position:absolute;
  top:10px;left:10px;
  z-index:10;
}
button,input{font-size:16px;margin:3px}
canvas{display:block}

#overlay{
  position:fixed;
  inset:0;
  background:#000d;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:99;
  text-align:center;
}

#joystick{
  position:fixed;
  left:30px;
  bottom:30px;
  width:140px;
  height:140px;
  border-radius:50%;
  background:#3338;
  touch-action:none;
  z-index:20;
  display:none;
}
#stick{
  position:absolute;
  left:45px;top:45px;
  width:50px;height:50px;
  border-radius:50%;
  background:#0f08;
}
</style>
</head>

<body>

<div id="overlay"></div>

<div id="ui">
  <input id="name" placeholder="İsmin">
  <button id="joinBtn">Lobiye Katıl</button>
  <button id="readyBtn" style="display:none">Hazır</button>
  <div id="role"></div>
  <div id="actions"></div>
</div>

<canvas id="game"></canvas>

<div id="joystick">
  <div id="stick"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* ================= SOCKET ================= */
const socket = io();

/* ================= FULLSCREEN ================= */
function goFullscreen(){
  const el=document.documentElement;
  if(el.requestFullscreen) el.requestFullscreen();
  else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}
function ensureLandscape(){
  if(innerWidth>innerHeight) goFullscreen();
}
addEventListener("orientationchange",()=>setTimeout(ensureLandscape,300));
addEventListener("click",ensureLandscape);

/* ================= CANVAS ================= */
const canvas=game;
const ctx=canvas.getContext("2d");
function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
addEventListener("resize",resize);
resize();

/* ================= STATE ================= */
let me=null, players={}, machines=[];
let cam={x:0,y:0};
let meeting=false;
let myRole=null;

/* ================= UI ================= */
joinBtn.onclick=()=>{
  const n=name.value.trim();
  if(!n) return alert("İsim gir");

  socket.emit("joinLobby",{name:n},res=>{
    if(res?.error) return alert(res.error);
    joinBtn.style.display="none";
    name.style.display="none";
    readyBtn.style.display="inline-block";
    ensureLandscape();
  });
};

readyBtn.onclick=()=>{
  socket.emit("playerReady");
  readyBtn.disabled=true;
};

/* ================= SOCKET EVENTS ================= */
socket.on("lobbyUpdate",d=>{
  players={};
  d.players.forEach(p=>players[p.id]=p);
  machines=d.machines;
  me=players[socket.id];
});

socket.on("rolesAssigned",list=>{
  const r=list.find(x=>x.id===socket.id);
  if(r){
    myRole=r.role;
    role.innerText="ROL: "+r.role;
  }
});

socket.on("gameStart",d=>{
  players={};
  d.players.forEach(p=>players[p.id]=p);
  machines=d.machines;
  me=players[socket.id];
  joystick.style.display="block";
});

socket.on("state",d=>{
  players={};
  d.players.forEach(p=>players[p.id]=p);
  me=players[socket.id];
});

socket.on("machinesUpdated",m=>machines=m);

socket.on("playerKilled",id=>{
  if(players[id]) players[id].alive=false;
});

socket.on("meeting",()=>{
  meeting=true;
  openMeeting();
});

socket.on("meetingEnd",()=>{
  meeting=false;
  overlay.style.display="none";
});

socket.on("playerEjected",id=>{
  if(players[id]) players[id].alive=false;
});

socket.on("gameEnd",msg=>{
  alert(msg);
  location.reload();
});

/* ================= MEETING ================= */
function openMeeting(){
  overlay.innerHTML="<h2>ACİL TOPLANTI</h2>";
  Object.values(players).filter(p=>p.alive).forEach(p=>{
    if(p.id!==socket.id){
      const b=document.createElement("button");
      b.innerText=p.name;
      b.onclick=()=>socket.emit("vote",{voteFor:p.id});
      overlay.appendChild(b);
    }
  });
  overlay.style.display="flex";
}

/* ================= GAME LOOP ================= */
function clamp(){
  if(!me) return;
  me.x=Math.max(20,Math.min(2000-20,me.x));
  me.y=Math.max(20,Math.min(1200-20,me.y));
}

function draw(){
  if(me){
    cam.x=Math.max(0,Math.min(2000-canvas.width,me.x-canvas.width/2));
    cam.y=Math.max(0,Math.min(1200-canvas.height,me.y-canvas.height/2));
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#222";
  ctx.fillRect(-cam.x,-cam.y,2000,1200);

  machines.forEach(m=>{
    ctx.fillStyle=m.broken?"#800":"#555";
    ctx.fillRect(m.x-40-cam.x,m.y-25-cam.y,80,50);
  });

  Object.values(players).forEach(p=>{
    if(!p.alive) return;
    ctx.beginPath();
    ctx.arc(p.x-cam.x,p.y-cam.y,20,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.fill();
    ctx.fillText(p.name,p.x-15-cam.x,p.y-25-cam.y);
  });

  requestAnimationFrame(draw);
}
draw();

/* ================= JOYSTICK ================= */
let joy=false,jx=0,jy=0,sx=0,sy=0;
joystick.addEventListener("touchstart",e=>{
  joy=true;
  sx=e.touches[0].clientX;
  sy=e.touches[0].clientY;
});
joystick.addEventListener("touchmove",e=>{
  if(!joy||!me||meeting) return;
  jx=Math.max(-40,Math.min(40,e.touches[0].clientX-sx));
  jy=Math.max(-40,Math.min(40,e.touches[0].clientY-sy));
  stick.style.left=45+jx+"px";
  stick.style.top=45+jy+"px";
});
joystick.addEventListener("touchend",()=>{
  joy=false;jx=jy=0;
  stick.style.left="45px";
  stick.style.top="45px";
});

setInterval(()=>{
  if(!me||meeting) return;
  me.x+=jx*0.08;
  me.y+=jy*0.08;
  clamp();
  socket.emit("move",{x:me.x,y:me.y});
},50);
</script>
</body>
</html>
