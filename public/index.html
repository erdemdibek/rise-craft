<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>HAİN 3D</title>
<style>
html,body{margin:0;overflow:hidden;background:#111;color:white;font-family:Arial}
#ui{position:absolute;top:10px;left:10px;z-index:9}
#panel{position:absolute;bottom:0;width:100%;background:#000c;padding:10px}
button,input{font-size:16px;margin:3px}
canvas{display:block}
#fs{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000}
#joystick{position:absolute;bottom:80px;left:50px;width:100px;height:100px;border-radius:50%;background:#3338;touch-action:none;}
#stick{position:absolute;top:30px;left:30px;width:40px;height:40px;border-radius:50%;background:#f55;}
</style>
</head>
<body>

<div id="fs"><button onclick="goFS()">▶ TAM EKRAN BAŞLAT</button></div>

<div id="ui" style="display:none">
<input id="name" placeholder="İsmin">
<button onclick="joinLobby()">Lobiye Katıl</button>
<button onclick="startGame()">Başlat</button>
<button onclick="voteStart()">Oylama</button>
</div>

<div id="panel"></div>
<div id="joystick"><div id="stick"></div></div>
<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io();
const c=document.getElementById("game"),ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;

let players={},me=null,role=null,time=0,sabotage=null;
let cam={x:0,y:0};
let machines=[];
let joystick={x:0,y:0,stickX:50,stickY:50};

function goFS(){document.documentElement.requestFullscreen();fs.style.display="none";ui.style.display="block";}

function joinLobby(){
  const n=document.getElementById("name").value;
  if(!n) return alert("İsim girin");
  socket.emit("joinLobby",{name:n});
}

function startGame(){socket.emit("startGame");}
function voteStart(){socket.emit("voteStart");}

socket.on("lobbyUpdate", list=>{
  players={};
  list.forEach(p=>{
    players[p.id]={...p};
    if(socket.id===p.id) me=players[p.id];
  });
});

socket.on("gameStart", m=>{
  machines=m.map((n,i)=>({n,x:150+200*(i%5),y:150+200*Math.floor(i/5)}));
  role=me.role;
  alert("Oyun başladı! Rolünüz: "+role);
});

socket.on("sabotageStart", s=>{sabotage=s;panel.innerHTML="⚠️ SABOTAJ: "+s;});
socket.on("sabotageEnd", ()=>sabotage=null);
socket.on("voteStart", ()=>panel.innerHTML="🗳️ OYLAMA BAŞLADI");
socket.on("voteFail", ()=>alert("❌ HATALI OYLAMA"));
socket.on("gameEnd", m=>alert(m));

document.getElementById("joystick").addEventListener("touchmove", e=>{
  e.preventDefault();
  const t=e.touches[0];
  joystick.x = Math.max(-50,Math.min(50,t.clientX - joystick.offsetLeft -50));
  joystick.y = Math.max(-50,Math.min(50,t.clientY - joystick.offsetTop -50));
  document.getElementById("stick").style.left=50+joystick.x+"px";
  document.getElementById("stick").style.top=50+joystick.y+"px";
});

function task(){
  panel.innerHTML="🛠️ Yapılıyor...";
  setTimeout(()=>{
    socket.emit("taskDone");
    panel.innerHTML="";
  },1500);
}

document.addEventListener("keydown", e=>{
  if(e.key==="e"){
    const m=machines.find(m=>Math.hypot(me.x-m.x,me.y-m.y)<50);
    if(m) panel.innerHTML=`🔧 ${m.n}<br><button onclick="task()">Görev Yap</button>`;
  }
  if(e.key==="s" && role==="HAIN") socket.emit("sabotage","Rastgele Makine");
  if(e.key==="f") socket.emit("fix");
});

function clamp(){if(!me) return; me.x=Math.max(20,Math.min(me.x,c.width-20)); me.y=Math.max(20,Math.min(me.y,c.height-20));}

function draw(){
  if(!me) return requestAnimationFrame(draw);
  me.x+=joystick.x*0.1; me.y+=joystick.y*0.1; clamp();
  cam.x=me.x-c.width/2; cam.y=me.y-c.height/2;

  ctx.fillStyle="#111"; ctx.fillRect(0,0,c.width,c.height);

  // makineler
  machines.forEach(m=>{
    ctx.fillStyle="#333";
    ctx.fillRect(m.x-50-cam.x,m.y-30-cam.y,100,60);
    ctx.fillStyle="#0f0";
    ctx.fillText(m.n,m.x-45-cam.x,m.y-40-cam.y);
  });

  // oyuncular
  Object.values(players).forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x-cam.x,p.y-cam.y,15,0,7);
    ctx.fillStyle=p.color;
    ctx.fill();
    ctx.fillText(p.name,p.x-20-cam.x,p.y-20-cam.y);
  });

  ctx.fillText("⏱ "+time,20,20);
  if(sabotage) ctx.fillText("⚠ "+sabotage,200,20);

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
