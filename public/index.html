<!-- Önemli kısımlar admin ve hazır sistemi güncellendi -->
<div id="lobby">
  <input id="nameInput" placeholder="İsmin">
  <button id="joinBtn">Katıl</button>
  <button id="readyBtn" style="display:none">Hazır</button>
  <button id="startGameBtn" style="display:none">Oyunu Başlat</button>
  <div id="playerList"></div>
</div>

<script>
const socket = io();
let me = null, players = {};

const joinBtn = document.getElementById("joinBtn");
const readyBtn = document.getElementById("readyBtn");
const startGameBtn = document.getElementById("startGameBtn");
const playerListDiv = document.getElementById("playerList");

// Join
joinBtn.onclick = () => {
  const name = document.getElementById("nameInput").value;
  socket.emit("joinLobby",{name}, r => {
    if(r.error) return alert(r.error);
    joinBtn.style.display="none";
    document.getElementById("nameInput").style.display="none";
    readyBtn.style.display="inline";
    me = {id: socket.id, isAdmin: r.isAdmin};
    if(screen.orientation) screen.orientation.lock('landscape').catch(()=>{});
    if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
  });
};

// Ready
readyBtn.onclick = () => {
  socket.emit("playerReady");
};

// Admin Start
startGameBtn.onclick = () => {
  if(!me?.isAdmin) return;
  socket.emit("startGame");
};

// Lobby Update
socket.on("lobbyUpdate", d => {
  players = {};
  d.players.forEach(p => players[p.id] = p);
  me = players[socket.id] || me;
  updateLobby();
});

function updateLobby(){
  playerListDiv.innerHTML = "";
  Object.values(players).forEach(p => {
    const d = document.createElement("div");
    d.innerText = `${p.name} - ${p.ready?"✔️":"❌"}${p.isAdmin?" (Admin)":""}`;
    playerListDiv.appendChild(d);
  });

  // Admin ve tüm oyuncular hazırsa butonu göster
  const allReady = Object.values(players).every(p=>p.ready);
  if(me?.isAdmin && allReady) startGameBtn.style.display="inline";
  else startGameBtn.style.display="none";
}
</script>
