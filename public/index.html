<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>HAİN</title>
<style>
html,body{margin:0;background:#111;color:#fff;overflow:hidden;touch-action:none}
#ui{position:absolute;top:10px;left:10px;z-index:10}
button,input{font-size:16px}
canvas{display:block}
#joystick{position:fixed;left:30px;bottom:30px;width:120px;height:120px;border-radius:50%;background:#3338;display:none}
#stick{position:absolute;left:35px;top:35px;width:50px;height:50px;border-radius:50%;background:#0f08}
#tasks{position:absolute;top:10px;right:10px;color:#0f0;font-size:16px}
#hint{position:absolute;bottom:120px;left:50%;transform:translateX(-50%);color:#ff0;font-size:16px}
#cooldown{position:absolute;top:40px;right:10px;color:#f55;font-size:14px}
#minimap{position:absolute;bottom:10px;right:10px;width:150px;height:150px;background:#0008;border:1px solid #fff}
</style>
</head>
<body>

<div id="ui">
  <input id="nameInput" placeholder="İsmin">
  <button id="joinBtn">Lobiye Katıl</button>
  <button id="readyBtn" style="display:none">Hazır</button>
  <div id="role"></div>
</div>

<div id="tasks">Görev: 0</div>
<div id="cooldown"></div>
<div id="hint"></div>

<canvas id="game"></canvas>
<div id="joystick"><div id="stick"></div></div>
<canvas id="minimap"></canvas>

<div id="actionButtons" style="position:absolute;bottom:30px;right:30px;display:none;z-index:10">
  <button id="fixBtn">E: Görev</button>
  <button id="killBtn">Q: Öldür</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const minimap = document.getElementById("minimap");
const minimapCtx = minimap.getContext("2d");

const tasksDiv = document.getElementById("tasks");
const hintDiv = document.getElementById("hint");
const cooldownDiv = document.getElementById("cooldown");

let me=null, players={}, machines=[], lobby=null;
let camX=0, camY=0;

const MAP_W = 2000;
const MAP_H = 1200;
const VISION_OPERATOR = 180;
const VISION_HAIN = 260;

/* === RESIZE === */
function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

/* === FULLSCREEN === */
function goFullscreen(){
  document.documentElement.requestFullscreen?.();
  screen.orientation?.lock("landscape").catch(()=>{});
}

/* === JOIN === */
joinBtn.onclick=()=>{
  socket.emit("joinLobby",{name:nameInput.value},res=>{
    if(res.error) return alert(res.error);
    goFullscreen();
    joinBtn.style.display="none";
    nameInput.style.display="none";
    readyBtn.style.display="inline";
  });
};
readyBtn.onclick=()=>{
  socket.emit("playerReady");
  readyBtn.disabled=true;
};

/* === SOCKET === */
socket.on("lobbyUpdate",d=>{
  lobby=d;
  d.players.forEach(p=>players[p.id]=p);
  machines=d.machines;
  me=players[socket.id];
});

socket.on("rolesAssigned",r=>{
  const m=r.find(x=>x.id===socket.id);
  if(!m) return;
  role.innerText="ROL: "+m.role;
  killBtn.style.display=m.role==="Hain"?"inline":"none";
});

socket.on("gameStart",()=>{
  joystick.style.display="block";
  actionButtons.style.display="block";
});

socket.on("state",d=>{
  d.players.forEach(p=>{
    players[p.id]?Object.assign(players[p.id],p):players[p.id]=p;
  });
  me=players[socket.id];
  tasksDiv.innerText="Görev: "+(me?.tasksCompleted||0);

  if(me?.role==="Hain" && me.killCooldown>0){
    cooldownDiv.innerText="Kill CD: "+me.killCooldown;
  }else cooldownDiv.innerText="";
});

socket.on("machinesUpdate",m=>machines=m);
socket.on("playerKilled",id=>players[id]&&(players[id].alive=false));
socket.on("gameEnd",msg=>alert(msg));

/* === DRAW LOOP === */
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!me) return;
  camX=me.x-canvas.width/2;
  camY=me.y-canvas.height/2;

  /* --- FOG OF WAR --- */
  ctx.save();
  ctx.fillStyle="rgba(0,0,0,0.9)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.globalCompositeOperation="destination-out";
  const vision = me.role==="Hain"?VISION_HAIN:VISION_OPERATOR;
  ctx.beginPath();
  ctx.arc(me.x-camX, me.y-camY, vision, 0, Math.PI*2);
  ctx.fill();
  ctx.globalCompositeOperation="source-over";
  
  /* --- MACHINES --- */
  machines.forEach(m=>{
    if(Math.hypot(m.x-me.x,m.y-me.y)<vision || !me.alive){
      ctx.fillStyle=m.broken?"red":"lime";
      ctx.fillRect(m.x-camX-20,m.y-camY-20,40,40);
      ctx.fillStyle="#fff";
      ctx.fillText(m.name,m.x-camX-35,m.y-camY-30);
    }
  });

  /* --- PLAYERS --- */
  Object.values(players).forEach(p=>{
    if(!p.alive && !me.alive) return; // spectate dead players
    const distP = Math.hypot(p.x-me.x,p.y-me.y);
    if(distP<vision || !me.alive){
      ctx.beginPath();
      ctx.arc(p.x-camX,p.y-camY,20,0,Math.PI*2);
      if(!p.alive){
        ctx.fillStyle="#888";
        ctx.globalAlpha=0.3;
        ctx.fill();
        ctx.globalAlpha=1;
        ctx.fillStyle="#fff";
        ctx.fillText(p.name+" (ÖLÜ)",p.x-camX-25,p.y-camY-25);
      } else {
        ctx.fillStyle=p.color;
        ctx.fill();
        ctx.fillStyle="#fff";
        ctx.fillText(p.name,p.x-camX-15,p.y-camY-25);
      }
    }
  });

  ctx.restore();

  /* --- MINIMAP --- */
  minimapCtx.clearRect(0,0,150,150);
  Object.values(players).forEach(p=>{
    minimapCtx.fillStyle=p.alive?p.color:"#444";
    minimapCtx.fillRect(p.x/MAP_W*150,p.y/MAP_H*150,5,5);
  });
  machines.forEach(m=>{
    minimapCtx.fillStyle=m.broken?"red":"lime";
    minimapCtx.fillRect(m.x/MAP_W*150,m.y/MAP_H*150,5,5);
  });

  requestAnimationFrame(draw);
}
draw();

/* === JOYSTICK === */
let jx=0,jy=0,joy=false,sx=0,sy=0;
joystick.addEventListener("touchstart",e=>{joy=true;sx=e.touches[0].clientX;sy=e.touches[0].clientY;});
joystick.addEventListener("touchmove",e=>{
  if(!joy||!me||!me.alive) return;
  jx=Math.max(-40,Math.min(40,e.touches[0].clientX-sx));
  jy=Math.max(-40,Math.min(40,e.touches[0].clientY-sy));
  stick.style.transform=`translate(${jx}px,${jy}px)`;
});
joystick.addEventListener("touchend",()=>{joy=false;jx=jy=0;stick.style.transform="translate(0,0)";});

setInterval(()=>{
  if(!me||!me.alive) return;
  me.x=Math.max(20,Math.min(MAP_W-20,me.x+jx*0.12));
  me.y=Math.max(20,Math.min(MAP_H-20,me.y+jy*0.12));
  socket.emit("move",{x:me.x,y:me.y});
},50);

/* === ACTIONS === */
function nearMachine(){
  return machines.find(m=>Math.hypot(m.x-me.x,m.y-me.y)<50);
}

function updateHint(){
  if(!me || !me.alive) return hintDiv.innerText="";
  const m=nearMachine();
  if(!m) return hintDiv.innerText="";
  hintDiv.innerText =
    me.role==="Operatör" && m.broken ? "E → Görevi Yap" :
    me.role==="Hain" ? "Q → Öldür" : "";
}
setInterval(updateHint,200);

function tryTask(){
  const m=nearMachine();
  if(!m || !me.alive) return;
  const i=machines.indexOf(m);
  if(me.role==="Operatör"&&m.broken)
    socket.emit("action",{type:"fixMachine",machineIndex:i});
}

function tryKill(){
  if(!me.alive || me.role!=="Hain") return;
  Object.values(players).forEach(p=>{
    if(p.id!==me.id&&p.alive&&Math.hypot(p.x-me.x,p.y-me.y)<50)
      socket.emit("killPlayer",p.id);
  });
}

fixBtn.onclick=tryTask;
killBtn.onclick=tryKill;

document.addEventListener("keydown",e=>{
  if(!me?.alive) return;
  if(e.key==="e"||e.key==="E") tryTask();
  if(e.key==="q"||e.key==="Q") tryKill();
});
</script>
</body>
</html>
