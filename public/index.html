<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>HAİN</title>
<style>
html,body{margin:0;background:#111;color:#fff;overflow:hidden;touch-action:none;font-family:sans-serif}
#ui{position:absolute;top:10px;left:10px;z-index:20}
button,input{font-size:16px}
canvas{display:block}
#joystick{position:fixed;left:30px;bottom:30px;width:120px;height:120px;border-radius:50%;background:#3338;display:none;z-index:10}
#stick{position:absolute;left:35px;top:35px;width:50px;height:50px;border-radius:50%;background:#0f08}
#tasks{position:absolute;top:10px;right:10px;color:#0f0;font-size:16px;z-index:20}
#hint{position:absolute;bottom:120px;left:50%;transform:translateX(-50%);color:#ff0;font-size:16px;z-index:20}
#cooldown{position:absolute;top:40px;right:10px;color:#f55;font-size:14px;z-index:20}
#minimap{position:absolute;bottom:10px;right:10px;width:150px;height:150px;background:#0008;border:1px solid #fff;z-index:20}
#actionButtons{position:absolute;bottom:30px;right:30px;display:none;z-index:20}
#voteMenu{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.85);display:none;flex-direction:column;
  align-items:center;justify-content:center;z-index:30;color:#fff;
}
#voteMenu h2{margin-bottom:20px}
.voteOption{
  padding:10px 20px;margin:5px;background:#222;border:1px solid #fff;
  cursor:pointer;font-size:18px;border-radius:5px;
}
.voteOption:hover{background:#444}
</style>
</head>
<body>

<div id="ui">
  <input id="nameInput" placeholder="İsmin">
  <button id="joinBtn">Lobiye Katıl</button>
  <button id="readyBtn" style="display:none">Hazır</button>
  <div id="role"></div>
</div>

<div id="tasks">Görev: 0</div>
<div id="cooldown"></div>
<div id="hint"></div>

<canvas id="game"></canvas>
<div id="joystick"><div id="stick"></div></div>
<canvas id="minimap"></canvas>

<div id="actionButtons">
  <button id="fixBtn">E: Görev</button>
  <button id="killBtn">Q: Öldür</button>
</div>

<div id="voteMenu">
  <h2>Oylama Başladı!</h2>
  <div id="voteOptions"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const minimap = document.getElementById("minimap");
const minimapCtx = minimap.getContext("2d");
const voteMenu = document.getElementById("voteMenu");
const voteOptions = document.getElementById("voteOptions");

const tasksDiv = document.getElementById("tasks");
const hintDiv = document.getElementById("hint");
const cooldownDiv = document.getElementById("cooldown");

let me=null, players={}, machines=[], lobby=null;
let camX=0, camY=0;

const MAP_W = 2000;
const MAP_H = 1200;
const VISION_OPERATOR = 180;
const VISION_HAIN = 260;

/* === RESIZE === */
function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

/* === FULLSCREEN === */
function goFullscreen(){
  document.documentElement.requestFullscreen?.();
  screen.orientation?.lock("landscape").catch(()=>{});
}

/* === JOIN === */
joinBtn.onclick=()=>{
  socket.emit("joinLobby",{name:nameInput.value},res=>{
    if(res.error) return alert(res.error);
    goFullscreen();
    joinBtn.style.display="none";
    nameInput.style.display="none";
    readyBtn.style.display="inline";
  });
};
readyBtn.onclick=()=>{ socket.emit("playerReady"); readyBtn.disabled=true; };

/* === SOCKET === */
socket.on("lobbyUpdate",d=>{
  lobby=d;
  d.players.forEach(p=>players[p.id]=p);
  machines=d.machines;
  me=players[socket.id];
});

socket.on("rolesAssigned",r=>{
  const m=r.find(x=>x.id===socket.id);
  if(!m) return;
  role.innerText="ROL: "+m.role;
  killBtn.style.display=m.role==="Hain"?"inline":"none";
});

socket.on("gameStart",()=>{
  joystick.style.display="block";
  actionButtons.style.display="block";
});

socket.on("state",d=>{
  d.players.forEach(p=>{
    players[p.id]?Object.assign(players[p.id],p):players[p.id]=p;
  });
  me=players[socket.id];
  tasksDiv.innerText="Görev: "+(me?.tasksCompleted||0);
});

socket.on("machinesUpdate",m=>machines=m);
socket.on("playerKilled",id=>players[id]&&(players[id].alive=false));

/* === OYLAMA === */
socket.on("startMeeting",()=>{
  voteOptions.innerHTML="";
  Object.values(players).filter(p=>p.alive).forEach(p=>{
    const btn = document.createElement("div");
    btn.className="voteOption";
    btn.innerText=p.name;
    btn.onclick=()=>{socket.emit("vote",p.id); voteMenu.style.display="none";}
    voteOptions.appendChild(btn);
  });
  voteMenu.style.display="flex";
});

socket.on("endMeeting",(out)=>{
  voteMenu.style.display="none";
  if(out) alert("💀 "+(players[out]?.name||"Biri")+" atıldı!");
  else alert("🟢 Kimse atılmadı!");
});

socket.on("gameEnd",msg=>alert(msg));

/* === DRAW LOOP === */
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!me) return;

  camX = me.x - canvas.width/2;
  camY = me.y - canvas.height/2;

  /* FOG OF WAR */
  ctx.save();
  ctx.fillStyle="rgba(0,0,0,0.7)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.globalCompositeOperation="destination-out";
  const vision = me.role==="Hain"?VISION_HAIN:VISION_OPERATOR;
  ctx.beginPath();
  ctx.arc(me.x-camX, me.y-camY, vision, 0, Math.PI*2);
  ctx.fill();
  ctx.globalCompositeOperation="source-over";

  /* MACHINES */
  machines.forEach(m=>{
    const distM = Math.hypot(m.x-me.x, m.y-me.y);
    if(distM<vision || !me.alive){
      ctx.fillStyle=m.broken?"red":"lime";
      ctx.fillRect(m.x-camX-25, m.y-camY-25, 50, 50);
      ctx.fillStyle="#fff";
      ctx.font="16px sans-serif";
      ctx.textAlign="center";
      ctx.textBaseline="bottom";
      ctx.fillText(m.name, m.x-camX, m.y-camY-30);
    }
  });

  /* PLAYERS */
  Object.values(players).forEach(p=>{
    if(!p.alive && !me.alive) return;
    const distP = Math.hypot(p.x-me.x, p.y-me.y);
    if(distP<vision || !me.alive){
      ctx.beginPath();
      ctx.arc(p.x-camX, p.y-camY, 25, 0, Math.PI*2);
      ctx.fillStyle = p.alive?p.color:"#888";
      ctx.fill();
      ctx.fillStyle="#fff";
      ctx.font="16px sans-serif";
      ctx.textAlign="center";
      ctx.textBaseline="top";
      ctx.fillText(p.name+(p.alive?"":" (ÖLÜ)"), p.x-camX, p.y-camY+30);
    }
  });

  ctx.restore();

  /* MINIMAP */
  minimapCtx.clearRect(0,0,150,150);
  Object.values(players).forEach(p=>{
    minimapCtx.fillStyle=p.alive?p.color:"#444";
    minimapCtx.fillRect(p.x/MAP_W*150,p.y/MAP_H*150,5,5);
  });
  machines.forEach(m=>{
    minimapCtx.fillStyle=m.broken?"red":"lime";
    minimapCtx.fillRect(m.x/MAP_W*150,m.y/MAP_H*150,5,5);
  });

  requestAnimationFrame(draw);
}
draw();

/* === JOYSTICK === */
let jx=0,jy=0,joy=false,sx=0,sy=0;
joystick.addEventListener("touchstart",e=>{joy=true;sx=e.touches[0].clientX;sy=e.touches[0].clientY;});
joystick.addEventListener("touchmove",e=>{
  if(!joy||!me||!me.alive) return;
  jx=Math.max(-40,Math.min(40,e.touches[0].clientX-sx));
  jy=Math.max(-40,Math.min(40,e.touches[0].clientY-sy));
  stick.style.transform=`translate(${jx}px,${jy}px)`;
});
joystick.addEventListener("touchend",()=>{joy=false;jx=jy=0;stick.style.transform="translate(0,0)";});

setInterval(()=>{
  if(!me||!me.alive) return;
  me.x=Math.max(20,Math.min(MAP_W-20,me.x+jx*0.12));
  me.y=Math.max(20,Math.min(MAP_H-20,me.y+jy*0.12));
  socket.emit("move",{x:me.x,y:me.y});
},50);

/* ACTIONS */
function nearMachine(){ return machines.find(m=>Math.hypot(m.x-me.x,m.y-me.y)<50); }
function updateHint(){
  if(!me || !me.alive) return hintDiv.innerText="";
  const m=nearMachine();
  if(!m) return hintDiv.innerText="";
  hintDiv.innerText =
    me.role==="Operatör" && m.broken ? "E → Görevi Yap" :
    me.role==="Hain" ? "Q → Öldür" : "";
}
setInterval(updateHint,200);

function tryTask(){
  const m=nearMachine();
  if(!m || !me.alive) return;
  const i=machines.indexOf(m);
  if(me.role==="Operatör"&&m.broken) socket.emit("action",{type:"fixMachine",machineIndex:i});
}

function tryKill(){
  if(!me.alive || me.role!=="Hain") return;
  Object.values(players).forEach(p=>{
    if(p.id!==me.id&&p.alive&&Math.hypot(p.x-me.x,p.y-me.y)<50)
      socket.emit("killPlayer",p.id);
  });
}

fixBtn.onclick=tryTask;
killBtn.onclick=tryKill;

</script>
</body>
</html>
