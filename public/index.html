<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HAİN</title>
<style>
html,body{margin:0;overflow:hidden;background:#000;color:#fff;font-family:Arial}
canvas{display:block}
#ui{position:absolute;top:10px;left:10px;z-index:10}
#lobby{background:#000c;padding:10px}
#joystick{
 position:absolute;bottom:40px;left:40px;
 width:120px;height:120px;border-radius:50%;
 background:#222;border:2px solid #555;
}
#stick{
 width:50px;height:50px;border-radius:50%;
 background:#999;position:absolute;left:35px;top:35px;
}
</style>
</head>
<body>

<div id="ui">
  <div id="lobby">
    <input id="name" placeholder="İsmin">
    <button onclick="join()">Lobiye Gir</button>
    <button onclick="ready()">Hazırım</button>
    <div id="list"></div>
  </div>
</div>

<div id="joystick"><div id="stick"></div></div>
<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const c = game, ctx = c.getContext("2d");
c.width = innerWidth; c.height = innerHeight;

let players={}, me=null, cam={x:0,y:0}, time=300;

const WORLD={w:2000,h:1400};

const machines = [
  "Fette 1200","Fette 2200","Kilian KTP 720","Korsch XL 400",
  "Bosch GKF 701","Fette 3200","Korsch XT600","Fette Fe55",
  "Sejong","Fette 2100"
].map((n,i)=>({n,x:300+(i%5)*350,y:300+Math.floor(i/5)*400}));

function join(){
  socket.emit("joinLobby", name.value);
}
function ready(){
  socket.emit("ready");
}

socket.on("players", p=>{
  players=p;
  me=players[socket.id];
  list.innerHTML = Object.values(p).map(x=>x.name+" "+(x.ready?"✅":"")).join("<br>");
});
socket.on("gameStart",()=> lobby.style.display="none");
socket.on("timer",t=>time=t);

// JOYSTICK
let joy={x:0,y:0,active:false};
joystick.addEventListener("touchstart",()=>joy.active=true);
joystick.addEventListener("touchend",()=>{
  joy.active=false; joy.x=joy.y=0;
  stick.style.left="35px";stick.style.top="35px";
});
joystick.addEventListener("touchmove",e=>{
  if(!joy.active||!me)return;
  let t=e.touches[0];
  let r=joystick.getBoundingClientRect();
  let dx=t.clientX-(r.left+60);
  let dy=t.clientY-(r.top+60);
  let d=Math.min(40,Math.hypot(dx,dy));
  let a=Math.atan2(dy,dx);
  joy.x=Math.cos(a)*d;
  joy.y=Math.sin(a)*d;
  stick.style.left=35+joy.x+"px";
  stick.style.top=35+joy.y+"px";

  me.x+=joy.x*0.1;
  me.y+=joy.y*0.1;
  me.x=Math.max(20,Math.min(me.x,WORLD.w-20));
  me.y=Math.max(20,Math.min(me.y,WORLD.h-20));
  socket.emit("move",{x:me.x,y:me.y});
});

function draw(){
  if(me){ cam.x=me.x-c.width/2; cam.y=me.y-c.height/2; }
  ctx.clearRect(0,0,c.width,c.height);
  ctx.fillStyle="#111";
  ctx.fillRect(-cam.x,-cam.y,WORLD.w,WORLD.h);

  machines.forEach(m=>{
    ctx.fillStyle="#444";
    ctx.fillRect(m.x-50-cam.x,m.y-30-cam.y,100,60);
    ctx.fillStyle="#0f0";
    ctx.fillText(m.n,m.x-50-cam.x,m.y-40-cam.y);
  });

  Object.values(players).forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x-cam.x,p.y-cam.y,14,0,7);
    ctx.fillStyle=p.color;ctx.fill();
    ctx.fillStyle="#fff";
    ctx.fillText(p.name,p.x-18-cam.x,p.y-18-cam.y);
  });

  ctx.fillText("⏱ "+time,20,20);
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
