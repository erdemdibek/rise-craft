<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hain vs Operatör</title>
  <style>
    /* Genel stil */
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      color: #fff;
      overflow: hidden;
    }

    /* Lobi kutusu */
    #lobby {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 400px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 15px;
      padding: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      z-index: 1000;
    }

    #lobby input {
      width: calc(100% - 20px);
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 10px;
      font-size: 16px;
    }

    #lobby button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: none;
      font-size: 18px;
      background: #ff6b6b;
      color: #fff;
      font-weight: bold;
      transition: 0.2s;
    }

    #lobby button:hover {
      background: #ff8787;
    }

    #playersList {
      max-height: 150px;
      overflow-y: auto;
      margin-top: 10px;
    }

    #playersList div {
      padding: 5px 10px;
      background: rgba(255, 255, 255, 0.1);
      margin-bottom: 5px;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
    }

    /* Log bar */
    #logBar {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 95%;
      max-width: 400px;
      max-height: 180px;
      background: rgba(0,0,0,0.6);
      border-radius: 15px;
      padding: 10px;
      font-size: 14px;
      overflow-y: auto;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
      z-index: 1000;
    }

    #logBar div {
      margin-bottom: 5px;
      padding: 5px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
    }

    /* Phaser container */
    #gameContainer {
      width: 100vw;
      height: 100vh;
    }

    /* Mobil dokunmatik optimize */
    @media (max-width: 600px){
      #lobby { padding: 10px; }
      #lobby button, #lobby input { font-size: 16px; padding: 10px; }
      #playersList { max-height: 120px; }
      #logBar { font-size: 13px; padding: 8px; max-height: 140px; }
    }
  </style>
</head>
<body>

  <!-- LOBBY -->
  <div id="lobby">
    <input type="text" id="nameInput" placeholder="İsminizi girin">
    <button id="joinBtn">Katıl</button>
    <button id="readyBtn">Hazır</button>
    <button id="startBtn" style="display:none;">Başlat</button>
    <div id="playersList"></div>
  </div>

  <!-- LOG BAR -->
  <div id="logBar"></div>

  <!-- PHASER CANVAS EKRAN -->
  <div id="gameContainer"></div>

  <!-- SOCKET.IO -->
  <script src="/socket.io/socket.io.js"></script>
  <!-- PHASER -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
  <!-- MAIN.JS -->
  <script src="main.js"></script>

</body>
</html>
