<!DOCTYPE html>
<html lang="en">
<head>

  <script src="/socket.io/socket.io.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }

    <input type="text" id="nameInput" placeholder="İsminizi yazın">

  <script src="main.js"></script>
