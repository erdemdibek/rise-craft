<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>HAİN</title>
<style>
html,body{margin:0;background:#111;color:#fff;overflow:hidden;font-family:sans-serif}
#ui{position:absolute;top:10px;left:10px;z-index:30}
canvas{display:block}

#joystick{position:fixed;left:30px;bottom:30px;width:120px;height:120px;border-radius:50%;background:#3338;display:none}
#stick{position:absolute;left:35px;top:35px;width:50px;height:50px;border-radius:50%;background:#0f08}

#actionButtons{
  position:absolute;
  bottom:170px;
  right:20px;
  display:none;
  z-index:25
}

#miniMap{
  position:absolute;
  top:10px;
  right:10px;
  width:200px;
  height:120px;
  background:#0008;
  border:1px solid #555;
  z-index:20
}

#log{
  position:absolute;
  right:10px;
  bottom:10px;
  width:260px;
  height:140px;
  background:#000c;
  font-size:12px;
  padding:6px;
  overflow:auto;
  z-index:20
}

#statusBar{
  position:absolute;
  bottom:160px;
  right:10px;
  width:260px;
  background:#000c;
  border:1px solid #555;
  padding:6px;
  font-size:12px;
  z-index:22;
}

#voteMenu{
  position:fixed;
  inset:0;
  background:#000c;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:50
}

.voteOption{
  padding:8px 20px;
  margin:4px;
  border:1px solid #fff;
  cursor:pointer
}
</style>
</head>
<body>

<div id="ui">
  <input id="nameInput" placeholder="İsmin">
  <button id="joinBtn">Katıl</button>
  <button id="readyBtn" style="display:none">Hazır</button>
  <div id="role"></div>
</div>

<canvas id="game"></canvas>
<canvas id="miniMap"></canvas>

<div id="joystick"><div id="stick"></div></div>

<div id="actionButtons">
  <button id="fixBtn">Görev</button>
  <button id="killBtn">Öldür</button>
</div>

<div id="statusBar">
  <div id="timeDisplay">⏰ Süre: 0</div>
  <div id="brokenMachines">⚠️ Bozulan makineler: 0</div>
  <div id="alivePlayers">👥 Hayatta kalan: 0</div>
</div>

<div id="log"></div>

<div id="voteMenu">
  <h2>Oylama</h2>
  <div id="voteOptions"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io();
const c=document.getElementById("game"),ctx=c.getContext("2d");
const map=document.getElementById("miniMap"),mctx=map.getContext("2d");
const logDiv=document.getElementById("log");
const timeDisplay=document.getElementById("timeDisplay");
const brokenMachinesDisplay=document.getElementById("brokenMachines");
const alivePlayersDisplay=document.getElementById("alivePlayers");

let me=null,players={},machines=[],prevMachines=[];
let gameTime=0;

const MAP_W=2000,MAP_H=1200;

function resize(){c.width=innerWidth;c.height=innerHeight}
resize();addEventListener("resize",resize);

/* JOIN */
joinBtn.onclick=()=>socket.emit("joinLobby",{name:nameInput.value},r=>{
  if(r.error) alert(r.error);
  else{
    joinBtn.style.display="none";
    nameInput.style.display="none";
    readyBtn.style.display="inline";
  }
});
readyBtn.onclick=()=>socket.emit("playerReady");

/* LOG */
function log(t){
  logDiv.innerHTML+=t+"<br>";
  logDiv.scrollTop=logDiv.scrollHeight;
}

/* SOCKET */
socket.on("lobbyUpdate",d=>{
  players={};
  d.players.forEach(p=>players[p.id]=p);
  machines=d.machines;
  prevMachines=JSON.parse(JSON.stringify(machines));
  me=players[socket.id];
});

socket.on("rolesAssigned",r=>{
  const m=r.find(x=>x.id===socket.id);
  role.innerText="ROL: "+m.role;
  killBtn.style.display=m.role==="Hain"?"inline":"none";
});

socket.on("gameStart",()=>{
  readyBtn.style.display="none";
  joystick.style.display="block";
  actionButtons.style.display="block";
  log("🎮 Oyun başladı");
});

socket.on("state",d=>{
  d.players.forEach(p=>players[p.id]=p);
  me=players[socket.id];
  gameTime=d.time;
  updateStatusBar();
});

socket.on("machinesUpdate",m=>{
  m.forEach((nm,i)=>{
    const pm=prevMachines[i];
    if(pm && pm.broken!==nm.broken){
      log(nm.broken ? `⚠️ ${nm.name} bozuldu` : `✅ ${nm.name} tamir edildi`);
    }
  });
  prevMachines=JSON.parse(JSON.stringify(m));
  machines=m;
  updateStatusBar();
});

socket.on("playerKilled",id=>{
  if(players[id]){
    players[id].alive=false;
    log(`💀 ${players[id].name} öldürüldü`);
    updateStatusBar();
  }
});

socket.on("startMeeting",showVote);
socket.on("endMeeting",()=>voteMenu.style.display="none");

/* STATUS BAR */
function updateStatusBar(){
  timeDisplay.innerText=`⏰ Süre: ${gameTime}`;
  brokenMachinesDisplay.innerText=`⚠️ Bozulan makineler: ${machines.filter(m=>m.broken).length}`;
  alivePlayersDisplay.innerText=`👥 Hayatta kalan: ${Object.values(players).filter(p=>p.alive).length}`;
}

/* DRAW */
function draw(){
  ctx.fillStyle="#222";
  ctx.fillRect(0,0,c.width,c.height);

  if(!me){requestAnimationFrame(draw);return;}
  const camX=me.x-c.width/2,camY=me.y-c.height/2;

  machines.forEach(m=>{
    if(m.broken || Math.hypot(m.x-me.x,m.y-me.y)<260){
      ctx.fillStyle=m.broken?"red":"lime";
      ctx.fillRect(m.x-camX-18,m.y-camY-18,36,36);
      ctx.fillStyle="#fff";
      ctx.fillText(m.name,m.x-camX-30,m.y-camY-22);
    }
  });

  Object.values(players).forEach(p=>{
    if(!p.alive) return;
    ctx.beginPath();
    ctx.arc(p.x-camX,p.y-camY,18,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.fill();
    ctx.fillStyle="#fff";
    ctx.fillText(p.name,p.x-camX-15,p.y-camY-25);
  });

  drawMiniMap();
  requestAnimationFrame(draw);
}
draw();

/* MINIMAP */
function drawMiniMap(){
  mctx.clearRect(0,0,200,120);

  machines.forEach(m=>{
    mctx.fillStyle=m.broken?"red":"lime";
    mctx.fillRect(m.x/MAP_W*200,m.y/MAP_H*120,4,4);
  });

  Object.values(players).forEach(p=>{
    if(p.alive){
      mctx.fillStyle=p.color;
      mctx.fillRect(p.x/MAP_W*200,p.y/MAP_H*120,4,4);
    }
  });
}

/* JOYSTICK */
let jx=0,jy=0,joy=false,sx=0,sy=0;
joystick.ontouchstart=e=>{joy=true;sx=e.touches[0].clientX;sy=e.touches[0].clientY};
joystick.ontouchmove=e=>{
  if(!joy||!me)return;
  jx=e.touches[0].clientX-sx;
  jy=e.touches[0].clientY-sy;
};
joystick.ontouchend=()=>{joy=false;jx=jy=0};

setInterval(()=>{
  if(!me||!me.alive)return;
  me.x=Math.max(20,Math.min(MAP_W-20,me.x+jx*0.1));
  me.y=Math.max(20,Math.min(MAP_H-20,me.y+jy*0.1));
  socket.emit("move",{x:me.x,y:me.y});
},50);

/* ACTIONS */
killBtn.onclick=()=>{
  Object.values(players).forEach(p=>{
    if(p.id!==me.id&&p.alive&&Math.hypot(p.x-me.x,p.y-me.y)<60)
      socket.emit("killPlayer",p.id);
  });
};

fixBtn.onclick=()=>{
  const m=machines.find(x=>Math.hypot(x.x-me.x,x.y-me.y)<60);
  if(m) socket.emit("action",{type:"fixMachine",machineIndex:machines.indexOf(m)});
};

/* VOTE */
function showVote(){
  voteMenu.style.display="flex";
  voteOptions.innerHTML="";
  Object.values(players).forEach(p=>{
    if(p.alive){
      const d=document.createElement("div");
      d.className="voteOption";
      d.innerText=p.name;
      d.onclick=()=>socket.emit("vote",p.id);
      voteOptions.appendChild(d);
    }
  });
}
</script>
</body>
</html>
