<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>HAİN 3D LOBBY</title>
<style>
html,body{margin:0;background:#111;color:white;overflow:hidden;font-family:Arial}
#ui{position:absolute;top:10px;left:10px;z-index:9}
#panel{position:absolute;bottom:0;width:100%;background:#000c;padding:10px}
button,input{font-size:16px;margin:3px}
canvas{display:block}

#joystick{position:absolute;bottom:80px;left:30px;width:120px;height:120px;border-radius:50%;background:#2227;display:none;touch-action:none;z-index:5;}
#joystickThumb{position:absolute;width:50px;height:50px;background:#0f07;border-radius:50%;top:35px;left:35px;}

#rotateLock{position:fixed;inset:0;background:#000;display:none;align-items:center;justify-content:center;text-align:center;z-index:999;}

#gameUI{position:absolute;top:10px;right:10px;z-index:9;}
#gameUI button{display:block;margin:5px;}
#meetingUI{position:absolute;inset:0;background:#000c;display:none;align-items:center;justify-content:center;flex-direction:column;z-index:999;text-align:center;}
</style>
</head>
<body>

<div id="rotateLock"><h2>📱 Telefonu YATAY çevir</h2></div>

<div id="ui">
  <input id="name" placeholder="İsmin">
  <button id="joinBtn">Lobiye Katıl</button>
  <button id="readyBtn">Hazır</button>
</div>

<div id="gameUI">
  <button id="killBtn" style="display:none;">Kill</button>
  <button id="repairBtn" style="display:none;">Repair</button>
  <button id="emergencyBtn">Acil Toplantı</button>
</div>

<canvas id="game"></canvas>

<div id="panel"></div>

<div id="joystick"><div id="joystickThumb"></div></div>

<div id="meetingUI">
  <h2>🗳 Oylama</h2>
  <div id="votesContainer"></div>
  <button id="voteSkip">Skip</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>
</body>
</html>
