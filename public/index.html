<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takip</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-size: 2.5rem;
            font-weight: bold;
            color: #111;
        }
        div {
            margin: 10px 0;
        }
    </style>
</head>
<body>

<div id="sanofi">...</div>
<div id="eur">...</div>

<script>
    // ÜCRETSİZ ALPHAVANTAGE API KEY'İNİZİ BURAYA YAZIN
    const API_KEY = '7TGXMCK5O1U86H38'; 

    async function verileriGetir() {
        try {
            // Sanofi Hisse Fiyatı (Euro cinsinden)
            const stockUrl = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=SAN.PAR&apikey=${API_KEY}`;
            const stockResponse = await fetch(stockUrl);
            const stockData = await stockResponse.json();
            const sanofiPrice = parseFloat(stockData["Global Quote"]["05. price"]);

            // Euro / TL Kuru
            const forexUrl = `https://www.alphavantage.co/query?function=CURRENCY_EXCHANGE_RATE&from_currency=EUR&to_currency=TRY&apikey=${API_KEY}`;
            const forexResponse = await fetch(forexUrl);
            const forexData = await forexResponse.json();
            const eurTryRate = parseFloat(forexData["Realtime Currency Exchange Rate"]["5. Exchange Rate"]);

            // Ekrana sadece saf değerleri basıyoruz
            document.getElementById('sanofi').innerText = `€${sanofiPrice.toFixed(2)}`;
            document.getElementById('eur').innerText = `₺${eurTryRate.toFixed(4)}`;

        } catch (error) {
            document.getElementById('sanofi').innerText = "Hata";
            document.getElementById('eur').innerText = "Hata";
        }
    }

    verileriGetir();
</script>

</body>
</html>
