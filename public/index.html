<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HAİN</title>
<style>
html,body{margin:0;overflow:hidden;background:#000;color:#fff}
canvas{display:block}
#ui{position:absolute;top:10px;left:10px;z-index:10}
#joy{position:fixed;bottom:20px;left:20px;width:120px;height:120px;border-radius:50%;background:#333}
#stick{width:50px;height:50px;background:#999;border-radius:50%;position:absolute;top:35px;left:35px}
#panel{position:fixed;right:10px;bottom:10px;background:#000c;padding:10px}
button,input{font-size:16px;margin:4px}
</style>
</head>
<body>

<div id="ui">
<input id="name" placeholder="İsim">
<input id="room">
<button onclick="create()">Oda</button>
<button onclick="join()">Katıl</button>
<button onclick="startGame()">Başlat</button>
</div>

<canvas id="c"></canvas>
<div id="joy"><div id="stick"></div></div>
<div id="panel"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io();
const c=document.getElementById("c"),ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;

let room=null,me=null,players={},sabotage=null;
const WORLD={w:2200,h:1400},cam={x:0,y:0};

function create(){
 socket.emit("createRoom",{username:name.value},r=>{
  room=r.roomCode;roomInput.value=room;
 });
}
function join(){
 room=roomInput.value;
 socket.emit("joinRoom",{roomCode:room,username:name.value},()=>{});
}
function startGame(){socket.emit("startGame",room);}

socket.on("state",r=>{
 players=r.players;
 me=players[socket.id];
});
socket.on("roles",p=>alert("ROL: "+p[socket.id].role));
socket.on("sabotage",s=>sabotage=s);
socket.on("taskFeedback",m=>panel.innerText=m);
socket.on("kicked",n=>alert(n+" atıldı"));

let joy=document.getElementById("joy"),stick=document.getElementById("stick");
joy.ontouchmove=e=>{
 let t=e.touches[0];
 let dx=t.clientX-joy.offsetLeft-60;
 let dy=t.clientY-joy.offsetTop-60;
 let d=Math.min(40,Math.hypot(dx,dy));
 let a=Math.atan2(dy,dx);
 stick.style.left=60+d*Math.cos(a)-25+"px";
 stick.style.top =60+d*Math.sin(a)-25+"px";
 if(me){
  me.x+=Math.cos(a)*5;
  me.y+=Math.sin(a)*5;
  socket.emit("move",{room,x:me.x,y:me.y});
 }
};
joy.ontouchend=()=>{stick.style.left="35px";stick.style.top="35px";}

function draw(){
 if(me){cam.x=me.x-c.width/2;cam.y=me.y-c.height/2;}
 ctx.clearRect(0,0,c.width,c.height);
 ctx.fillStyle="#111";
 ctx.fillRect(-cam.x,-cam.y,WORLD.w,WORLD.h);

 Object.values(players).forEach(p=>{
  if(!p.alive)return;
  ctx.fillStyle=p.id===socket.id?"#0f0":"#f00";
  ctx.beginPath();
  ctx.arc(p.x-cam.x,p.y-cam.y,15,0,7);
  ctx.fill();
  ctx.fillText(p.name,p.x-20-cam.x,p.y-20-cam.y);
 });

 if(sabotage) ctx.fillText("⚠ "+sabotage,20,20);
 requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
