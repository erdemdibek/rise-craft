<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>HAİN</title>

<style>
html,body{
  margin:0;
  background:#111;
  color:#fff;
  overflow:hidden;
  font-family:Arial;
}
#ui{
  position:absolute;
  top:10px;left:10px;
  z-index:10;
}
button,input{
  font-size:16px;
  margin:3px;
}
canvas{display:block}

#overlay{
  position:fixed;
  inset:0;
  background:#000d;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:99;
  text-align:center;
}

#joystick{
  position:fixed;
  left:30px;
  bottom:30px;
  width:140px;
  height:140px;
  border-radius:50%;
  background:#3338;
  touch-action:none;
  z-index:20;
}
#stick{
  position:absolute;
  left:45px;
  top:45px;
  width:50px;
  height:50px;
  border-radius:50%;
  background:#0f08;
}
</style>
</head>

<body>

<div id="overlay"></div>

<div id="ui">
  <input id="name" placeholder="İsmin">
  <button id="joinBtn">Lobiye Katıl</button>
  <button id="readyBtn">Hazır</button>
  <div id="role"></div>
  <div id="actions"></div>
</div>

<canvas id="game"></canvas>

<div id="joystick">
  <div id="stick"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* ===================== AYARLAR ===================== */
const MAP_W=2000, MAP_H=1200;
const SPEED=3;
const KILL_RANGE=60;

/* ===================== SOCKET ===================== */
const socket = io();

/* ===================== FULLSCREEN ===================== */
function requestFullScreen(){
  const el=document.documentElement;
  if(el.requestFullscreen) el.requestFullscreen();
  else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}
function checkFS(){
  if(innerWidth>innerHeight) requestFullScreen();
}
window.addEventListener("orientationchange",()=>setTimeout(checkFS,300));
window.addEventListener("click",checkFS);

/* ===================== CANVAS ===================== */
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
addEventListener("resize",resize);
resize();

/* ===================== STATE ===================== */
let me=null, players={}, machines=[];
let cam={x:0,y:0};
let time=300;
let meeting=false;
let myRole=null;

/* ===================== UI ===================== */
joinBtn.onclick=()=>{
  const n=name.value;
  if(!n) return alert("İsim gir");
  socket.emit("joinLobby",{name:n});
};
readyBtn.onclick=()=>socket.emit("playerReady");

/* ===================== SOCKET EVENTS ===================== */
socket.on("lobbyUpdate",d=>{
  players={};
  d.players.forEach(p=>players[p.id]=p);
  machines=d.machines;
  if(players[socket.id]) me=players[socket.id];
});

socket.on("rolesAssigned",list=>{
  const r=list.find(x=>x.id===socket.id);
  if(r){
    myRole=r.role;
    role.innerText="ROL: "+r.role;
  }
});

socket.on("gameStart",d=>{
  d.players.forEach(p=>players[p.id]=p);
  machines=d.machines;
  me=players[socket.id];
});

socket.on("state",d=>{
  d.players.forEach(p=>players[p.id]=p);
  time=d.time;
  me=players[socket.id];
});

socket.on("machinesUpdated",m=>machines=m);
socket.on("playerKilled",id=>players[id]&&(players[id].alive=false));
socket.on("meeting",()=>{meeting=true;openMeeting();});
socket.on("meetingEnd",()=>{meeting=false;overlay.style.display="none";});
socket.on("playerEjected",id=>players[id]&&(players[id].alive=false));

/* ===================== MEETING ===================== */
function openMeeting(){
  overlay.innerHTML="<h2>ACİL TOPLANTI</h2>";
  Object.values(players).filter(p=>p.alive).forEach(p=>{
    if(p.id!==socket.id){
      const b=document.createElement("button");
      b.innerText=p.name;
      b.onclick=()=>socket.emit("vote",{voteFor:p.id});
      overlay.appendChild(b);
    }
  });
  overlay.style.display="flex";
}

/* ===================== GAME LOOP ===================== */
function clamp(){
  me.x=Math.max(20,Math.min(MAP_W-20,me.x));
  me.y=Math.max(20,Math.min(MAP_H-20,me.y));
}

function draw(){
  if(me){
    cam.x=Math.max(0,Math.min(MAP_W-canvas.width,me.x-canvas.width/2));
    cam.y=Math.max(0,Math.min(MAP_H-canvas.height,me.y-canvas.height/2));
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#222";
  ctx.fillRect(-cam.x,-cam.y,MAP_W,MAP_H);

  machines.forEach(m=>{
    ctx.fillStyle=m.broken?"#800":"#555";
    ctx.fillRect(m.x-40-cam.x,m.y-25-cam.y,80,50);
  });

  Object.values(players).forEach(p=>{
    if(!p.alive) return;
    ctx.beginPath();
    ctx.arc(p.x-cam.x,p.y-cam.y,20,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.fill();
    ctx.fillText(p.name,p.x-15-cam.x,p.y-25-cam.y);
  });

  ctx.fillStyle="#fff";
  ctx.fillText("⏱ "+time,20,30);
  requestAnimationFrame(draw);
}
draw();

/* ===================== KLAVYE ===================== */
addEventListener("keydown",e=>{
  if(!me||!me.alive||meeting) return;
  if(e.key==="w") me.y-=SPEED;
  if(e.key==="s") me.y+=SPEED;
  if(e.key==="a") me.x-=SPEED;
  if(e.key==="d") me.x+=SPEED;
  clamp();
  socket.emit("move",{x:me.x,y:me.y});
});

/* ===================== JOYSTICK ===================== */
let joy=false,jx=0,jy=0,sx=0,sy=0;
const joystick=document.getElementById("joystick");
const stick=document.getElementById("stick");

joystick.addEventListener("touchstart",e=>{
  joy=true;
  sx=e.touches[0].clientX;
  sy=e.touches[0].clientY;
});
joystick.addEventListener("touchmove",e=>{
  if(!joy||!me||meeting) return;
  jx=Math.max(-40,Math.min(40,e.touches[0].clientX-sx));
  jy=Math.max(-40,Math.min(40,e.touches[0].clientY-sy));
  stick.style.left=45+jx+"px";
  stick.style.top=45+jy+"px";
});
joystick.addEventListener("touchend",()=>{
  joy=false;jx=jy=0;
  stick.style.left="45px";
  stick.style.top="45px";
});

setInterval(()=>{
  if(!me||!me.alive||meeting) return;
  me.x+=jx*0.08;
  me.y+=jy*0.08;
  clamp();
  socket.emit("move",{x:me.x,y:me.y});
},50);

/* ===================== ACTIONS ===================== */
setInterval(()=>{
  if(!me||myRole!=="Hain"||meeting) return;
  let html="";
  Object.values(players).forEach(p=>{
    if(p.id!==me.id&&p.alive&&Math.hypot(p.x-me.x,p.y-me.y)<KILL_RANGE)
      html+=`<button onclick="kill('${p.id}')">🔪 ${p.name}</button>`;
  });
  machines.forEach((m,i)=>{
    if(!m.broken&&Math.hypot(m.x-me.x,m.y-me.y)<70)
      html+=`<button onclick="sabotage(${i})">⚠️ Sabotaj</button>`;
  });
  actions.innerHTML=html;
},300);

window.kill=id=>socket.emit("action",{type:"kill",targetId:id});
window.sabotage=i=>socket.emit("action",{type:"breakMachine",machineIndex:i});
</script>
</body>
</html>
