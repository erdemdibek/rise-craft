<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>HAİN</title>
<style>
html,body{margin:0;background:#111;color:#fff;overflow:hidden;touch-action:none}
#ui{position:absolute;top:10px;left:10px;z-index:10}
button,input{font-size:16px}
canvas{display:block}
#joystick{position:fixed;left:30px;bottom:30px;width:120px;height:120px;border-radius:50%;background:#3338;display:none}
#stick{position:absolute;left:35px;top:35px;width:50px;height:50px;border-radius:50%;background:#0f08}
#tasks{position:absolute;top:10px;right:10px;color:#0f0;font-size:16px}
#minimap{position:absolute;bottom:10px;right:10px;width:150px;height:150px;background:#0008;border:1px solid #fff}
</style>
</head>
<body>

<div id="ui">
  <input id="nameInput" placeholder="İsmin">
  <button id="joinBtn">Lobiye Katıl</button>
  <button id="readyBtn" style="display:none">Hazır</button>
  <div id="role"></div>
</div>

<div id="tasks">Görev: 0</div>
<canvas id="game"></canvas>
<div id="joystick"><div id="stick"></div></div>
<canvas id="minimap"></canvas>

<div id="actionButtons" style="position:absolute;bottom:30px;right:30px;display:none;z-index:10">
  <button id="fixBtn">E: Görev</button>
  <button id="killBtn">Q: Öldür</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* === GLOBALS === */
const socket = io();
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const minimap = document.getElementById("minimap");
const minimapCtx = minimap.getContext("2d");
const nameInput = document.getElementById("nameInput");
const tasksDiv = document.getElementById("tasks");

let me = null;
let players = {};
let machines = [];
let lobby = null;
let camX = 0, camY = 0;

/* === RESIZE === */
function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  minimap.width = 150;
  minimap.height = 150;
}
resize();
addEventListener("resize", resize);

/* === FULLSCREEN === */
function goFullscreen(){
  document.documentElement.requestFullscreen?.();
  screen.orientation?.lock("landscape").catch(()=>{});
}

/* === JOIN === */
joinBtn.onclick = ()=>{
  socket.emit("joinLobby",{name:nameInput.value},res=>{
    if(res.error) return alert(res.error);
    goFullscreen();
    joinBtn.style.display="none";
    nameInput.style.display="none";
    readyBtn.style.display="inline";
  });
};
readyBtn.onclick=()=>{
  socket.emit("playerReady");
  readyBtn.disabled=true;
};

/* === SOCKET EVENTS === */
socket.on("lobbyUpdate", d=>{
  lobby = d;
  d.players.forEach(p=>players[p.id]=p);
  machines = d.machines;
  me = players[socket.id];
});

socket.on("rolesAssigned", r=>{
  const m = r.find(x=>x.id===socket.id);
  if(m) role.innerText = "ROL: " + m.role;
});

socket.on("gameStart", ()=>{
  joystick.style.display="block";
  actionButtons.style.display="block";
});

socket.on("state", d=>{
  d.players.forEach(p=>{
    players[p.id] ? Object.assign(players[p.id],p) : players[p.id]=p;
  });
  me = players[socket.id];
  tasksDiv.innerText = "Görev: " + (me?.tasksCompleted||0);
});

socket.on("machinesUpdate", m=>machines=m);
socket.on("playerKilled", id=>{ if(players[id]) players[id].alive=false; });
socket.on("startMeeting", ()=>alert("Toplantı başladı!"));
socket.on("endMeeting", ()=>alert("Toplantı bitti!"));
socket.on("gameEnd", msg=>alert(msg));

/* === DRAW LOOP === */
ctx.font="16px Arial";
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(me){
    camX = me.x - canvas.width/2;
    camY = me.y - canvas.height/2;
  }

  machines.forEach(m=>{
    ctx.fillStyle = m.broken ? "red":"lime";
    ctx.fillRect(m.x-camX-20,m.y-camY-20,40,40);
  });

  Object.values(players).forEach(p=>{
    if(!p.alive) return;
    ctx.beginPath();
    ctx.arc(p.x-camX,p.y-camY,20,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.fill();
    ctx.fillStyle="#fff";
    ctx.fillText(p.name,p.x-camX-15,p.y-camY-25);
  });

  minimapCtx.clearRect(0,0,150,150);
  Object.values(players).forEach(p=>{
    minimapCtx.fillStyle=p.alive?p.color:"#555";
    minimapCtx.fillRect((p.x/2000)*150,(p.y/1200)*150,5,5);
  });
  machines.forEach(m=>{
    minimapCtx.fillStyle=m.broken?"red":"lime";
    minimapCtx.fillRect((m.x/2000)*150,(m.y/1200)*150,5,5);
  });

  requestAnimationFrame(draw);
}
draw();

/* === JOYSTICK === */
let jx=0,jy=0,joy=false,sx=0,sy=0;
joystick.addEventListener("touchstart",e=>{
  joy=true;
  sx=e.touches[0].clientX;
  sy=e.touches[0].clientY;
});
joystick.addEventListener("touchmove",e=>{
  if(!joy||!me) return;
  jx=Math.max(-40,Math.min(40,e.touches[0].clientX-sx));
  jy=Math.max(-40,Math.min(40,e.touches[0].clientY-sy));
  stick.style.transform=`translate(${jx}px,${jy}px)`;
});
joystick.addEventListener("touchend",()=>{
  joy=false;
  jx=jy=0;
  stick.style.transform="translate(0,0)";
});

setInterval(()=>{
  if(!me) return;
  me.x+=jx*0.12;
  me.y+=jy*0.12;
  socket.emit("move",{x:me.x,y:me.y});
},50);

/* === ACTIONS === */
function tryTask(){
  if(!me) return;
  machines.forEach((m,i)=>{
    if(Math.hypot(m.x-me.x,m.y-me.y)<50){
      if(me.role==="Operatör" && m.broken)
        socket.emit("action",{type:"fixMachine",machineIndex:i});
      if(me.role==="Hain" && !m.broken)
        socket.emit("action",{type:"breakMachine",machineIndex:i});
    }
  });
}

function tryKill(){
  if(!me||me.role!=="Hain") return;
  Object.values(players).forEach(p=>{
    if(p.id!==me.id && p.alive && Math.hypot(p.x-me.x,p.y-me.y)<50)
      socket.emit("killPlayer",p.id);
  });
}

fixBtn.onclick = tryTask;
killBtn.onclick = tryKill;

document.addEventListener("keydown",e=>{
  if(e.key.toLowerCase()==="e") tryTask();
  if(e.key.toLowerCase()==="q") tryKill();
  if(lobby?.meeting && e.key>='0' && e.key<='9'){
    const aliveIds = Object.values(players).filter(p=>p.alive).map(p=>p.id);
    const idx = parseInt(e.key);
    if(idx < aliveIds.length) socket.emit("vote", aliveIds[idx]);
  }
});
</script>
</body>
</html>
