<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>HAİN</title>
<style>
html,body{margin:0;background:#000;color:#fff;overflow:hidden;font-family:sans-serif}
#lobby,#panel{position:absolute;z-index:9;padding:10px}
#lobby{top:10px;left:10px}
#panel{bottom:0;width:100%;background:#000c}
canvas{display:block}
#fs{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000}
button,input{font-size:16px;margin:3px}
</style>
</head>
<body>

<div id="fs">
  <button onclick="goFS()">▶ TAM EKRAN BAŞLAT</button>
</div>

<div id="lobby" style="display:none">
  <input id="name" placeholder="İsim">
  <button onclick="joinLobby()">Lobiye Katıl</button>
  <button onclick="startGame()">Hazırım / Başlat</button>
  <button onclick="voteStart()">Oylama</button>
</div>

<canvas id="game"></canvas>
<div id="panel"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const canvas = game;
const ctx = canvas.getContext("2d");
canvas.width = innerWidth; canvas.height = innerHeight;

let players = {}, me=null, role=null, machines=[], sabotages={}, votes={}, time=0;
let cam={x:0,y:0};

function goFS(){
  document.documentElement.requestFullscreen();
  screen.orientation.lock("landscape");
  fs.style.display="none";
  lobby.style.display="block";
}

function joinLobby(){
  const n=name.value;
  if(!n) return alert("İsim girin");
  socket.emit("joinLobby",{name:n});
}

function startGame(){ socket.emit("startGame"); }
function voteStart(){ socket.emit("voteStart"); }

document.addEventListener("keydown",e=>{
  if(!me) return;
  const step=5;
  if(e.key==="w") me.y-=step;
  if(e.key==="s") me.y+=step;
  if(e.key==="a") me.x-=step;
  if(e.key==="d") me.x+=step;
  if(e.key==="e") checkTask();
  if(e.key==="s" && role==="HAIN") socket.emit("sabotage");
  if(e.key==="f") socket.emit("fix");
  socket.emit("move",{x:me.x,y:me.y});
});

function checkTask(){
  const m = machines.find(m=>Math.hypot(me.x-m.x,me.y-m.y)<50);
  if(m){ panel.innerHTML=`🔧 ${m}<br><button onclick="taskDone()">Görev Yap</button>`; }
}

function taskDone(){ panel.innerHTML="🛠️ Yapılıyor..."; setTimeout(()=>{socket.emit("taskDone"); panel.innerHTML="";},1500); }

socket.on("lobbyUpdate", p => { players = p; me = players[socket.id]; });
socket.on("gameStart", m => machines = m);
socket.on("updatePlayers", p => players = p);
socket.on("role", r => { role=r; alert("ROL: "+r); });
socket.on("sabotage", m => { sabotages[m]=true; panel.innerHTML=`⚠ Sabotaj: ${m}`; });
socket.on("sabotageResolved", ()=>{ sabotages={}; panel.innerHTML=""; });
socket.on("voteStart", ()=>panel.innerHTML="🗳️ OYLAMA BAŞLADI");
socket.on("voteFail", msg=>alert(msg));
socket.on("gameEnd", msg=>alert(msg));

function draw(){
  if(!me) requestAnimationFrame(draw);

  // Kamera takip
  cam.x = me.x - canvas.width/2;
  cam.y = me.y - canvas.height/2;

  ctx.fillStyle="#111"; ctx.fillRect(-cam.x,-cam.y,2200,1400);

  // Makineler
  machines.forEach(m=>{
    ctx.fillStyle="#333";
    ctx.fillRect(m.x-50-cam.x,m.y-30-cam.y,100,60);
    ctx.fillStyle="#0f0";
    ctx.fillText(m,m.x-50-cam.x,m.y-40-cam.y);
  });

  // Oyuncular
  Object.values(players).forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x-cam.x,p.y-cam.y,15,0,7);
    ctx.fillStyle=p.color;
    ctx.fill();
    ctx.fillText(p.name,p.x-20-cam.x,p.y-20-cam.y);
  });

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
