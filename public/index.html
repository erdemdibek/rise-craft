<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>HAİN</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;background:#111;color:#fff;overflow:hidden;font-family:sans-serif}
canvas{position:absolute;top:0;left:0}
#lobby{position:fixed;inset:0;background:#000e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
#status{position:fixed;top:10px;left:10px;background:#000c;padding:6px 10px;border:1px solid #666;z-index:50}
#miniMap{position:fixed;top:10px;right:10px;width:200px;height:120px;background:#0009;border:1px solid #555;z-index:50}
#log{position:fixed;bottom:10px;right:10px;width:260px;background:rgba(0,0,0,.45);padding:8px;border-radius:8px;font-size:12px;z-index:60;pointer-events:none}
.logItem{opacity:1;transition:opacity 1s;margin-bottom:4px}
#roleBox{position:fixed;top:50px;left:10px;background:#000c;padding:6px 10px;border:1px solid #666;z-index:60;display:none}
#killBtn{position:fixed;bottom:20px;right:20px;width:80px;height:80px;border-radius:50%;background:#a00;color:#fff;border:none;display:none;z-index:80}
</style>
</head>

<body>

<div id="lobby">
  <input id="name" placeholder="İsmin">
  <button id="joinBtn" onclick="join()">Katıl</button>
  <button id="readyBtn" onclick="ready()" style="display:none">Hazır</button>
  <button id="startBtn" onclick="start()" style="display:none">Başlat</button>
  <div id="players"></div>
</div>

<div id="status">Canlı: <span id="alive">0</span></div>
<div id="roleBox">ROL: <span id="roleText"></span></div>
<button id="killBtn" onclick="killPlayer()">ÖLDÜR</button>

<canvas id="game"></canvas>
<canvas id="miniMap"></canvas>
<div id="log"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* DOM */
const lobby = document.getElementById("lobby");
const joinBtn = document.getElementById("joinBtn");
const readyBtn = document.getElementById("readyBtn");
const startBtn = document.getElementById("startBtn");
const playersDiv = document.getElementById("players");
const nameInput = document.getElementById("name");
const aliveSpan = document.getElementById("alive");
const roleBox = document.getElementById("roleBox");
const roleText = document.getElementById("roleText");

/* SOCKET */
const socket = io();

/* LOG */
function log(msg){
  const box=document.getElementById("log");
  const d=document.createElement("div");
  d.className="logItem";
  d.textContent=msg;
  box.appendChild(d);
  setTimeout(()=>d.style.opacity=0,9000);
  setTimeout(()=>d.remove(),10000);
}
socket.on("log",log);

/* LOBBY */
function join(){
  const n = nameInput.value.trim();
  if(!n) return;
  socket.emit("join", n);
  joinBtn.style.display="none";
  readyBtn.style.display="inline";
}

function ready(){ socket.emit("ready"); }
function start(){ socket.emit("start"); }

socket.on("lobby",data=>{
  playersDiv.innerHTML="";
  data.players.forEach(p=>{
    playersDiv.innerHTML += `${p.name} ${p.ready?"✔️":"❌"} ${p.admin?"(Admin)":""}<br>`;
    if(p.id===socket.id && p.admin)
      startBtn.style.display = data.canStart ? "inline" : "none";
  });
});

/* GAME */
socket.on("gameStarted",()=>{
  lobby.style.display="none";
  log("🎮 Oyun başladı");
});

socket.on("role",r=>{
  roleBox.style.display="block";
  roleText.textContent=r;
  document.getElementById("killBtn").style.display = r==="Hain"?"block":"none";
});

socket.on("state",s=>{
  aliveSpan.textContent = s.players.filter(p=>p.alive).length;
});
</script>
</body>
</html>
