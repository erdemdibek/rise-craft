<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>HAİN</title>
<style>
html,body{margin:0;background:#111;color:#fff;overflow:hidden;font-family:sans-serif}
canvas{display:block}
#tasks,#hint{position:absolute;z-index:20;font-size:18px;font-weight:bold;text-shadow:0 0 5px #000;}
#tasks{top:10px;right:10px;color:#0f0;}
#hint{bottom:120px;left:50%;transform:translateX(-50%);color:#ff0;}
#joystick{position:fixed;left:30px;bottom:30px;width:120px;height:120px;border-radius:50%;background:#3338;display:none;z-index:10}
#stick{position:absolute;left:35px;top:35px;width:50px;height:50px;border-radius:50%;background:#0f08}
#actionButtons{position:absolute;bottom:30px;right:30px;display:none;z-index:20}
#voteMenu{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:30;color:#fff;}
#voteMenu h2{margin-bottom:20px;font-size:24px;}
.voteOption{padding:12px 24px;margin:5px;background:#222;border:1px solid #fff;cursor:pointer;font-size:20px;border-radius:8px;transition:0.2s;}
.voteOption:hover{background:#444;transform:scale(1.05);}
#minimap{position:absolute;bottom:10px;right:10px;width:150px;height:150px;background:#0008;border:2px solid #fff;z-index:20}
</style>
</head>
<body>
<div id="tasks">Görev: 0</div>
<div id="hint"></div>
<canvas id="game"></canvas>
<canvas id="minimap"></canvas>
<div id="joystick"><div id="stick"></div></div>
<div id="actionButtons">
  <button id="fixBtn">E: Görev</button>
  <button id="killBtn">Q: Öldür</button>
</div>
<div id="voteMenu">
  <h2>Oylama Başladı!</h2>
  <div id="voteOptions"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const minimap = document.getElementById("minimap");
const minimapCtx = minimap.getContext("2d");
const voteMenu = document.getElementById("voteMenu");
const voteOptions = document.getElementById("voteOptions");
const tasksDiv = document.getElementById("tasks");
const hintDiv = document.getElementById("hint");

let me=null, players={}, machines=[], camX=0, camY=0;

const MAP_W=2000, MAP_H=1200, VISION_OPERATOR=180, VISION_HAIN=260;

/* --- Resize --- */
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
resize();
addEventListener("resize",resize);

/* --- DRAW --- */
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!me) return; // me gelene kadar bekle

  camX = me.x - canvas.width/2;
  camY = me.y - canvas.height/2;

  // FOG
  ctx.save();
  ctx.fillStyle="rgba(0,0,0,0.5)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.globalCompositeOperation="destination-out";
  const vision = me.role==="Hain"?VISION_HAIN:VISION_OPERATOR;
  ctx.beginPath();
  ctx.arc(me.x-camX, me.y-camY, vision, 0, Math.PI*2);
  ctx.fill();
  ctx.globalCompositeOperation="source-over";

  // Machines
  machines.forEach(m=>{
    if(!m) return;
    const distM=Math.hypot(m.x-me.x, m.y-me.y);
    if(distM<vision || !me.alive){
      ctx.fillStyle=m.broken?"#f33":"#0f0";
      ctx.shadowColor="#000"; ctx.shadowBlur=8;
      ctx.fillRect(m.x-camX-25,m.y-camY-25,50,50);
      ctx.shadowBlur=0;
      ctx.fillStyle="#fff";
      ctx.font="16px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="bottom";
      ctx.fillText(m.name,m.x-camX,m.y-camY-30);
    }
  });

  // Players
  Object.values(players).forEach(p=>{
    if(!p) return;
    const distP=Math.hypot(p.x-me.x,p.y-me.y);
    if(distP<vision || !me.alive){
      ctx.beginPath(); ctx.arc(p.x-camX,p.y-camY,25,0,Math.PI*2);
      ctx.fillStyle=p.alive?p.color:"#888";
      ctx.shadowColor="#000"; ctx.shadowBlur=10; ctx.fill(); ctx.shadowBlur=0;
      ctx.fillStyle="#fff"; ctx.font="16px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="top";
      ctx.fillText(p.name+(p.alive?"":" (ÖLÜ)"),p.x-camX,p.y-camY+30);
    }
  });

  ctx.restore();

  // Minimap
  minimapCtx.clearRect(0,0,150,150);
  Object.values(players).forEach(p=>{
    if(!p) return;
    minimapCtx.fillStyle=p.alive?p.color:"#444";
    minimapCtx.fillRect(p.x/MAP_W*150,p.y/MAP_H*150,5,5);
  });
  machines.forEach(m=>{
    if(!m) return;
    minimapCtx.fillStyle=m.broken?"#f33":"#0f0";
    minimapCtx.fillRect(m.x/MAP_W*150,m.y/MAP_H*150,5,5);
  });

  requestAnimationFrame(draw);
}
draw();

/* --- Socket Events --- */
socket.on("lobbyUpdate",d=>{
  d.players.forEach(p=>players[p.id]=p);
  machines=d.machines;
  me=players[socket.id];
});
socket.on("machinesUpdate",m=>machines=m);
socket.on("state",d=>{
  d.players.forEach(p=>players[p.id]?Object.assign(players[p.id],p):players[p.id]=p);
  me=players[socket.id];
  tasksDiv.innerText="Görev: "+(me?.tasksCompleted||0);
});
socket.on("playerKilled",id=>players[id]&&(players[id].alive=false));

/* --- Hain ipucu --- */
function updateHint(){
  if(!me || !me.alive){hintDiv.innerText=""; return;}
  // Makine ipucu
  const m = machines.find(m=>m&&Math.hypot(m.x-me.x,m.y-me.y)<50);
  if(me.role==="Operatör" && m?.broken){hintDiv.innerText="E → Görevi Yap"; return;}
  // Hain öldürme ipucu
  if(me.role==="Hain"){
    const target = Object.values(players).find(p=>p.id!==me.id && p.alive && Math.hypot(p.x-me.x,p.y-me.y)<80);
    if(target){hintDiv.innerText="Q → Öldür"; return;}
  }
  hintDiv.innerText="";
}
setInterval(updateHint,100);

fixBtn.onclick=()=>{const m=machines.find(m=>m&&Math.hypot(m.x-me.x,m.y-me.y)<50); if(m && me.role==="Operatör" && m.broken) socket.emit("action",{type:"fixMachine",machineIndex:machines.indexOf(m)});}
killBtn.onclick=()=>{if(me.role==="Hain") Object.values(players).forEach(p=>{if(p.id!==me.id && p.alive && Math.hypot(p.x-me.x,p.y-me.y)<80) socket.emit("killPlayer",p.id);});}
</script>
</body>
</html>
