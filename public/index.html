<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>HAİN</title>
<style>
html,body{margin:0;background:#111;color:#fff;overflow:hidden;font-family:sans-serif}
#ui{position:absolute;top:10px;left:10px;z-index:20}
canvas{display:block}
#joystick{position:fixed;left:30px;bottom:30px;width:120px;height:120px;border-radius:50%;background:#3338;display:none}
#stick{position:absolute;left:35px;top:35px;width:50px;height:50px;border-radius:50%;background:#0f08}
#actionButtons{position:absolute;bottom:30px;right:30px;display:none}
#voteMenu{position:fixed;inset:0;background:#000c;display:none;align-items:center;justify-content:center;flex-direction:column}
.voteOption{padding:10px 20px;margin:5px;border:1px solid #fff;cursor:pointer}
</style>
</head>
<body>

<div id="ui">
  <input id="nameInput" placeholder="İsmin">
  <button id="joinBtn">Katıl</button>
  <button id="readyBtn" style="display:none">Hazır</button>
  <div id="role"></div>
</div>

<canvas id="game"></canvas>
<div id="joystick"><div id="stick"></div></div>

<div id="actionButtons">
  <button id="fixBtn">Görev</button>
  <button id="killBtn">Öldür</button>
</div>

<div id="voteMenu">
  <h2>Oylama</h2>
  <div id="voteOptions"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io();
const c=document.getElementById("game");
const ctx=c.getContext("2d");
let me=null,players={},machines=[];
const MAP_W=2000,MAP_H=1200;
const VISION_O=180,VISION_H=260;

function resize(){c.width=innerWidth;c.height=innerHeight}
resize();addEventListener("resize",resize);

/* JOIN */
joinBtn.onclick=()=>socket.emit("joinLobby",{name:nameInput.value},r=>{
  if(r.error) alert(r.error);
  else{joinBtn.style.display="none";nameInput.style.display="none";readyBtn.style.display="inline";}
});
readyBtn.onclick=()=>socket.emit("playerReady");

/* SOCKET */
socket.on("lobbyUpdate",d=>{
  d.players.forEach(p=>players[p.id]=p);
  machines=d.machines;
  me=players[socket.id];
});
socket.on("rolesAssigned",r=>{
  const m=r.find(x=>x.id===socket.id);
  role.innerText="ROL: "+m.role;
  killBtn.style.display=m.role==="Hain"?"inline":"none";
});
socket.on("gameStart",()=>{joystick.style.display="block";actionButtons.style.display="block"});
socket.on("state",d=>{
  d.players.forEach(p=>players[p.id]=p);
  me=players[socket.id];
});
socket.on("machinesUpdate",m=>machines=m);
socket.on("playerKilled",id=>players[id].alive=false);

/* DRAW */
function draw(){
  ctx.fillStyle="#2a2a2a";
  ctx.fillRect(0,0,c.width,c.height);

  if(!me){requestAnimationFrame(draw);return;}
  const camX=me.x-c.width/2, camY=me.y-c.height/2;
  const vision=me.role==="Hain"?VISION_H:VISION_O;

  machines.forEach(m=>{
    if(Math.hypot(m.x-me.x,m.y-me.y)<vision){
      ctx.fillStyle=m.broken?"red":"lime";
      ctx.fillRect(m.x-camX-20,m.y-camY-20,40,40);
    }
  });

  Object.values(players).forEach(p=>{
    if(Math.hypot(p.x-me.x,p.y-me.y)<vision){
      ctx.beginPath();
      ctx.arc(p.x-camX,p.y-camY,20,0,Math.PI*2);
      ctx.fillStyle=p.alive?p.color:"#555";
      ctx.fill();
    }
  });

  requestAnimationFrame(draw);
}
draw();

/* JOYSTICK */
let jx=0,jy=0,joy=false,sx=0,sy=0;
joystick.ontouchstart=e=>{joy=true;sx=e.touches[0].clientX;sy=e.touches[0].clientY};
joystick.ontouchmove=e=>{
  if(!joy||!me)return;
  jx=e.touches[0].clientX-sx;
  jy=e.touches[0].clientY-sy;
};
joystick.ontouchend=()=>{joy=false;jx=jy=0};

setInterval(()=>{
  if(!me||!me.alive)return;
  me.x=Math.max(20,Math.min(MAP_W-20,me.x+jx*0.1));
  me.y=Math.max(20,Math.min(MAP_H-20,me.y+jy*0.1));
  socket.emit("move",{x:me.x,y:me.y});
},50);

/* ACTIONS */
killBtn.onclick=()=>{
  Object.values(players).forEach(p=>{
    if(p.id!==me.id&&p.alive&&Math.hypot(p.x-me.x,p.y-me.y)<60)
      socket.emit("killPlayer",p.id);
  });
};
fixBtn.onclick=()=>{
  const m=machines.find(x=>Math.hypot(x.x-me.x,x.y-me.y)<60);
  if(m) socket.emit("action",{type:"fixMachine",machineIndex:machines.indexOf(m)});
};
</script>
</body>
</html>
