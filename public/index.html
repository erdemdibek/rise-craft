<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>HAİN</title>

<style>
html,body{
  margin:0;padding:0;width:100%;height:100%;
  background:#111;color:#fff;overflow:hidden;
  font-family:sans-serif
}
canvas{position:absolute;top:0;left:0}

/* LOBBY */
#lobby{
  position:fixed;inset:0;
  background:#000e;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:100
}

/* UI */
#miniMap{
  position:fixed;
  top:10px;
  right:10px;
  width:200px;
  height:120px;
  background:#000c;
  border:1px solid #666;
  z-index:50
}

#status{
  position:fixed;
  top:10px;
  left:10px;
  background:#000c;
  padding:6px 10px;
  border:1px solid #666;
  z-index:50
}

#log{
  position:fixed;
  bottom:10px;
  right:10px;
  width:160px;
  height:80px;
  font-size:10px;
  background:#000c;
  padding:4px;
  overflow:auto;
  z-index:50
}
</style>
</head>

<body>

<div id="lobby">
  <input id="name" placeholder="İsmin">
  <button onclick="join()">Katıl</button>
  <button id="readyBtn" onclick="ready()" style="display:none">Hazır</button>
  <button id="startBtn" onclick="start()" style="display:none">Başlat</button>
  <div id="players"></div>
</div>

<div id="status">Oyuncu: <span id="alive">0</span></div>
<canvas id="game"></canvas>
<canvas id="miniMap"></canvas>
<div id="log"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const map = document.getElementById("miniMap");
const mctx = map.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;
addEventListener("resize",()=>{
  canvas.width = innerWidth;
  canvas.height = innerHeight;
});

const MAP_W = 2000, MAP_H = 1200;

let state = null;
let me = null;
let started = false;

/* LOG */
function log(t){
  const d=document.getElementById("log");
  d.innerHTML+=t+"<br>";
  d.scrollTop=d.scrollHeight;
}

/* LOBBY */
function join(){
  const n=document.getElementById("name").value;
  if(!n) return;
  socket.emit("join",n);
}
function ready(){ socket.emit("ready"); }
function start(){ socket.emit("start"); }

socket.on("lobby",data=>{
  const p=document.getElementById("players");
  p.innerHTML="";
  data.players.forEach(x=>{
    p.innerHTML+=`${x.name} ${x.ready?"✔️":"❌"}${x.admin?" (Admin)":""}<br>`;
    if(x.id===socket.id && x.admin){
      document.getElementById("startBtn").style.display=data.canStart?"inline":"none";
    }
  });
  document.getElementById("readyBtn").style.display="inline";
});

/* GAME START */
socket.on("gameStarted",()=>{
  started=true;
  document.getElementById("lobby").style.display="none";
  log("🎮 Oyun başladı");
});

/* STATE */
socket.on("state",s=>{
  state=s;
  me=s.players.find(p=>p.id===socket.id);
  document.getElementById("alive").innerText=s.players.length;
});

/* DRAW */
function draw(){
  requestAnimationFrame(draw);
  if(!started||!state||!me) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.font="12px Arial";

  const camX = me.x - canvas.width/2;
  const camY = me.y - canvas.height/2;

  state.machines.forEach(m=>{
    ctx.fillStyle=m.broken?"red":"lime";
    ctx.fillRect(m.x-camX-15,m.y-camY-15,30,30);
    ctx.fillStyle="#fff";
    ctx.fillText(m.name,m.x-camX-20,m.y-camY-20);
  });

  state.players.forEach(p=>{
    if(!p.alive) return;
    ctx.beginPath();
    ctx.arc(p.x-camX,p.y-camY,15,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.fill();
    ctx.fillStyle="#fff";
    ctx.fillText(p.name,p.x-camX-15,p.y-camY-20);
  });

  drawMini();
}
draw();

function drawMini(){
  mctx.clearRect(0,0,200,120);
  state.players.forEach(p=>{
    if(!p.alive) return;
    mctx.fillStyle=p.color;
    mctx.fillRect(p.x/MAP_W*200,p.y/MAP_H*120,4,4);
  });
}

/* INPUT */
let keys={};
addEventListener("keydown",e=>keys[e.key]=true);
addEventListener("keyup",e=>keys[e.key]=false);

setInterval(()=>{
  if(!started||!me) return;
  let dx=0,dy=0;
  if(keys.w||keys.ArrowUp) dy=-1;
  if(keys.s||keys.ArrowDown) dy=1;
  if(keys.a||keys.ArrowLeft) dx=-1;
  if(keys.d||keys.ArrowRight) dx=1;
  if(dx||dy) socket.emit("move",{dx,dy});
},50);
</script>
</body>
</html>
