<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>HAİN</title>

<style>
html,body{
  margin:0;padding:0;width:100%;height:100%;
  background:#111;color:#fff;overflow:hidden;
  font-family:sans-serif
}
canvas{position:absolute;top:0;left:0}

/* LOBBY */
#lobby{
  position:fixed;inset:0;
  background:#000e;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:100
}

/* UI */
#miniMap{
  position:fixed;
  top:10px;
  right:10px;
  width:200px;
  height:120px;
  background:#000c;
  border:1px solid #666;
  z-index:50
}
#status{
  position:fixed;
  top:10px;
  left:10px;
  background:#000c;
  padding:6px 10px;
  border:1px solid #666;
  z-index:50
}

/* LOG */
#log{
  position:fixed;
  bottom:10px;
  right:10px;
  width:200px;
  font-size:11px;
  z-index:50;
  pointer-events:none
}
.logItem{
  opacity:1;
  transition:opacity 1s;
}

/* ROLE */
#roleBox{
  position:fixed;
  top:50px;
  left:10px;
  background:#000c;
  padding:6px 10px;
  border:1px solid #666;
  z-index:60;
  display:none
}

/* KILL */
#killBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:80px;
  height:80px;
  border-radius:50%;
  background:#a00;
  color:#fff;
  border:none;
  font-size:14px;
  display:none;
  z-index:80
}

/* JOYSTICK */
#joystick{
  position:fixed;
  bottom:20px;
  left:20px;
  width:90px;
  height:90px;
  border-radius:50%;
  background:#3338;
  display:none;
  z-index:80
}
#stick{
  position:absolute;
  left:30px;
  top:30px;
  width:30px;
  height:30px;
  border-radius:50%;
  background:#0f8
}

/* MEETING */
#meeting{
  position:fixed;inset:0;
  background:#000e;
  display:none;
  z-index:200;
  text-align:center;
  padding-top:40px
}
#meeting button{
  margin:6px;
  padding:10px 20px;
  font-size:16px;
}
</style>
</head>

<body>

<div id="lobby">
  <input id="name" placeholder="İsmin">
  <button id="joinBtn" onclick="join()">Katıl</button>
  <button id="readyBtn" onclick="ready()" style="display:none">Hazır</button>
  <button id="startBtn" onclick="start()" style="display:none">Başlat</button>
  <div id="players"></div>
</div>

<div id="status">Canlı: <span id="alive">0</span></div>
<div id="roleBox">ROL: <span id="roleText"></span></div>
<button id="killBtn">ÖLDÜR</button>

<canvas id="game"></canvas>
<canvas id="miniMap"></canvas>
<div id="log"></div>

<div id="joystick"><div id="stick"></div></div>

<div id="meeting">
  <h2>🗳️ OYLAMA</h2>
  <div id="voteList"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io();
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const map=document.getElementById("miniMap");
const mctx=map.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;
addEventListener("resize",()=>{canvas.width=innerWidth;canvas.height=innerHeight});

const MAP_W=2000,MAP_H=1200;
let state=null,me=null,started=false,myRole=null;

/* LOG */
function log(t){
  const d=document.getElementById("log");
  const p=document.createElement("div");
  p.className="logItem";
  p.innerText=t;
  d.appendChild(p);
  setTimeout(()=>p.style.opacity=0,9000);
  setTimeout(()=>p.remove(),10000);
}

/* LOBBY */
function join(){
  const n=document.getElementById("name").value;
  if(!n) return;
  socket.emit("join",n);

  document.getElementById("joinBtn").style.display="none";
  document.getElementById("readyBtn").style.display="inline"; // ✅ FIX
}

function ready(){ socket.emit("ready") }
function start(){ socket.emit("start") }

socket.on("lobby",data=>{
  const p=document.getElementById("players");
  p.innerHTML="";
  data.players.forEach(x=>{
    p.innerHTML+=`${x.name} ${x.ready?"✔️":"❌"}${x.admin?" (Admin)":""}<br>`;
    if(x.id===socket.id && x.admin)
      document.getElementById("startBtn").style.display=data.canStart?"inline":"none";
  });
});

/* ROLE */
socket.on("role",r=>{
  myRole=r;
  document.getElementById("roleBox").style.display="block";
  document.getElementById("roleText").innerText=r;
  if(r==="Hain") document.getElementById("killBtn").style.display="block";
});

socket.on("gameStarted",()=>{
  started=true;
  document.getElementById("lobby").style.display="none";
  log("🎮 Oyun başladı");
});

/* STATE */
socket.on("state",s=>{
  state=s;
  me=s.players.find(p=>p.id===socket.id);
  document.getElementById("alive").innerText=s.players.filter(p=>p.alive).length;
});

/* DRAW */
function draw(){
  requestAnimationFrame(draw);
  if(!started||!state||!me) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const camX=me.x-canvas.width/2;
  const camY=me.y-canvas.height/2;

  state.players.forEach(p=>{
    if(!p.alive && p.id!==me.id) return;
    ctx.beginPath();
    ctx.arc(p.x-camX,p.y-camY,15,0,Math.PI*2);
    ctx.fillStyle=p.alive?p.color:"#666";
    ctx.fill();
    ctx.fillStyle="#fff";
    ctx.fillText(p.name,p.x-camX-15,p.y-camY-20);
  });
  drawMini();
}
draw();

function drawMini(){
  mctx.clearRect(0,0,200,120);
  state.players.forEach(p=>{
    if(p.alive){
      mctx.fillStyle=p.color;
      mctx.fillRect(p.x/MAP_W*200,p.y/MAP_H*120,4,4);
    }
  });
}

/* INPUT */
let keys = {};
addEventListener("keydown", e => keys[e.key] = true);
addEventListener("keyup", e => keys[e.key] = false);

setInterval(()=>{
  if(!started || !me) return;

  let dx = 0, dy = 0;

  if(keys["w"] || keys["ArrowUp"]) dy -= 1;
  if(keys["s"] || keys["ArrowDown"]) dy += 1;
  if(keys["a"] || keys["ArrowLeft"]) dx -= 1;
  if(keys["d"] || keys["ArrowRight"]) dx += 1;

  if(dx || dy){
    socket.emit("move",{ dx, dy });
  }
},50);

/* JOYSTICK */
const joystick=document.getElementById("joystick");
const stick=document.getElementById("stick");
let joyX=0,joyY=0,joy=false;
const center=45,max=30;
if("ontouchstart"in window) joystick.style.display="block";

joystick.ontouchstart=()=>joy=true;
joystick.ontouchmove=e=>{
  if(!joy) return;
  const t=e.touches[0];
  const r=joystick.getBoundingClientRect();
  let x=t.clientX-r.left-center;
  let y=t.clientY-r.top-center;
  const d=Math.hypot(x,y);
  if(d>max){x=x/d*max;y=y/d*max;}
  stick.style.left=center+x-15+"px";
  stick.style.top=center+y-15+"px";
  joyX=x/max; joyY=y/max;
};
joystick.ontouchend=()=>{
  joy=false; joyX=joyY=0;
  stick.style.left="30px"; stick.style.top="30px";
};

setInterval(()=>{
  if(started&&me&&(Math.abs(joyX)>0.1||Math.abs(joyY)>0.1))
    socket.emit("move",{dx:joyX,dy:joyY});
},50);

/* MEETING */
const meeting=document.getElementById("meeting");
const voteList=document.getElementById("voteList");

socket.on("meetingStart",list=>{
  if(!me.alive) return;
  meeting.style.display="block";
  voteList.innerHTML="";
  list.forEach(p=>{
    if(p.id===socket.id) return;
    const b=document.createElement("button");
    b.innerText=p.name;
    b.onclick=()=>{
      socket.emit("vote",p.id);
      meeting.style.display="none";
    };
    voteList.appendChild(b);
  });
});

socket.on("meetingEnd",()=>meeting.style.display="none");
</script>
</body>
</html>
