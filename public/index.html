<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>HAİN 3D</title>
<style>
html,body{margin:0;background:#000;color:#fff;overflow:hidden}
#lobby,#panel{position:absolute;z-index:9}
#lobby{top:10px;left:10px}
#panel{bottom:0;width:100%;background:#000c;padding:10px}
canvas{display:block}
button,input{font-size:16px;margin:3px}
#fs{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000}
</style>
</head>
<body>

<div id="fs">
  <button onclick="goFS()">▶ TAM EKRAN BAŞLAT</button>
</div>

<div id="lobby" style="display:none">
  <input id="name" placeholder="İsim">
  <button onclick="joinLobby()">Lobiye Gir</button>
  <button onclick="ready()">Hazırım</button>
  <div id="playersList"></div>
</div>

<canvas id="game" width="800" height="400"></canvas>
<div id="panel"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io();
const c=game,ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;

let players={},me=null,role=null,activeSabotage=null,time=300;
let cam={x:0,y:0};
const machines=[
"Fette 1200","Fette 2200","Kilian KTP 720","Korsch XL 400",
"Bosch GKF 701","Fette 3200","Korsch XT600","Fette Fe55",
"Sejong","Fette 2100"
].map((n,i)=>({n,x:300+(i%5)*350,y:300+Math.floor(i/5)*400}));

// TAM EKRAN
function goFS(){
  document.documentElement.requestFullscreen();
  screen.orientation.lock("landscape");
  fs.style.display="none";
  lobby.style.display="block";
}

// LOBİ
function joinLobby(){
  socket.emit("joinLobby", name.value);
}
function ready(){
  socket.emit("ready");
}

// SOCKET EVENTS
socket.on("players", p=>{
  players=p;
  playersList.innerHTML=Object.values(p).map(x=>x.name+" "+(x.ready?"✅":"")).join("<br>");
  me=players[socket.id];
});
socket.on("role", r=>{role=r;alert("ROL: "+r)});
socket.on("gameStart", data=>{
  lobby.style.display="none";
  me=players[socket.id];
});
socket.on("timer", t=>time=t);
socket.on("sabotage", s=>{
  activeSabotage=s;
  panel.innerHTML="⚠️ Sabotaj: "+s;
});
socket.on("sabotageFix", ()=>activeSabotage=null);
socket.on("voteStart", ()=>panel.innerHTML="🗳️ Oylama başladı");
socket.on("gameOver", m=>alert(m));

// MOBİL HAREKET
document.addEventListener("touchstart",e=>{
 if(!me)return;
 let t=e.touches[0];
 me.x+=t.clientX>c.width/2?40:-40;
 me.y+=t.clientY>c.height/2?40:-40;
 me.x=Math.max(0,Math.min(me.x,c.width));
 me.y=Math.max(0,Math.min(me.y,c.height));
 socket.emit("move",{x:me.x,y:me.y});
});
document.onkeydown=e=>{
 if(!me)return;
 if(e.key==="e"){
   const m=machines.find(m=>Math.hypot(me.x-m.x,me.y-m.y)<80);
   if(m) panel.innerHTML=`🔧 ${m.n}<br><button onclick="task()">Görev Yap</button>`;
 }
 if(e.key==="s" && role==="HAIN") socket.emit("sabotage");
 if(e.key==="f") socket.emit("fix");
};
function task(){
  panel.innerHTML="🛠️ Yapılıyor...";
  setTimeout(()=>{
    socket.emit("taskDone");
    panel.innerHTML="";
  },1500);
}

// ÇİZİM
function draw(){
 ctx.clearRect(0,0,c.width,c.height);
 ctx.fillStyle="#111";
 ctx.fillRect(-cam.x,-cam.y,c.width,c.height);

 // makineler
 machines.forEach(m=>{
   ctx.fillStyle="#333";
   ctx.fillRect(m.x-50-cam.x,m.y-30-cam.y,100,60);
   ctx.fillStyle="#0f0";
   ctx.fillText(m.n,m.x-50-cam.x,m.y-40-cam.y);
 });

 // oyuncular
 Object.values(players).forEach(p=>{
   ctx.beginPath();
   ctx.arc(p.x-cam.x,p.y-cam.y,15,0,7);
   ctx.fillStyle=p.color;
   ctx.fill();
   ctx.fillText(p.name,p.x-20-cam.x,p.y-20-cam.y);
 });

 // timer ve sabotaj
 ctx.fillStyle="#fff";
 ctx.fillText("⏱ "+time,20,20);
 if(activeSabotage) ctx.fillText("⚠ "+activeSabotage,300,20);

 requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
