<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HAİN</title>
<style>
html,body{margin:0;background:#000;color:#fff;overflow:hidden;font-family:Arial}
#ui{position:absolute;top:10px;left:10px;z-index:5}
#panel{position:absolute;bottom:0;width:100%;background:#000c;padding:10px}
#joy{position:absolute;bottom:80px;left:30px;width:100px;height:100px;border-radius:50%;background:#333}
#stick{width:40px;height:40px;border-radius:50%;background:#999;position:absolute;left:30px;top:30px}
canvas{display:block}
button,input{font-size:16px;margin:4px}
</style>
</head>
<body>

<div id="ui">
<input id="name" placeholder="İsmin">
<button onclick="join()">Lobiye Gir</button>
<button onclick="start()">Oyunu Başlat</button>
</div>

<canvas id="game"></canvas>
<div id="panel"></div>

<div id="joy"><div id="stick"></div></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const c = game;
const ctx = c.getContext("2d");
c.width = innerWidth;
c.height = innerHeight;

let players={}, me=null, role=null, cam={x:0,y:0};
const WORLD={w:2400,h:1600};

const machines = Array.from({length:10}).map((_,i)=>({
  x:400+(i%5)*350,
  y:400+Math.floor(i/5)*400,
  name:"Makine "+(i+1)
}));

function join(){
  socket.emit("joinLobby",{name:name.value});
}

function start(){
  socket.emit("startGame");
}

socket.on("lobbyUpdate", p=>{
  players=p;
  me=players[socket.id];
});

socket.on("players", p=>{
  players=p;
  me=players[socket.id];
});

socket.on("role", r=>{
  role=r;
  alert("ROL: "+r);
});

socket.on("gameStart", ()=>{
  panel.innerHTML="🎮 Oyun Başladı";
});

socket.on("sabotage", s=>{
  panel.innerHTML=s;
  setTimeout(()=>panel.innerHTML="",2000);
});

function draw(){
  if(me){
    cam.x = me.x - c.width/2;
    cam.y = me.y - c.height/2;
  }

  ctx.clearRect(0,0,c.width,c.height);
  ctx.fillStyle="#111";
  ctx.fillRect(-cam.x,-cam.y,WORLD.w,WORLD.h);

  machines.forEach(m=>{
    ctx.fillStyle="#444";
    ctx.fillRect(m.x-50-cam.x,m.y-30-cam.y,100,60);
    ctx.fillStyle="#0f0";
    ctx.fillText(m.name,m.x-40-cam.x,m.y-40-cam.y);
  });

  Object.values(players).forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x-cam.x,p.y-cam.y,15,0,7);
    ctx.fillStyle=p.color;
    ctx.fill();
    ctx.fillText(p.name,p.x-20-cam.x,p.y-20-cam.y);
  });

  requestAnimationFrame(draw);
}
draw();

// JOYSTICK
let dragging=false;
joy.addEventListener("touchstart",()=>dragging=true);
joy.addEventListener("touchend",()=>{
  dragging=false;
  stick.style.left="30px";
  stick.style.top="30px";
});
joy.addEventListener("touchmove",e=>{
  if(!dragging||!me)return;
  let t=e.touches[0];
  let dx=t.clientX-joy.offsetLeft-50;
  let dy=t.clientY-joy.offsetTop-50;
  me.x+=dx*0.05;
  me.y+=dy*0.05;
  socket.emit("move",{x:me.x,y:me.y});
});
</script>
</body>
</html>
