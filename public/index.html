<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hain vs Operatör</title>
<style>
  /* GENEL */
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Arial', sans-serif; }
  body, html { width:100%; height:100%; background:#2b2b2b; overflow:hidden; }

  /* LOBBY */
  #lobby { position:absolute; top:0; left:0; width:100%; height:100%; background:#1c1c1c; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; z-index:100; }
  #lobby input { padding:10px; font-size:16px; border-radius:8px; border:none; }
  #lobby button { padding:10px 20px; font-size:16px; border:none; border-radius:8px; cursor:pointer; background:#0077ff; color:#fff; transition:0.2s; }
  #lobby button:hover { background:#005fcc; }
  #playersList { background:rgba(0,0,0,0.5); color:#fff; padding:10px; border-radius:8px; max-height:150px; overflow-y:auto; width:200px; text-align:center; }

  /* LOG BAR */
  #logBar { position:absolute; bottom:0; left:0; width:100%; max-height:150px; overflow-y:auto; background:rgba(0,0,0,0.6); color:#fff; font-size:14px; padding:5px; z-index:101; }

  /* PHASER CANVAS */
  canvas { display:block; width:100% !important; height:100% !important; }

  /* BUTONLAR */
  .ui-button { position:absolute; bottom:10px; padding:10px 20px; border-radius:12px; color:#fff; font-weight:bold; font-size:16px; cursor:pointer; user-select:none; z-index:102; text-align:center; }
  #repairBtn { background:#00aa00; right:20px; }
  #killBtn { background:#aa0000; right:20px; bottom:80px; }
  #meetingBtn { background:#0000aa; right:20px; bottom:150px; }

</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <input type="text" id="nameInput" placeholder="İsminizi girin">
  <button id="joinBtn">Katıl</button>
  <button id="readyBtn">Hazır</button>
  <button id="startBtn" style="display:none;">Oyunu Başlat</button>
  <div id="playersList"></div>
</div>

<!-- LOG BAR -->
<div id="logBar"></div>

<!-- Phaser UI BUTTONS (opsiyonel, JS ile de yaratılıyor) -->
<div id="repairBtn" class="ui-button">TAMİR ET</div>
<div id="killBtn" class="ui-button">ÖLDÜR</div>
<div id="meetingBtn" class="ui-button">TOPLANTI</div>

<!-- SOCKET.IO + PHASER -->
<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
<script src="main.js"></script>

</body>
</html>
