<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>HAİN 3D LOBBY</title>
<style>
html,body{margin:0;background:#111;color:white;overflow:hidden;font-family:Arial}
#ui{position:absolute;top:10px;left:10px;z-index:9}
#panel{position:absolute;bottom:0;width:100%;background:#000c;padding:10px}
button,input{font-size:16px;margin:3px}
canvas{display:block}

#joystick{
  position:absolute;bottom:80px;left:30px;
  width:120px;height:120px;border-radius:50%;
  background:#2227;display:none;touch-action:none;z-index:5;
}
#joystickThumb{
  position:absolute;width:50px;height:50px;
  background:#0f07;border-radius:50%;top:35px;left:35px;
}

#rotateLock{
  position:fixed;inset:0;background:#000;
  display:none;align-items:center;justify-content:center;
  text-align:center;z-index:999;
}
</style>
</head>

<body>

<div id="rotateLock"><h2>📱 Telefonu YATAY çevir</h2></div>

<div id="ui">
  <input id="name" placeholder="İsmin">
  <button id="joinBtn">Lobiye Katıl</button>
  <button id="readyBtn">Hazır</button>
</div>

<canvas id="game"></canvas>
<div id="panel"></div>

<div id="joystick">
  <div id="joystickThumb"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const MAP_WIDTH=2000, MAP_HEIGHT=1200, PLAYER_SPEED=3;

const socket=io();
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
window.addEventListener("resize",resize);
resize();

const rotateLock=document.getElementById("rotateLock");
function checkOrientation(){
  rotateLock.style.display = innerHeight>innerWidth ? "flex":"none";
}
window.addEventListener("resize",checkOrientation);
checkOrientation();

let me=null, players={}, machines=[];
let time=300, sabotage=null;
let cam={x:0,y:0};

joinBtn.onclick=()=>{
  const name=document.getElementById("name").value;
  if(!name) return alert("İsim gir");
  socket.emit("joinLobby",{name});
};

readyBtn.onclick=()=>socket.emit("playerReady");

/* 🔥 KRİTİK DÜZELTME BURADA */
socket.on("lobbyUpdate",d=>{
  players={};
  d.players.forEach(p=>players[p.id]=p);
  machines=d.machines;

  if(!me && players[socket.id]){
    me = players[socket.id];
  }
});

socket.on("gameStart",d=>{
  d.players.forEach(p=>players[p.id]=p);
  machines=d.machines;
  me=players[socket.id];
  joystick.style.display="block";
});

socket.on("state",d=>{
  d.players.forEach(p=>players[p.id]=p);
  time=d.time;
  sabotage=d.sabotage;
  me=players[socket.id];
});

socket.on("gameEnd",msg=>{
  alert(msg);
  joystick.style.display="none";
  me=null;
});

function clamp(){
  me.x=Math.max(20,Math.min(MAP_WIDTH-20,me.x));
  me.y=Math.max(20,Math.min(MAP_HEIGHT-20,me.y));
}

function draw(){
  if(me){
    cam.x=Math.max(0,Math.min(MAP_WIDTH-canvas.width,me.x-canvas.width/2));
    cam.y=Math.max(0,Math.min(MAP_HEIGHT-canvas.height,me.y-canvas.height/2));
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#222";
  ctx.fillRect(-cam.x,-cam.y,MAP_WIDTH,MAP_HEIGHT);

  machines.forEach(m=>{
    ctx.fillStyle="#666";
    ctx.fillRect(m.x-50-cam.x,m.y-30-cam.y,100,60);
    ctx.fillStyle="#0f0";
    ctx.fillText(m.name,m.x-40-cam.x,m.y-40-cam.y);
  });

  Object.values(players).forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x-cam.x,p.y-cam.y,20,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.fill();
    ctx.fillText(p.name,p.x-20-cam.x,p.y-30-cam.y);
  });

  ctx.fillStyle="#fff";
  ctx.fillText("⏱ "+time,20,30);
  if(sabotage) ctx.fillText("⚠️ "+sabotage,200,30);

  requestAnimationFrame(draw);
}
draw();

document.addEventListener("keydown",e=>{
  if(!me) return;
  if(e.key==="w") me.y-=PLAYER_SPEED;
  if(e.key==="s") me.y+=PLAYER_SPEED;
  if(e.key==="a") me.x-=PLAYER_SPEED;
  if(e.key==="d") me.x+=PLAYER_SPEED;
  clamp();
  socket.emit("move",{x:me.x,y:me.y});
});

const joystick=document.getElementById("joystick");
const thumb=document.getElementById("joystickThumb");
let dragging=false,startX=0,startY=0;

joystick.addEventListener("touchstart",e=>{
  dragging=true;
  startX=e.touches[0].clientX;
  startY=e.touches[0].clientY;
});
joystick.addEventListener("touchmove",e=>{
  if(!dragging||!me) return;
  const dx=e.touches[0].clientX-startX;
  const dy=e.touches[0].clientY-startY;
  me.x+=dx*0.03; me.y+=dy*0.03;
  clamp();
  socket.emit("move",{x:me.x,y:me.y});
});
joystick.addEventListener("touchend",()=>{
  dragging=false;
  thumb.style.left="35px";
  thumb.style.top="35px";
});
</script>
</body>
</html>
