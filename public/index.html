<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>HAİN</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;background:#111;color:#fff;overflow:hidden;font-family:sans-serif}
canvas{position:absolute;top:0;left:0}

/* LOBBY */
#lobby{
  position:fixed; inset:0;
  background:#000e;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:100
}

/* UI */
#status{position:fixed;top:10px;left:10px;background:#000c;padding:6px 10px;border:1px solid #666;z-index:50}
#roleBox{position:fixed;top:50px;left:10px;background:#000c;padding:6px 10px;border:1px solid #666;display:none;z-index:60}

/* MINI MAP */
#miniMap{position:fixed;top:10px;right:10px;width:200px;height:120px;background:#0009;border:1px solid #555;z-index:50}

/* LOG */
#log{position:fixed;bottom:10px;right:10px;width:260px;background:rgba(0,0,0,.45);padding:8px;border-radius:8px;font-size:12px;z-index:60;pointer-events:none}
.logItem{margin-bottom:4px;opacity:1;transition:opacity 1s}

/* KILL / REPORT / REPAIR */
#killBtn{position:fixed;bottom:120px;right:20px;width:80px;height:80px;border-radius:50%;background:#a00;color:#fff;border:none;display:none;z-index:80}
#reportBtn{position:fixed;bottom:210px;right:20px;width:80px;height:40px;background:#ff0;color:#000;border:none;display:none;z-index:80}
#repairBtn{position:fixed;bottom:260px;right:20px;width:80px;height:40px;background:#0f0;color:#000;border:none;display:none;z-index:80}

/* JOYSTICK */
#joy{position:fixed;bottom:20px;left:20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.1);z-index:90;touch-action:none}
#stick{position:absolute;left:40px;top:40px;width:40px;height:40px;border-radius:50%;background:#fff}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <input id="name" placeholder="İsmin">
  <button id="joinBtn" onclick="join()">Katıl</button>
  <button id="readyBtn" onclick="ready()" style="display:none">Hazır</button>
  <button id="startBtn" onclick="start()" style="display:none">Başlat</button>
  <div id="players"></div>
</div>

<!-- OYUN UI -->
<div id="status">Canlı: <span id="alive">0</span></div>
<div id="roleBox">ROL: <span id="roleText"></span></div>
<button id="killBtn" onclick="kill()">ÖLDÜR</button>
<button id="reportBtn" onclick="report()">TOPLANTI</button>
<button id="repairBtn" onclick="repair()">TAMİR</button>

<canvas id="game"></canvas>
<canvas id="miniMap"></canvas>
<div id="joy"><div id="stick"></div></div>
<div id="log"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

/* DOM */
const nameInput=document.getElementById("name");
const joinBtn=document.getElementById("joinBtn");
const readyBtn=document.getElementById("readyBtn");
const startBtn=document.getElementById("startBtn");
const playersDiv=document.getElementById("players");
const aliveSpan=document.getElementById("alive");
const roleBox=document.getElementById("roleBox");
const roleText=document.getElementById("roleText");
const killBtn=document.getElementById("killBtn");
const reportBtn=document.getElementById("reportBtn");
const repairBtn=document.getElementById("repairBtn");
const lobby=document.getElementById("lobby");

/* CANVAS */
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
addEventListener("resize",resize);resize();

const miniMap=document.getElementById("miniMap");
const mctx=miniMap.getContext("2d");

/* STATE */
let players=[],machines=[];
let selfId=null,role=null;
let nearMachine=null;

/* LOG */
function log(msg){
  const box=document.getElementById("log");
  const d=document.createElement("div");
  d.className="logItem";d.textContent=msg;
  box.appendChild(d);
  setTimeout(()=>d.style.opacity=0,9000);
  setTimeout(()=>d.remove(),10000);
}
socket.on("log",log);

/* LOBBY */
function join(){
  const n=nameInput.value.trim();
  if(!n) return;
  socket.emit("join",n);
  joinBtn.style.display="none"; // katıl butonu kaybolsun
  readyBtn.style.display="inline"; // hazır butonu görünür
}
function ready(){socket.emit("ready");}
function start(){socket.emit("start");}

socket.on("lobby",d=>{
  playersDiv.innerHTML="";
  let everyoneReady = true;
  d.players.forEach(p=>{
    playersDiv.innerHTML+=`${p.name} ${p.ready?"✔️":"❌"} ${p.admin?"(Admin)":""}<br>`;
    if(!p.ready) everyoneReady=false;
  });
  const me = d.players.find(p=>p.id===socket.id);
  if(me && me.admin && everyoneReady && d.players.length >= 4) startBtn.style.display="inline";
  else startBtn.style.display="none";
});

/* GAME */
socket.on("gameStarted",()=>lobby.style.display="none");
socket.on("role",r=>{role=r;roleBox.style.display="block";roleText.textContent=r;killBtn.style.display=r==="Hain"?"inline":"none";});
socket.on("state",s=>{
  players=s.players;
  machines=s.machines;
  aliveSpan.textContent=players.filter(p=>p.alive).length;

  // Check near machine for repair button
  nearMachine=null;
  if(role==="Operatör" && players.find(p=>p.id===selfId)){
    const self=players.find(p=>p.id===selfId);
    machines.forEach(m=>{
      if(m.broken && Math.hypot(m.x-self.x,m.y-self.y)<60) nearMachine=m;
    });
    repairBtn.style.display=nearMachine?"inline":"none";
  }
});

/* DRAW */
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  players.forEach(p=>{
    if(!p.alive) return;
    ctx.fillStyle=p.role==="Hain"?"#a00":"#0af";
    ctx.beginPath();
    ctx.arc(p.x,p.y,15,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#fff"; ctx.fillText(p.name,p.x-15,p.y-20);
  });
  machines.forEach(m=>{
    ctx.fillStyle=m.broken?"#f00":"#0f0";
    ctx.beginPath();ctx.arc(m.x,m.y,12,0,Math.PI*2);ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();

/* MINI MAP */
function drawMini(){
  mctx.clearRect(0,0,miniMap.width,miniMap.height);
  const self=players.find(p=>p.id===selfId);
  if(!self) return;

  players.forEach(p=>{
    const dx=p.x-self.x,dy=p.y-self.y;
    if(Math.hypot(dx,dy)<200){
      mctx.fillStyle=p.role==="Hain"?"#a00":"#0af";
      mctx.fillRect(100+dx/10,60+dy/10,5,5);
    }
  });

  machines.forEach(m=>{
    const dx=m.x-self.x,dy=m.y-self.y;
    if(Math.hypot(dx,dy)<200){
      mctx.fillStyle=m.broken?"#f00":"#0f0";
      mctx.fillRect(100+dx/10,60+dy/10,5,5);
    }
  });

  requestAnimationFrame(drawMini);
}
drawMini();

/* JOYSTICK */
const joy=document.getElementById("joy");
const stick=document.getElementById("stick");
let dragging=false;
joy.addEventListener("touchstart",()=>dragging=true);
joy.addEventListener("touchend",()=>{dragging=false;stick.style.left="40px";stick.style.top="40px";});
joy.addEventListener("touchmove",e=>{
  if(!dragging) return;
  const r=60;
  const t=e.touches[0];
  const rect=joy.getBoundingClientRect();
  let x=t.clientX-rect.left-r, y=t.clientY-rect.top-r;
  const d=Math.hypot(x,y); if(d>r){x*=r/d;y*=r/d;}
  stick.style.left=40+x+"px"; stick.style.top=40+y+"px";
  socket.emit("move",{dx:x/30,dy:y/30});
});

/* ACTIONS */
function kill(){socket.emit("kill");}
function report(){socket.emit("report");reportBtn.style.display="none";}
function repair(){if(nearMachine) socket.emit("repair",nearMachine.id);}
</script>
</body>
</html>
