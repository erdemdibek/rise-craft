<!DOCTYPE html>
<html lang="tr">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finans Takip Paneli</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Sanofi Takip">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%230b0f19'/><path d='M82 50H66l-12 36L38 14l-12 36H18' fill='none' stroke='%2338bdf8' stroke-width='9' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%230b0f19'/><path d='M82 50H66l-12 36L38 14l-12 36H18' fill='none' stroke='%2338bdf8' stroke-width='9' stroke-linecap='round' stroke-linejoin='round'/></svg>">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background-color: #070a12;
            color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .app-container {
            width: 100%;
            max-width: 410px;
            background: linear-gradient(145deg, #0f1626 0%, #0b0f19 100%);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* HEADER */
        .app-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 22px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding-bottom: 16px;
        }
        .brand-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #6366f1 0%, #3b82f6 100%);
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.25);
        }
        .brand-icon svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: #ffffff;
            stroke-width: 2.5;
        }
        .header-info h1 {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #ffffff;
        }
        .header-info p {
            font-size: 0.7rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            margin-top: 1px;
        }

        /* CANLI DURUM VE ZAMAN SÜRECİ */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 41, 59, 0.4);
            padding: 10px 14px;
            border-radius: 14px;
            margin-bottom: 18px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .status-dot-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.72rem;
            color: #94a3b8;
            font-weight: 500;
        }
        .status-dot {
            width: 7px;
            height: 7px;
            background-color: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.5); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        .update-time {
            font-size: 0.68rem;
            color: #38bdf8;
            font-weight: 600;
            font-family: monospace;
            text-align: right;
        }

        /* STATS CARDS GRID */
        .grid-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 18px;
        }
        .stat-card {
            background: rgba(30, 41, 59, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 16px;
            position: relative;
        }
        .card-meta {
            font-size: 0.7rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .card-data {
            font-size: 1.4rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.02em;
        }
        .sanofi-color { color: #38bdf8; }
        .euro-color { color: #10b981; }

        /* TREND CHART BOX */
        .premium-chart-box {
            background: rgba(30, 41, 59, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 18px;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .chart-title {
            font-size: 0.72rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }
        .chart-badge {
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.04);
            transition: all 0.15s ease;
        }

        /* GRAFİK FİLTRE BUTONLARI */
        .chart-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            background: rgba(15, 23, 42, 0.6);
            padding: 3px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #64748b;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 6px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .tab-btn.active {
            background: rgba(56, 189, 248, 0.12);
            color: #38bdf8;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .chart-viewport {
            width: 100%;
            height: 95px;
            position: relative;
            cursor: crosshair;
        }
        .chart-viewport canvas {
            display: block;
        }

        /* MAIN PORTFOLIO CARD */
        .portfolio-card {
            background: linear-gradient(135deg, #16153b 0%, #0d121f 100%);
            border: 1px solid rgba(99, 102, 241, 0.18);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .portfolio-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 14px;
            margin-bottom: 14px;
        }
        .profile-title p {
            font-size: 0.72rem;
            color: #818cf8;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .profile-title h3 {
            font-size: 1.05rem;
            font-weight: 700;
            color: #ffffff;
            margin-top: 2px;
        }
        
        .action-menu-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }
        .action-menu-btn:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.95);
        }

        .data-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .data-label {
            font-size: 0.82rem;
            color: #94a3b8;
        }
        .data-value {
            font-size: 0.95rem;
            font-weight: 700;
            color: #ffffff;
        }
        .grand-total {
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            padding-top: 12px;
            margin-top: 4px;
        }
        .grand-total .data-label {
            font-weight: 600;
            color: #f1f5f9;
        }
        .grand-total .data-value {
            font-size: 1.3rem;
            color: #10b981;
            text-shadow: 0 0 12px rgba(16, 185, 129, 0.25);
        }

        /* FOOTER */
        .app-footer {
            font-size: 0.68rem;
            color: #475569;
            text-align: center;
            letter-spacing: 0.01em;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
            </svg>
        </div>
        <div class="header-info">
            <h1>Finans Takip Paneli</h1>
            <p>Varlık & Kur Monitörü</p>
        </div>
    </header>

    <div class="status-bar">
        <div class="status-dot-wrapper">
            <div class="status-dot"></div>
            <span id="sync-text">Borsa Son İşlem</span>
        </div>
        <div class="update-time" id="last-update-time">Yükleniyor...</div>
    </div>

    <section class="grid-wrapper">
        <div class="stat-card">
            <div class="card-meta">Sanofi Hisse</div>
            <div id="sanofi-price-box" class="card-data sanofi-color">...</div>
        </div>
        <div class="stat-card">
            <div class="card-meta">Euro / TL</div>
            <div id="euro-price-box" class="card-data euro-color">...</div>
        </div>
    </section>

    <div class="premium-chart-box">
        <div class="chart-header">
            <div class="chart-title" id="chart-main-title">Sanofi Trend Analizi</div>
            <div id="trend-badge" class="chart-badge">...</div>
        </div>
        
        <div class="chart-tabs">
            <button class="tab-btn active" id="tab-1d" onclick="v6_setChartRange('1d')">Gün (1G)</button>
            <button class="tab-btn" id="tab-7d" onclick="v6_setChartRange('7d')">Hafta (7G)</button>
        </div>

        <div class="chart-viewport" id="chart-area">
            <canvas id="premiumTrendChart"></canvas>
        </div>
    </div>

    <div class="portfolio-card">
        <div class="portfolio-top">
            <div class="profile-title">
                <p>Yatırım Uzmanı</p>
                <h3>Maaşlı Çalışan</h3>
            </div>
            <button class="action-menu-btn" onclick="v6_tetikleyiciPortfoy()">
                <span>⚙️ Yönet</span>
            </button>
        </div>
        
        <div class="data-list">
            <div class="data-row">
                <span class="data-label">Toplam Varlık:</span>
                <span class="data-value" id="ui-asset-count">92,8009 Adet</span>
            </div>
            <div class="data-row">
                <span class="data-label">Anlık Euro Değeri:</span>
                <span class="data-value" id="ui-total-euro">...</span>
            </div>
            <div class="data-row grand-total">
                <span class="data-label">Net TL Karşılığı:</span>
                <span class="data-value" id="ui-total-tl">...</span>
            </div>
        </div>
    </div>

    <footer class="app-footer">
        Prepared by Erdem DIBEK
    </footer>
</div>
<script>
    let v6_hisseAdedi = 92.8009;
    let v6_sanofiFiyati = 92.50; 
    let v6_euroKuru = 36.20;     
    
    // Aktif görünüm modu: '1d' veya '7d'
    let v6_activeRange = '1d'; 

    let v6_trendVerisi = [92.00, 92.15, 92.30, 92.20, 92.45, 92.50];
    let v6_trendZamanlari = []; 
    let v6_varsayilanBadgeText = "...";
    let v6_varsayilanBadgeColor = "";
    let v6_varsayilanBadgeBg = "";
    
    let v6_pixelPoints = [];

    // HIZLI GEÇİŞ İÇİN BELLEK (CACHE) KATMANI
    let v6_cachedData = {
        '1d': { trend: null, zamanlar: null, sonIslemZamani: null },
        '7d': { trend: null, zamanlar: null, sonIslemZamani: null }
    };

    const v6_fmtPara = new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2, useGrouping: true });
    const v6_fmtAsset = new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 4, maximumFractionDigits: 4, useGrouping: true });

    function v6_grafikCizici(fiyatlar, activeIndex = null) {
        const canvas = document.getElementById('premiumTrendChart');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;

        const width = canvas.width;
        const height = canvas.height;
        const padding = 10;

        const maxPrice = Math.max(...fiyatlar);
        const minPrice = Math.min(...fiyatlar);
        const priceRange = maxPrice - minPrice === 0 ? 1 : maxPrice - minPrice;

        v6_pixelPoints = fiyatlar.map((price, index) => {
            const x = padding + (index * (width - padding * 2) / (fiyatlar.length - 1));
            const y = height - padding - ((price - minPrice) * (height - padding * 2) / priceRange);
            return { x, y, price, index };
        });

        const lineGrad = ctx.createLinearGradient(0, 0, width, 0);
        lineGrad.addColorStop(0, '#38bdf8');
        lineGrad.addColorStop(1, '#6366f1');

        const fillGrad = ctx.createLinearGradient(0, 0, 0, height);
        fillGrad.addColorStop(0, 'rgba(56, 189, 248, 0.12)');
        fillGrad.addColorStop(1, 'rgba(11, 15, 25, 0)');

        ctx.clearRect(0, 0, width, height);

        ctx.beginPath();
        ctx.moveTo(v6_pixelPoints[0].x, height);
        v6_pixelPoints.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.lineTo(v6_pixelPoints[v6_pixelPoints.length - 1].x, height);
        ctx.closePath();
        ctx.fillStyle = fillGrad;
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(v6_pixelPoints[0].x, v6_pixelPoints[0].y);
        v6_pixelPoints.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.strokeStyle = lineGrad;
        ctx.lineWidth = 2.5;
        ctx.stroke();

        v6_pixelPoints.forEach((p, idx) => {
            ctx.beginPath();
            if (activeIndex !== null && idx === activeIndex) {
                ctx.arc(p.x, p.y, 6, 0, 2 * Math.PI);
                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = '#38bdf8';
                ctx.shadowBlur = 10;
            } else if (idx === v6_pixelPoints.length - 1 && activeIndex === null) {
                ctx.arc(p.x, p.y, 4, 0, 2 * Math.PI);
                ctx.fillStyle = '#6366f1';
                ctx.shadowBlur = 0;
            } else {
                ctx.arc(p.x, p.y, 2, 0, 2 * Math.PI);
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.shadowBlur = 0;
            }
            ctx.fill();
            ctx.shadowBlur = 0;
        });
    }

    function v6_arayuzHesapla() {
        const tEuro = v6_hisseAdedi * v6_sanofiFiyati;
        const tTL = tEuro * v6_euroKuru;

        document.getElementById('ui-asset-count').innerText = v6_fmtAsset.format(v6_hisseAdedi) + " Adet";
        document.getElementById('ui-total-euro').innerText = "€" + v6_fmtPara.format(tEuro);
        document.getElementById('ui-total-tl').innerText = "₺" + v6_fmtPara.format(tTL);
    }

    function v6_tetikleyiciPortfoy() {
        let promptVal = prompt("Yeni Sanofi hisse adedini giriniz:", v6_hisseAdedi);
        if (promptVal !== null && promptVal.trim() !== "") {
            promptVal = promptVal.replace(',', '.');
            const parsed = parseFloat(promptVal);
            if (!isNaN(parsed) && parsed >= 0) {
                v6_hisseAdedi = parsed;
                v6_arayuzHesapla();
            } else {
                alert("Lütfen geçerli bir sayısal değer belirtin.");
            }
        }
    }

    function v6_borsaZamaniniFormatla(unixTimestamp, sadeceDetay = false) {
        const borsaTarihi = unixTimestamp ? new Date(unixTimestamp * 1000) : new Date();
        
        const gun = String(borsaTarihi.getDate()).padStart(2, '0');
        const ay = String(borsaTarihi.getMonth() + 1).padStart(2, '0');
        const saat = String(borsaTarihi.getHours()).padStart(2, '0');
        const dakika = String(borsaTarihi.getMinutes()).padStart(2, '0');
        
        if (sadeceDetay) {
            return v6_activeRange === '1d' ? `${saat}:${dakika}` : `${gun}.${ay}.${borsaTarihi.getFullYear()}`;
        }
        
        return `${gun}.${ay}.${borsaTarihi.getFullYear()} ${saat}:${dakika}`;
    }

    async function v6_fetchYahooData(tickerUrl) {
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(tickerUrl)}`;
        const res = await fetch(proxyUrl);
        if (!res.ok) throw new Error("Proxy hatası");
        const data = await res.json();
        return JSON.parse(data.contents);
    }

    function v6_setChartRange(range) {
        if(v6_activeRange === range) return;
        v6_activeRange = range;
        
        document.getElementById('tab-1d').classList.toggle('active', range === '1d');
        document.getElementById('tab-7d').classList.toggle('active', range === '7d');
        
        if (v6_cachedData[range].trend !== null) {
            v6_trendVerisi = v6_cachedData[range].trend;
            v6_trendZamanlari = v6_cachedData[range].zamanlar;
            v6_sanofiFiyati = v6_trendVerisi[v6_trendVerisi.length - 1] || v6_sanofiFiyati;
            
            v6_grafikArayuzunuGuncelle(v6_cachedData[range].sonIslemZamani);
            v6_sadeceHisseVerisiCek(range); 
        } else {
            v6_sadeceHisseVerisiCek(range);
        }
    }

    // [HIZLANDIRILDI] fields filtreleri ve includeTimestamps parametresiyle yük %90 hafifletildi
    async function v6_sadeceHisseVerisiCek(range) {
        let targetChartUrl = `https://query1.finance.yahoo.com/v8/finance/chart/SAN.PA?interval=${range === '1d' ? '15m' : '1d'}&range=${range}&fields=regularMarketPrice,regularMarketTime&includeTimestamps=true`;
        let borsaSonIslemZamani = Math.floor(Date.now() / 1000);

        try {
            const sanofiJson = await v6_fetchYahooData(targetChartUrl);
            if (sanofiJson?.chart?.result) {
                const result = sanofiJson.chart.result[0];
                const currentPrice = result.meta.regularMarketPrice || v6_sanofiFiyati;
                const timestamps = result.timestamp || [];
                borsaSonIslemZamani = result.meta.regularMarketTime || (timestamps.length > 0 ? timestamps[timestamps.length - 1] : borsaSonIslemZamani);

                const closes = result.indicators.quote[0].close || [];
                let temizFiyatlar = [];
                let temizZamanlar = [];
                
                for(let i=0; i<closes.length; i++) {
                    if(closes[i] !== null && closes[i] !== undefined) {
                        temizFiyatlar.push(closes[i]);
                        temizZamanlar.push(timestamps[i]);
                    }
                }

                if (temizFiyatlar.length > 0) {
                    v6_cachedData[range].trend = temizFiyatlar;
                    v6_cachedData[range].zamanlar = temizZamanlar;
                    v6_cachedData[range].sonIslemZamani = borsaSonIslemZamani;

                    if (v6_activeRange === range) {
                        v6_trendVerisi = temizFiyatlar;
                        v6_trendZamanlari = temizZamanlar;
                        v6_sanofiFiyati = currentPrice;
                        v6_grafikArayuzunuGuncelle(borsaSonIslemZamani);
                    }
                }
            }
        } catch (err) {
            console.log("Hisse verisi yenileme hatası.");
        }
    }

    // [HIZLANDIRILDI] Geçmiş gün içi seans yükü atıldı, sadece anlık değer filtresi eklendi
    async function v6_sadeceKurCek() {
        try {
            const kurJson = await v6_fetchYahooData("https://query1.finance.yahoo.com/v8/finance/chart/EURTRY=X?interval=1d&range=1d&fields=regularMarketPrice");
            if (kurJson?.chart?.result) {
                v6_euroKuru = kurJson.chart.result[0].meta.regularMarketPrice || v6_euroKuru;
                document.getElementById('euro-price-box').innerText = "₺" + v6_fmtPara.format(v6_euroKuru);
                v6_arayuzHesapla();
            }
        } catch (err) {
            console.log("Kur yenileme hatası.");
        }
    }

    function v6_grafikArayuzunuGuncelle(borsaSonIslemZamani) {
        document.getElementById('sanofi-price-box').innerText = "€" + v6_fmtPara.format(v6_sanofiFiyati);
        v6_arayuzHesapla();
        document.getElementById('last-update-time').innerText = v6_borsaZamaniniFormatla(borsaSonIslemZamani);

        const f0 = v6_trendVerisi[0];
        const f1 = v6_trendVerisi[v6_trendVerisi.length - 1] || v6_sanofiFiyati;
        const diff = ((f1 - f0) / f0) * 100;
        
        if(diff >= 0) {
            v6_varsayilanBadgeText = "+" + diff.toFixed(2) + "% ↑";
            v6_varsayilanBadgeColor = '#10b981';
            v6_varsayilanBadgeBg = 'rgba(16, 185, 129, 0.08)';
        } else {
            v6_varsayilanBadgeText = diff.toFixed(2) + "% ↓";
            v6_varsayilanBadgeColor = '#ef4444';
            v6_varsayilanBadgeBg = 'rgba(239, 68, 68, 0.08)';
        }

        v6_badgeReset();
        v6_grafikCizici(v6_trendVerisi);
    }

    // [HIZLANDIRILDI] Eşzamanlı istek çakışması engellendi. Aralara 500ms gecikme eklendi.
    async function v6_veriMerkezi() {
        // Önce kuru çekip bitiriyoruz
        await v6_sadeceKurCek();
        
        // Proxy'nin darboğaza girmemesi için ufak bir es
        await new Promise(resolve => setTimeout(resolve, 500));
        
        // Aktif olan grafik aralığını getir
        await v6_sadeceHisseVerisiCek(v6_activeRange);
        
        // Arka plandaki diğer sekmeyi 1 saniye sonra sessizce doldur
        setTimeout(() => {
            const digerMod = v6_activeRange === '1d' ? '7d' : '1d';
            v6_sadeceHisseVerisiCek(digerMod);
        }, 1000);
    }

    function v6_badgeReset() {
        const bElement = document.getElementById('trend-badge');
        if(bElement) {
            bElement.innerText = v6_varsayilanBadgeText;
            bElement.style.color = v6_varsayilanBadgeColor;
            bElement.style.background = v6_varsayilanBadgeBg;
        }
        document.getElementById('chart-main-title').innerText = v6_activeRange === '1d' ? "Sanofi Gün İçi Seans" : "Sanofi Haftalık Trend";
    }

    function v6_grafikEtkilesimYoneticisi(e) {
        if (v6_pixelPoints.length === 0) return;
        
        const rect = document.getElementById('premiumTrendChart').getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const targetX = clientX - rect.left;

        let enYakinNokta = v6_pixelPoints.reduce((prev, curr) => {
            return (Math.abs(curr.x - targetX) < Math.abs(prev.x - targetX)) ? curr : prev;
        });

        if (enYakinNokta) {
            const bElement = document.getElementById('trend-badge');
            const detayMetni = v6_trendZamanlari[enYakinNokta.index] ? v6_borsaZamaniniFormatla(v6_trendZamanlari[enYakinNokta.index], true) : `Nokta ${enYakinNokta.index + 1}`;
            
            document.getElementById('chart-main-title').innerText = detayMetni;
            bElement.innerText = "€" + v6_fmtPara.format(enYakinNokta.price);
            bElement.style.color = '#38bdf8';
            bElement.style.background = 'rgba(56, 189, 248, 0.15)';
            
            v6_grafikCizici(v6_trendVerisi, enYakinNokta.index);
        }
    }

    const grafikAlani = document.getElementById('chart-area');
    
    grafikAlani.addEventListener('mousemove', v6_grafikEtkilesimYoneticisi);
    grafikAlani.addEventListener('touchstart', v6_grafikEtkilesimYoneticisi, {passive: true});
    grafikAlani.addEventListener('touchmove', v6_grafikEtkilesimYoneticisi, {passive: true});
    
    grafikAlani.addEventListener('mouseleave', () => {
        v6_badgeReset();
        v6_grafikCizici(v6_trendVerisi);
    });
    grafikAlani.addEventListener('touchend', () => {
        setTimeout(() => {
            v6_badgeReset();
            v6_grafikCizici(v6_trendVerisi);
        }, 1500);
    });

    // İlk açılış
    v6_veriMerkezi();
    
    // 5 dakikada bir otomatik arka plan güncellemesi
    setInterval(v6_veriMerkezi, 300000);
    
    window.addEventListener('resize', () => {
        v6_grafikCizici(v6_trendVerisi);
    });
</script>

</body>
</html>
