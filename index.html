<!DOCTYPE html>
<html lang="tr">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finans Takip Paneli</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Varlık Takip">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%230b0f19'/><path d='M82 50H66l-12 36L38 14l-12 36H18' fill='none' stroke='%2338bdf8' stroke-width='9' stroke-linecap='round' stroke-linejoin='round'/></svg>">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background-color: #070a12;
            color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .app-container {
            width: 100%;
            max-width: 410px;
            background: linear-gradient(145deg, #0f1626 0%, #0b0f19 100%);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* HEADER */
        .app-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding-bottom: 14px;
        }
        .brand-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #6366f1 0%, #3b82f6 100%);
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.25);
        }
        .brand-icon svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: #ffffff;
            stroke-width: 2.5;
        }
        .header-info h1 {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #ffffff;
        }
        .header-info p {
            font-size: 0.7rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            margin-top: 1px;
        }

        /* STATUS BAR */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 41, 59, 0.4);
            padding: 8px 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .status-dot-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            color: #94a3b8;
        }
        .status-dot {
            width: 7px;
            height: 7px;
            background-color: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.5); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        .update-time {
            font-size: 0.68rem;
            color: #38bdf8;
            font-family: monospace;
        }

        /* 3'LÜ STATS GRID */
        .grid-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: rgba(30, 41, 59, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .stat-card.full-width {
            grid-column: span 2;
        }
        .stat-card:active {
            transform: scale(0.97);
        }
        .stat-card.active-target {
            background: rgba(99, 102, 241, 0.12);
            border: 1px solid rgba(99, 102, 241, 0.4);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.15);
        }
        .card-meta {
            font-size: 0.68rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-data {
            font-size: 1.25rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.01em;
        }
        .active-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: transparent;
        }
        .stat-card.active-target .active-indicator {
            background: #6366f1;
            box-shadow: 0 0 8px #6366f1;
        }
        
        .sanofi-color { color: #38bdf8; }
        .euro-color { color: #10b981; }
        .gold-color { color: #fbbf24; }

        /* PREMIUM CHART BOX */
        .premium-chart-box {
            background: rgba(30, 41, 59, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .chart-title {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            font-weight: 700;
        }
        .chart-badge {
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.68rem;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.04);
        }

        /* GRAFİK FİLTRE BUTONLARI */
        .chart-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            background: rgba(15, 23, 42, 0.6);
            padding: 3px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #64748b;
            font-size: 0.68rem;
            font-weight: 700;
            padding: 5px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }
        .tab-btn.active {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            border: 1px solid rgba(99, 102, 241, 0.25);
        }

        .chart-viewport {
            width: 100%;
            height: 100px;
            position: relative;
            cursor: crosshair;
        }
        .chart-viewport canvas {
            display: block;
        }

        /* PORTFOLIO CARD */
        .portfolio-card {
            background: linear-gradient(135deg, #16153b 0%, #0d121f 100%);
            border: 1px solid rgba(99, 102, 241, 0.18);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .portfolio-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        .profile-title p {
            font-size: 0.7rem;
            color: #818cf8;
            text-transform: uppercase;
            font-weight: 600;
        }
        .profile-title h3 {
            font-size: 1rem;
            font-weight: 700;
            color: #ffffff;
        }
        
        .action-menu-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
        }

        .data-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .data-label {
            font-size: 0.78rem;
            color: #94a3b8;
        }
        .data-value {
            font-size: 0.9rem;
            font-weight: 700;
            color: #ffffff;
        }
        .grand-total {
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            padding-top: 10px;
            margin-top: 2px;
        }
        .grand-total .data-label {
            font-weight: 600;
            color: #f1f5f9;
        }
        .grand-total .data-value {
            font-size: 1.25rem;
            color: #10b981;
            text-shadow: 0 0 12px rgba(16, 185, 129, 0.25);
        }

        /* FOOTER */
        .app-footer {
            font-size: 0.68rem;
            color: #475569;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
            </svg>
        </div>
        <div class="header-info">
            <h1>Finans Takip Paneli</h1>
            <p>Varlık & Trend Monitörü</p>
        </div>
    </header>

    <div class="status-bar">
        <div class="status-dot-wrapper">
            <div class="status-dot"></div>
            <span id="sync-text">Canlı Piyasa Takibi</span>
        </div>
        <div class="update-time" id="last-update-time">Yükleniyor...</div>
    </div>

    <section class="grid-wrapper">
        <div id="card-sanofi" class="stat-card active-target" onclick="v7_changeActiveTarget('sanofi')">
            <div class="card-meta">SANOFI HİSSE <div class="active-indicator"></div></div>
            <div id="sanofi-price-box" class="card-data sanofi-color">...</div>
        </div>
        <div id="card-euro" class="stat-card" onclick="v7_changeActiveTarget('euro')">
            <div class="card-meta">EURO / TL <div class="active-indicator"></div></div>
            <div id="euro-price-box" class="card-data euro-color">...</div>
        </div>
        <div id="card-gold" class="stat-card full-width" onclick="v7_changeActiveTarget('gold')">
            <div class="card-meta">22 AYAR GRAM ALTIN <div class="active-indicator"></div></div>
            <div id="gold-price-box" class="card-data gold-color">...</div>
        </div>
    </section>

    <div class="premium-chart-box">
        <div class="chart-header">
            <div class="chart-title" id="chart-main-title">Trend Analizi</div>
            <div id="trend-badge" class="chart-badge">...</div>
        </div>
        
        <div class="chart-tabs">
            <button class="tab-btn active" id="tab-1d" onclick="v7_setChartRange('1d')">Gün (1G)</button>
            <button class="tab-btn" id="tab-7d" onclick="v7_setChartRange('7d')">Hafta (7G)</button>
        </div>

        <div class="chart-viewport" id="chart-area">
            <canvas id="premiumTrendChart"></canvas>
        </div>
    </div>

    <div class="portfolio-card">
        <div class="portfolio-top">
            <div class="profile-title">
                <p>Yatırım Özeti</p>
                <h3>Varlık Dağılımı</h3>
            </div>
            <button class="action-menu-btn" onclick="v7_modifyAsset()">
                <span>⚙️ Miktar Ayarla</span>
            </button>
        </div>
        
        <div class="data-list">
            <div class="data-row">
                <span class="data-label">Sanofi Portföyü:</span>
                <span class="data-value" id="ui-asset-count">...</span>
            </div>
            <div class="data-row grand-total">
                <span class="data-label">Toplam Portföy Değeri:</span>
                <span class="data-value" id="ui-total-tl">...</span>
            </div>
        </div>
    </div>

    <footer class="app-footer">
        Prepared by Erdem DIBEK
    </footer>
</div>

<script>
    let v7_hisseAdedi = 92.8009;
    let v7_activeTarget = 'sanofi'; 
    let v7_activeRange = '1d';      

    let v7_prices = { sanofi: 92.50, euro: 36.20, gold: 0.0 };

    let v7_db = {
        sanofi: { '1d': { prices: [], times: [] }, '7d': { prices: [], times: [] } },
        euro:   { '1d': { prices: [], times: [] }, '7d': { prices: [], times: [] } },
        gold:   { '1d': { prices: [], times: [] }, '7d': { prices: [], times: [] } }
    };

    let v7_pixelPoints = [];
    let v7_varsayilanBadge = { text: "...", color: "", bg: "" };

    const v7_fmtPara = new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const v7_fmtAsset = new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 4, maximumFractionDigits: 4 });

    function v7_changeActiveTarget(target) {
        v7_activeTarget = target;
        document.querySelectorAll('.stat-card').forEach(el => el.classList.remove('active-target'));
        document.getElementById(`card-${target}`).classList.add('active-target');
        v7_renderChartAndBadge();
    }

    function v7_setChartRange(range) {
        v7_activeRange = range;
        document.getElementById('tab-1d').classList.toggle('active', range === '1d');
        document.getElementById('tab-7d').classList.toggle('active', range === '7d');
        v7_veriMerkezi();
    }

    function v7_grafikCizici(fiyatlar, activeIndex = null) {
        const canvas = document.getElementById('premiumTrendChart');
        if (!canvas || fiyatlar.length === 0) return;
        const ctx = canvas.getContext('2d');
        
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;

        const width = canvas.width;
        const height = canvas.height;
        const padding = 10;

        const maxPrice = Math.max(...fiyatlar);
        const minPrice = Math.min(...fiyatlar);
        const priceRange = maxPrice - minPrice === 0 ? 1 : maxPrice - minPrice;

        v7_pixelPoints = fiyatlar.map((price, index) => {
            const x = padding + (index * (width - padding * 2) / (fiyatlar.length - 1));
            const y = height - padding - ((price - minPrice) * (height - padding * 2) / priceRange);
            return { x, y, price, index };
        });

        let colorTheme = '#38bdf8';
        if(v7_activeTarget === 'euro') colorTheme = '#10b981';
        if(v7_activeTarget === 'gold') colorTheme = '#fbbf24';

        const lineGrad = ctx.createLinearGradient(0, 0, width, 0);
        lineGrad.addColorStop(0, colorTheme);
        lineGrad.addColorStop(1, '#6366f1');

        const fillGrad = ctx.createLinearGradient(0, 0, 0, height);
        fillGrad.addColorStop(0, `${colorTheme}1e`);
        fillGrad.addColorStop(1, 'rgba(11, 15, 25, 0)');

        ctx.clearRect(0, 0, width, height);

        ctx.beginPath();
        ctx.moveTo(v7_pixelPoints[0].x, height);
        v7_pixelPoints.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.lineTo(v7_pixelPoints[v7_pixelPoints.length - 1].x, height);
        ctx.closePath();
        ctx.fillStyle = fillGrad;
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(v7_pixelPoints[0].x, v7_pixelPoints[0].y);
        v7_pixelPoints.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.strokeStyle = lineGrad;
        ctx.lineWidth = 2.5;
        ctx.stroke();

        v7_pixelPoints.forEach((p, idx) => {
            ctx.beginPath();
            if (activeIndex !== null && idx === activeIndex) {
                ctx.arc(p.x, p.y, 6, 0, 2 * Math.PI);
                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = colorTheme;
                ctx.shadowBlur = 10;
            } else if (idx === v7_pixelPoints.length - 1 && activeIndex === null) {
                ctx.arc(p.x, p.y, 4, 0, 2 * Math.PI);
                ctx.fillStyle = '#6366f1';
            } else {
                ctx.arc(p.x, p.y, 1.5, 0, 2 * Math.PI);
                ctx.fillStyle = 'rgba(255,255,255,0.12)';
            }
            ctx.fill();
            ctx.shadowBlur = 0;
        });
    }

    function v7_arayuzHesapla() {
        const tEuro = v7_hisseAdedi * v7_prices.sanofi;
        const tTL = tEuro * v7_prices.euro;
        document.getElementById('ui-asset-count').innerText = v7_fmtAsset.format(v7_hisseAdedi) + " Adet (€" + v7_fmtPara.format(tEuro) + ")";
        document.getElementById('ui-total-tl').innerText = "₺" + v7_fmtPara.format(tTL);
    }

    function v7_modifyAsset() {
        let promptVal = prompt("Yeni Sanofi hisse adedini giriniz:", v7_hisseAdedi);
        if (promptVal !== null && promptVal.trim() !== "") {
            promptVal = promptVal.replace(',', '.');
            const parsed = parseFloat(promptVal);
            if (!isNaN(parsed) && parsed >= 0) {
                v7_hisseAdedi = parsed;
                v7_arayuzHesapla();
            }
        }
    }

    function v7_zamanFormatla(unixTimestamp, shortMode = false) {
        const d = unixTimestamp ? new Date(unixTimestamp * 1000) : new Date();
        const gun = String(d.getDate()).padStart(2, '0');
        const ay = String(d.getMonth() + 1).padStart(2, '0');
        const saat = String(d.getHours()).padStart(2, '0');
        const dakika = String(d.getMinutes()).padStart(2, '0');
        if (shortMode) {
            return v7_activeRange === '1d' ? `${saat}:${dakika}` : `${gun}.${ay}`;
        }
        return `${gun}.${ay}.${d.getFullYear()} ${saat}:${dakika}`;
    }

    // Cache-busting içeren akıllı veri indirme fonksiyonu
    async function v7_fetchYahoo(url) {
        const cacheBuster = `&_cb=${Date.now()}`;
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url + cacheBuster)}`;
        const res = await fetch(proxyUrl);
        if(!res.ok) throw new Error("Ağ hatası");
        const data = await res.json();
        return JSON.parse(data.contents);
    }

    function v7_parseYahooSeries(result) {
        if (!result) return { prices: [], times: [] };
        const timestamps = result.timestamp || [];
        const closes = result.indicators.quote[0].close || [];
        let p = [], t = [];
        for(let i=0; i<closes.length; i++) {
            if(closes[i] !== null && closes[i] !== undefined) {
                p.push(closes[i]);
                t.push(timestamps[i]);
            }
        }
        return { prices: p, times: t };
    }

    // DARBOĞAZI ÖZLEYEN PARALEL SÜREÇ MERKEZİ
    async function v7_veriMerkezi() {
        const intervalStr = v7_activeRange === '1d' ? "15m" : "1d";
        const rangeStr = v7_activeRange === '1d' ? "1d" : "7d";

        // İstek adresleri yapılandırılıyor
        const urlSanofi = `https://query1.finance.yahoo.com/v8/finance/chart/SAN.PA?interval=${intervalStr}&range=${rangeStr}`;
        const urlEuro    = `https://query1.finance.yahoo.com/v8/finance/chart/EURTRY=X?interval=${intervalStr}&range=${rangeStr}`;
        const urlGold    = `https://query1.finance.yahoo.com/v8/finance/chart/GC=F?interval=${intervalStr}&range=${rangeStr}`;
        const urlUsd     = `https://query1.finance.yahoo.com/v8/finance/chart/USDTRY=X?interval=${intervalStr}&range=${rangeStr}`;

        try {
            // PARALEL PROMISE: 4 Veri paketini sırayla beklemek yerine aynı anda paralel çeker!
            const [rawSanofi, rawEuro, rawGold, rawUsd] = await Promise.all([
                v7_fetchYahoo(urlSanofi).catch(e => null),
                v7_fetchYahoo(urlEuro).catch(e => null),
                v7_fetchYahoo(urlGold).catch(e => null),
                v7_fetchYahoo(urlUsd).catch(e => null)
            ]);

            // 1. Sanofi Çözümleme
            if(rawSanofi && rawSanofi.chart && rawSanofi.chart.result) {
                const res = rawSanofi.chart.result[0];
                v7_prices.sanofi = res.meta.regularMarketPrice || v7_prices.sanofi;
                v7_db.sanofi[v7_activeRange] = v7_parseYahooSeries(res);
            }

            // 2. Euro Çözümleme
            if(rawEuro && rawEuro.chart && rawEuro.chart.result) {
                const res = rawEuro.chart.result[0];
                v7_prices.euro = res.meta.regularMarketPrice || v7_prices.euro;
                v7_db.euro[v7_activeRange] = v7_parseYahooSeries(res);
            }

            // 3. Altın Çözümleme ve 22K Formülizasyonu
            if(rawGold && rawGold.chart && rawGold.chart.result && rawUsd && rawUsd.chart && rawUsd.chart.result) {
                const gRes = rawGold.chart.result[0];
                const uRes = rawUsd.chart.result[0];
                
                v7_prices.gold = ((gRes.meta.regularMarketPrice * uRes.meta.regularMarketPrice) / 31.1034768) * 0.916;

                const gData = v7_parseYahooSeries(gRes);
                const uData = v7_parseYahooSeries(uRes);
                
                let goldPrices = [];
                let goldTimes = [];
                const loopLen = Math.min(gData.prices.length, uData.prices.length);
                
                for(let i=0; i<loopLen; i++) {
                    let price22k = ((gData.prices[i] * uData.prices[i]) / 31.1034768) * 0.916;
                    goldPrices.push(price22k);
                    goldTimes.push(gData.times[i]);
                }
                v7_db.gold[v7_activeRange] = { prices: goldPrices, times: goldTimes };
            }

        } catch(e) {
            console.log("Paralel veri döngüsünde istisna oluştu.");
        }

        // DOM Elementlerini doldur ve Yükleniyor donmasını kaldır
        document.getElementById('sanofi-price-box').innerText = "€" + v7_fmtPara.format(v7_prices.sanofi);
        document.getElementById('euro-price-box').innerText = "₺" + v7_fmtPara.format(v7_prices.euro);
        document.getElementById('gold-price-box').innerText = "₺" + v7_fmtPara.format(v7_prices.gold);
        
        document.getElementById('last-update-time').innerText = v7_zamanFormatla();
        v7_arayuzHesapla();
        v7_renderChartAndBadge();
    }

    function v7_renderChartAndBadge() {
        const dataset = v7_db[v7_activeTarget][v7_activeRange];
        if(!dataset || dataset.prices.length === 0) {
            // Eğer o anlık veri yoksa yedek boş grafik göstererek kilitlenmeyi önler
            v7_grafikCizici([v7_prices[v7_activeTarget]]);
            return;
        }

        const fiyatlar = dataset.prices;
        const f0 = fiyatlar[0];
        const f1 = fiyatlar[fiyatlar.length - 1];
        const diff = ((f1 - f0) / f0) * 100;

        let baslik = v7_activeTarget === 'sanofi' ? "Sanofi" : v7_activeTarget === 'euro' ? "Euro / TL" : "22K Gram Altın";
        baslik += v7_activeRange === '1d' ? " Gün İçi Seans" : " Haftalık Trend";
        
        document.getElementById('chart-main-title').innerText = baslik;

        if(diff >= 0) {
            v7_varsayilanBadge.text = "+" + diff.toFixed(2) + "% ↑";
            v7_varsayilanBadge.color = '#10b981';
            v7_varsayilanBadge.bg = 'rgba(16, 185, 129, 0.08)';
        } else {
            v7_varsayilanBadge.text = diff.toFixed(2) + "% ↓";
            v7_varsayilanBadge.color = '#ef4444';
            v7_varsayilanBadge.bg = 'rgba(239, 68, 68, 0.08)';
        }

        v7_badgeReset();
        v7_grafikCizici(fiyatlar);
    }

    function v7_badgeReset() {
        const bElement = document.getElementById('trend-badge');
        if(bElement) {
            bElement.innerText = v7_varsayilanBadge.text;
            bElement.style.color = v7_varsayilanBadge.color;
            bElement.style.background = v7_varsayilanBadge.bg;
        }
    }

    function v7_grafikEtkilesim(e) {
        const dataset = v7_db[v7_activeTarget][v7_activeRange];
        if (!dataset || dataset.prices.length === 0) return;

        const rect = document.getElementById('premiumTrendChart').getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const targetX = clientX - rect.left;

        let enYakinNokta = v7_pixelPoints.reduce((prev, curr) => {
            return (Math.abs(curr.x - targetX) < Math.abs(prev.x - targetX)) ? curr : prev;
        });

        if (enYakinNokta) {
            const symbol = v7_activeTarget === 'sanofi' ? '€' : '₺';
            const detayMetni = dataset.times[enYakinNokta.index] ? v7_zamanFormatla(dataset.times[enYakinNokta.index], true) : '';
            
            document.getElementById('chart-main-title').innerText = detayMetni;
            
            const bElement = document.getElementById('trend-badge');
            bElement.innerText = symbol + v7_fmtPara.format(enYakinNokta.price);
            bElement.style.color = '#6366f1';
            bElement.style.background = 'rgba(99, 102, 241, 0.15)';
            
            v7_grafikCizici(dataset.prices, enYakinNokta.index);
        }
    }

    const grafikAlani = document.getElementById('chart-area');
    grafikAlani.addEventListener('mousemove', v7_grafikEtkilesim);
    grafikAlani.addEventListener('touchstart', v7_grafikEtkilesim, {passive: true});
    grafikAlani.addEventListener('touchmove', v7_grafikEtkilesim, {passive: true});
    
    grafikAlani.addEventListener('mouseleave', () => { v7_renderChartAndBadge(); });
    grafikAlani.addEventListener('touchend', () => { setTimeout(v7_renderChartAndBadge, 1200); });

    v7_veriMerkezi();
    setInterval(v7_veriMerkezi, 300000); 
    window.addEventListener('resize', () => {
        if(v7_db[v7_activeTarget][v7_activeRange].prices.length > 0) {
            v7_grafikCizici(v7_db[v7_activeTarget][v7_activeRange].prices);
        }
    });
</script>

</body>
</html>
