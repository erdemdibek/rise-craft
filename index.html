<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finans Takip Paneli</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Sanofi Takip">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%23111827'/><path d='M82 50H66l-12 36L38 14l-12 36H18' fill='none' stroke='%2338bdf8' stroke-width='9' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%23111827'/><path d='M82 50H66l-12 36L38 14l-12 36H18' fill='none' stroke='%2338bdf8' stroke-width='9' stroke-linecap='round' stroke-linejoin='round'/></svg>">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: #1e293b;
            border-radius: 24px;
            padding: 28px 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }
        
        .logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            text-align: center;
        }
        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #38bdf8 0%, #34d399 100%);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
            box-shadow: 0 8px 16px -4px rgba(56, 189, 248, 0.3);
        }
        .logo-icon svg {
            width: 26px;
            height: 26px;
            fill: none;
            stroke: #ffffff;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .panel-title {
            font-size: 0.85rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
        }

        .market-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }
        .card {
            background: #111827;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid #1f2937;
        }
        .card-label {
            font-size: 0.8rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }
        .card-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #38bdf8;
        }
        #eur-alani { color: #34d399; }

        .chart-box {
            background: #111827;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #1f2937;
            margin-bottom: 20px;
        }
        .chart-title {
            font-size: 0.85rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }
        .chart-container {
            position: relative;
            width: 100%;
            height: 120px;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .portfolio-box {
            background: #111827;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #1f2937;
        }
        .welcome-title {
            font-size: 1.1rem;
            color: #f1f5f9;
            font-weight: 600;
            margin-bottom: 16px;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 1rem;
            color: #cbd5e1;
        }
        .row:last-child {
            margin-bottom: 0;
            margin-top: 14px;
            border-top: 1px dashed #334155;
            padding-top: 14px;
        }
        .row-label {
            color: #94a3b8;
        }
        .row-value {
            font-weight: 700;
            color: #ffffff;
        }
        .total-tl {
            color: #34d399;
            font-size: 1.2rem;
        }

        .footer {
            margin-top: 24px;
            font-size: 0.75rem;
            color: #64748b;
            letter-spacing: 0.02em;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
            </svg>
        </div>
        <div class="panel-title">GÜNCEL SANOFI HISSE VE EURO/TL KURU</div>
    </div>

    <div class="market-grid">
        <div class="card">
            <div class="card-label">Sanofi (Hisse)</div>
            <div id="sanofi-alani" class="card-value">...</div>
        </div>
        <div class="card">
            <div class="card-label">Euro / TL</div>
            <div id="eur-alani" class="card-value">...</div>
        </div>
    </div>

    <div class="chart-box">
        <div class="chart-title">
            <span>Sanofi Haftalık Trend</span>
            <span id="trend-durum" style="color: #94a3b8;">Yükleniyor...</span>
        </div>
        <div class="chart-container">
            <canvas id="trendChart"></canvas>
        </div>
    </div>

    <div class="portfolio-box">
        <div class="welcome-title">Merhaba Yatırım Uzmanı Maaşlı Çalışan</div>
        
        <div class="row">
            <span class="row-label">Toplam Varlık:</span>
            <span class="row-value">92.8009 Adet</span>
        </div>
        
        <div class="row">
            <span class="row-label">Anlık Euro Değeri:</span>
            <span class="row-value" id="total-euro">...</span>
        </div>
        
        <div class="row">
            <span class="row-label">Anlık TL Değeri:</span>
            <span class="row-value total-tl" id="total-tl">...</span>
        </div>
    </div>
</div>

<div class="footer">
    Bu bilgilendirme sayfası Erdem DIBEK tarafından hazırlanmıştır.
</div>

<script>
    // TR Formatında sayı biçimlendirici (Örn: 123.456,78)
    const trFormat = new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    // Kur formatı (Virgülden sonra 4 basamak gösterimi için)
    const trFormatKur = new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 4, maximumFractionDigits: 4 });

    function grafikCiz(fiyatlar) {
        const canvas = document.getElementById('trendChart');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;

        const width = canvas.width;
        const height = canvas.height;
        const padding = 10;

        const maxPrice = Math.max(...fiyatlar);
        const minPrice = Math.min(...fiyatlar);
        const priceRange = maxPrice - minPrice === 0 ? 1 : maxPrice - minPrice;

        const points = fiyatlar.map((price, index) => {
            const x = padding + (index * (width - padding * 2) / (fiyatlar.length - 1));
            const y = height - padding - ((price - minPrice) * (height - padding * 2) / priceRange);
            return { x, y };
        });

        const lineGrad = ctx.createLinearGradient(0, 0, width, 0);
        lineGrad.addColorStop(0, '#38bdf8');
        lineGrad.addColorStop(1, '#34d399');

        const fillGrad = ctx.createLinearGradient(0, 0, 0, height);
        fillGrad.addColorStop(0, 'rgba(56, 189, 248, 0.15)');
        fillGrad.addColorStop(1, 'rgba(15, 23, 42, 0)');

        ctx.beginPath();
        ctx.moveTo(points[0].x, height);
        points.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.lineTo(points[points.length - 1].x, height);
        ctx.closePath();
        ctx.fillStyle = fillGrad;
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        points.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.strokeStyle = lineGrad;
        ctx.lineWidth = 3;
        ctx.stroke();

        const lastPoint = points[points.length - 1];
        ctx.beginPath();
        ctx.arc(lastPoint.x, lastPoint.y, 5, 0, 2 * Math.PI);
        ctx.fillStyle = '#34d399';
        ctx.fill();
        ctx.strokeStyle = '#111827';
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    async function verileriGetir() {
        const hisseAdedi = 92.8009;
        let haftalikFiyatlar = [74.50, 74.90, 73.80, 74.20, 75.07]; 

        try {
            const forexRes = await fetch('https://api.exchangerate-api.com/v4/latest/EUR');
            const forexData = await forexRes.json();
            const eurTryRate = forexData.rates.TRY;

            const stockRes = await fetch('https://api.marketstack.com/v1/eod/latest?access_key=fca7b64082msh63b514e865f2425p1b089ajsn7b570cb1e6a2&symbols=SAN.XPAR');
            
            let sanofiPrice = 75.07;

            if (stockRes.ok) {
                const stockData = await stockRes.json();
                if (stockData && stockData.data && stockData.data.length > 0) {
                    sanofiPrice = stockData.data[0].close;
                    
                    const canliTrend = stockData.data.slice(0, 7).map(item => item.close).reverse();
                    if(canliTrend.length > 1) {
                        haftalikFiyatlar = canliTrend;
                    }
                }
            }

            const toplamEuro = hisseAdedi * sanofiPrice;
            const toplamTL = toplamEuro * eurTryRate;

            // TR Formatlı hale getirilmiş çıktılar
            document.getElementById('sanofi-alani').innerText = `€${trFormat.format(sanofiPrice)}`;
            document.getElementById('eur-alani').innerText = `₺${trFormatKur.format(eurTryRate)}`;
            
            document.getElementById('total-euro').innerText = `€${trFormat.format(toplamEuro)}`;
            document.getElementById('total-tl').innerText = `₺${trFormat.format(toplamTL)}`;

            const ilkFiyat = haftalikFiyatlar[0];
            const sonFiyat = haftalikFiyatlar[haftalikFiyatlar.length - 1];
            const degisim = ((sonFiyat - ilkFiyat) / ilkFiyat) * 100;
            const trendDurumElement = document.getElementById('trend-durum');
            
            if(degisim >= 0) {
                trendDurumElement.innerText = `+%${degisim.toFixed(2)} ↑`;
                trendDurumElement.style.color = '#34d399';
            } else {
                trendDurumElement.innerText = `%${degisim.toFixed(2)} ↓`;
                trendDurumElement.style.color = '#f87171';
            }

            grafikCiz(haftalikFiyatlar);

        } catch (error) {
            const yedekEuro = hisseAdedi * 75.07;
            const yedekTL = yedekEuro * 53.0700;

            document.getElementById('sanofi-alani').innerText = "€75,07";
            document.getElementById('eur-alani').innerText = "₺53,0700";
            
            document.getElementById('total-euro').innerText = `€${trFormat.format(yedekEuro)}`;
            document.getElementById('total-tl').innerText = `₺${trFormat.format(yedekTL)}`;
            
            document.getElementById('trend-durum').innerText = "Sabit %0.00";
            grafikCiz(haftalikFiyatlar);
        }
    }

    verileriGetir();
    
    window.addEventListener('resize', () => {
        verileriGetir();
    });
</script>

</body
</html>
