<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rise Online Mobile Craft</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0b0f19;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0b0f19; }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #374151; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.25s ease-out forwards;
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen pb-12">

    <header class="bg-gray-950/60 backdrop-blur-md border-b border-gray-900 sticky top-0 z-50 shadow-sm">
        <div class="max-w-md mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2.5">
                <div class="bg-amber-500/10 text-amber-500 p-2 rounded-lg border border-amber-500/20">
                    <i class="fa-solid fa-shapes text-md"></i>
                </div>
                <div>
                    <h1 class="text-sm font-black tracking-wider text-white uppercase">Rise Mobile Craft</h1>
                    <p class="text-[9px] text-gray-500 font-bold tracking-widest uppercase">Hesaplayıcı</p>
                </div>
            </div>
            <div class="bg-gray-900/80 border border-gray-800 rounded-xl px-3 py-1 text-right">
                <p id="gm-status" class="text-xs font-bold text-amber-400">Yükleniyor...</p>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-6">
        
        <div class="mb-4">
            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-3">Meslek Grupları</p>
            <div id="professions-grid" class="grid grid-cols-2 gap-3">
                <div class="col-span-2 text-center text-xs text-gray-500 py-4">Veriler yükleniyor...</div>
            </div>
        </div>

        <div class="mt-6 bg-gray-900/40 border border-gray-900 rounded-2xl p-4 shadow-md animate-fadeIn">
            <div class="flex items-center space-x-2 border-b border-gray-900/60 pb-2.5 mb-3">
                <i class="fa-solid fa-map-signs text-amber-500 text-xs"></i>
                <h3 class="text-[11px] font-black text-gray-300 uppercase tracking-wider">🏆 Bir Sonraki GrandMaster Hedefine Kalan</h3>
            </div>
            <div id="gm-milestones-container" class="space-y-3">
                </div>
        </div>

        <div id="active-detail-panel" class="mt-6 hidden"></div>

    </main>

    <footer class="max-w-md mx-auto text-center mt-12 text-[10px] text-gray-600 px-4 tracking-wide">
        <p>© 2026 Rise Online Crafting Companion. Hazırlayan Erdem Dibek</p>
        <p class="mt-0.5">Veriler tarayıcı hafızasında anlık olarak yedeklenir.</p>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
