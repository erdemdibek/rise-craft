<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finans Takip Paneli</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: #1e293b;
            border-radius: 24px;
            padding: 28px 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }
        .market-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .card {
            background: #111827;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid #1f2937;
        }
        .card-label {
            font-size: 0.8rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }
        .card-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #38bdf8;
        }
        #eur-alani { color: #34d399; }

        /* Yeni Sade Hesaplama Paneli */
        .portfolio-box {
            background: #111827;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #1f2937;
        }
        .welcome-title {
            font-size: 1.1rem;
            color: #f1f5f9;
            font-weight: 600;
            margin-bottom: 16px;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 1rem;
            color: #cbd5e1;
        }
        .row:last-child {
            margin-bottom: 0;
            margin-top: 14px;
            border-top: 1px dashed #334155;
            padding-top: 14px;
        }
        .row-label {
            color: #94a3b8;
        }
        .row-value {
            font-weight: 700;
            color: #ffffff;
        }
        .total-tl {
            color: #34d399; /* TL Toplamı dikkat çeksin diye yeşil */
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="market-grid">
        <div class="card">
            <div class="card-label">Sanofi (Hisse)</div>
            <div id="sanofi-alani" class="card-value">...</div>
        </div>
        <div class="card">
            <div class="card-label">Euro / TL</div>
            <div id="eur-alani" class="card-value">...</div>
        </div>
    </div>

    <div class="portfolio-box">
        <div class="welcome-title">Merhaba Erdem Bey</div>
        
        <div class="row">
            <span class="row-label">Toplam Varlık:</span>
            <span class="row-value">92.8769 Adet</span>
        </div>
        
        <div class="row">
            <span class="row-label">Anlık Euro Değeri:</span>
            <span class="row-value" id="total-euro">...</span>
        </div>
        
        <div class="row">
            <span class="row-label">Anlık TL Değeri:</span>
            <span class="row-value total-tl" id="total-tl">...</span>
        </div>
    </div>
</div>

<script>
    async function verileriGetir() {
        const hisseAdedi = 92.8769;

        try {
            const forexRes = await fetch('https://api.exchangerate-api.com/v4/latest/EUR');
            const forexData = await forexRes.json();
            const eurTryRate = forexData.rates.TRY;

            const stockRes = await fetch('https://api.marketstack.com/v1/eod/latest?access_key=fca7b64082msh63b514e865f2425p1b089ajsn7b570cb1e6a2&symbols=SAN.XPAR');
            
            let sanofiPrice = 75.07;

            if (stockRes.ok) {
                const stockData = await stockRes.json();
                if (stockData && stockData.data && stockData.data[0]) {
                    sanofiPrice = stockData.data[0].close;
                }
            }

            const toplamEuro = hisseAdedi * sanofiPrice;
            const toplamTL = toplamEuro * eurTryRate;

            // Verileri basma
            document.getElementById('sanofi-alani').innerText = `€${sanofiPrice.toFixed(2)}`;
            document.getElementById('eur-alani').innerText = `₺${eurTryRate.toFixed(4)}`;
            
            document.getElementById('total-euro').innerText = `€${toplamEuro.toFixed(2)}`;
            document.getElementById('total-tl').innerText = `₺${toplamTL.toFixed(2)}`;

        } catch (error) {
            const yedekEuro = hisseAdedi * 75.07;
            const yedekTL = yedekEuro * 35.2150;

            document.getElementById('sanofi-alani').innerText = "€75.07";
            document.getElementById('eur-alani').innerText = "₺35.2150";
            
            document.getElementById('total-euro').innerText = `€${yedekEuro.toFixed(2)}`;
            document.getElementById('total-tl').innerText = `₺${yedekTL.toFixed(2)}`;
        }
    }

    verileriGetir();
</script>

</body>
</html>
