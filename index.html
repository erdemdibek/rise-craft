<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finans Takip Paneli</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Sanofi Takip">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%230f172a'/><path d='M82 50H66l-12 36L38 14l-12 36H18' fill='none' stroke='%2338bdf8' stroke-width='9' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%230f172a'/><path d='M82 50H66l-12 36L38 14l-12 36H18' fill='none' stroke='%2338bdf8' stroke-width='9' stroke-linecap='round' stroke-linejoin='round'/></svg>">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background-color: #090d16;
            color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .app-container {
            width: 100%;
            max-width: 410px;
            background: linear-gradient(145deg, #111827 0%, #0f172a 100%);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* HEADER */
        .app-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding-bottom: 16px;
        }
        .brand-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #6366f1 0%, #3b82f6 100%);
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.25);
        }
        .brand-icon svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: #ffffff;
            stroke-width: 2.5;
        }
        .header-info h1 {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #ffffff;
        }
        .header-info p {
            font-size: 0.7rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            margin-top: 1px;
        }

        /* LIVE STATUS TIME TAG */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 41, 59, 0.5);
            padding: 8px 14px;
            border-radius: 12px;
            margin-bottom: 18px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .status-dot-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            color: #94a3b8;
            font-weight: 500;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            background-color: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 119, 81, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 119, 81, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 119, 81, 0); }
        }
        .update-time {
            font-size: 0.72rem;
            color: #38bdf8;
            font-weight: 600;
            font-family: monospace;
        }

        /* GRID CARDS */
        .grid-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 18px;
        }
        .stat-card {
            background: rgba(30, 41, 59, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 16px;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02) 0%, rgba(255, 255, 255, 0) 100%);
            pointer-events: none;
        }
        .card-meta {
            font-size: 0.7rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .card-data {
            font-size: 1.4rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.02em;
        }
        .sanofi-color { color: #38bdf8; }
        .euro-color { color: #10b981; }

        /* CHART BOX */
        .premium-chart-box {
            background: rgba(30, 41, 59, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 18px;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .chart-title {
            font-size: 0.72rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }
        .chart-badge {
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.05);
        }
        .chart-viewport {
            width: 100%;
            height: 85px;
            position: relative;
        }

        /* MAIN PORTFOLIO CARD */
        .portfolio-card {
            background: linear-gradient(135deg, #1e1b4b 0%, #111827 100%);
            border: 1px solid rgba(99, 102, 241, 0.15);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }
        .portfolio-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 14px;
            margin-bottom: 14px;
        }
        .profile-title p {
            font-size: 0.72rem;
            color: #818cf8;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .profile-title h3 {
            font-size: 1.05rem;
            font-weight: 700;
            color: #ffffff;
            margin-top: 2px;
        }
        
        /* GÖRÜNÜR PORTFÖY MENÜSÜ BUTONU */
        .action-menu-btn {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .action-menu-btn:hidden { display: none !important; }
        .action-menu-btn:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.96);
        }

        .data-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .data-label {
            font-size: 0.82rem;
            color: #94a3b8;
        }
        .data-value {
            font-size: 0.95rem;
            font-weight: 700;
            color: #ffffff;
        }
        .grand-total {
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            padding-top: 12px;
            margin-top: 4px;
        }
        .grand-total .data-label {
            font-weight: 600;
            color: #f1f5f9;
        }
        .grand-total .data-value {
            font-size: 1.3rem;
            color: #10b981;
            text-shadow: 0 0 12px rgba(16, 185, 129, 0.2);
        }

        /* FOOTER */
        .app-footer {
            font-size: 0.68rem;
            color: #475569;
            text-align: center;
            letter-spacing: 0.01em;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
            </svg>
        </div>
        <div class="header-info">
            <h1>Finans Takip Paneli</h1>
            <p>Varlık & Kur Monitörü</p>
        </div>
    </header>

    <div class="status-bar">
        <div class="status-dot-wrapper">
            <div class="status-dot"></div>
            <span id="sync-text">Canlı Veri Bağlantısı</span>
        </div>
        <div class="update-time" id="last-update-time">Yükleniyor...</div>
    </div>

    <section class="grid-wrapper">
        <div class="stat-card">
            <div class="card-meta">Sanofi Hisse</div>
            <div id="sanofi-price-box" class="card-data sanofi-color">...</div>
        </div>
        <div class="stat-card">
            <div class="card-meta">Euro / TL</div>
            <div id="euro-price-box" class="card-data euro-color">...</div>
        </div>
    </section>

    <div class="premium-chart-box">
        <div class="chart-header">
            <div class="chart-title">Sanofi Haftalık Trend</div>
            <div id="trend-badge" class="chart-badge">...</div>
        </div>
        <div class="chart-viewport">
            <canvas id="premiumTrendChart"></canvas>
        </div>
    </div>

    <div class="portfolio-card">
        <div class="portfolio-top">
            <div class="profile-title">
                <p>Yatırım Uzmanı</p>
                <h3>Maaşlı Çalışan</h3>
            </div>
            <button class="action-menu-btn" onclick="v5_tetikleyiciPortfoy()">
                <span>⚙️ Yönet</span>
            </button>
        </div>
        
        <div class="data-list">
            <div class="data-row">
                <span class="data-label">Toplam Varlık:</span>
                <span class="data-value" id="ui-asset-count">92,8009 Adet</span>
            </div>
            <div class="data-row">
                <span class="data-label">Anlık Euro Değeri:</span>
                <span class="data-value" id="ui-total-euro">...</span>
            </div>
            <div class="data-row grand-total">
                <span class="data-label">Net TL Karşılığı:</span>
                <span class="data-value" id="ui-total-tl">...</span>
            </div>
        </div>
    </div>

    <footer class="app-footer">
        Prepared by Erdem DIBEK
    </footer>
</div>

<script>
    // Tamamen bağımsız v5 İzole Finans Motoru
    let v5_hisseAdedi = 92.8009;
    let v5_sanofiFiyati = 75.07;
    let v5_euroKuru = 53.0700;
    let v5_trendVerisi = [74.50, 74.90, 73.80, 74.20, 75.07];

    // TR Format Altyapısı
    const v5_fmtPara = new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2, useGrouping: true });
    const v5_fmtAsset = new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 4, maximumFractionDigits: 4, useGrouping: true });

    function v5_grafikCizici(fiyatlar) {
        const canvas = document.getElementById('premiumTrendChart');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;

        const width = canvas.width;
        const height = canvas.height;
        const padding = 6;

        const maxPrice = Math.max(...fiyatlar);
        const minPrice = Math.min(...fiyatlar);
        const priceRange = maxPrice - minPrice === 0 ? 1 : maxPrice - minPrice;

        const points = fiyatlar.map((price, index) => {
            const x = padding + (index * (width - padding * 2) / (fiyatlar.length - 1));
            const y = height - padding - ((price - minPrice) * (height - padding * 2) / priceRange);
            return { x, y };
        });

        const lineGrad = ctx.createLinearGradient(0, 0, width, 0);
        lineGrad.addColorStop(0, '#38bdf8');
        lineGrad.addColorStop(1, '#6366f1');

        const fillGrad = ctx.createLinearGradient(0, 0, 0, height);
        fillGrad.addColorStop(0, 'rgba(56, 189, 248, 0.12)');
        fillGrad.addColorStop(1, 'rgba(9, 13, 22, 0)');

        ctx.clearRect(0, 0, width, height);

        ctx.beginPath();
        ctx.moveTo(points[0].x, height);
        points.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.lineTo(points[points.length - 1].x, height);
        ctx.closePath();
        ctx.fillStyle = fillGrad;
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        points.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.strokeStyle = lineGrad;
        ctx.lineWidth = 2.5;
        ctx.stroke();

        const lastPoint = points[points.length - 1];
        ctx.beginPath();
        ctx.arc(lastPoint.x, lastPoint.y, 4, 0, 2 * Math.PI);
        ctx.fillStyle = '#6366f1';
        ctx.fill();
    }

    function v5_arayuzHesapla() {
        const tEuro = v5_hisseAdedi * v5_sanofiFiyati;
        const tTL = tEuro * v5_euroKuru;

        document.getElementById('ui-asset-count').innerText = v5_fmtAsset.format(v5_hisseAdedi) + " Adet";
        document.getElementById('ui-total-euro').innerText = "€" + v5_fmtPara.format(tEuro);
        document.getElementById('ui-total-tl').innerText = "₺" + v5_fmtPara.format(tTL);
    }

    function v5_tetikleyiciPortfoy() {
        let promptVal = prompt("Yeni Sanofi hisse adedini giriniz:", v5_hisseAdedi);
        if (promptVal !== null && promptVal.trim() !== "") {
            promptVal = promptVal.replace(',', '.');
            const parsed = parseFloat(promptVal);
            if (!isNaN(parsed) && parsed >= 0) {
                v5_hisseAdedi = parsed;
                v5_arayuzHesapla();
            } else {
                alert("Lütfen geçerli bir sayısal değer belirtin.");
            }
        }
    }

    function v5_zamanGuncelle() {
        const simdi = new Date();
        const saat = String(simdi.getHours()).padStart(2, '0');
        const dakika = String(simdi.getMinutes()).padStart(2, '0');
        const saniye = String(simdi.getSeconds()).padStart(2, '0');
        document.getElementById('last-update-time').innerText = saat + ":" + dakika + ":" + saniye;
    }

    async function v5_veriMerkezi() {
        try {
            const fxFetch = await fetch('https://api.exchangerate-api.com/v4/latest/EUR');
            const fxData = await fxFetch.json();
            v5_euroKuru = fxData.rates.TRY;

            const stFetch = await fetch('https://api.marketstack.com/v1/eod/latest?access_key=BURAYA_MARKETSTACK_ANAHTARI_GELECEK&symbols=SAN.XPAR');

            if (stFetch.ok) {
                const stData = await stFetch.json();
                if (stData && stData.data && stData.data.length > 0) {
                    v5_sanofiFiyati = stData.data[0].close;
                    const cTrend = stData.data.slice(0, 7).map(item => item.close).reverse();
                    if(cTrend.length > 1) v5_trendVerisi = cTrend;
                }
            }

            document.getElementById('sanofi-price-box').innerText = "€" + v5_fmtPara.format(v5_sanofiFiyati);
            document.getElementById('euro-price-box').innerText = "₺" + v5_fmtPara.format(v5_euroKuru);
            
            v5_arayuzHesapla();
            v5_zamanGuncelle();

            const f0 = v5_trendVerisi[0];
            const f1 = v5_trendVerisi[v5_trendVerisi.length - 1];
            const diff = ((f1 - f0) / f0) * 100;
            const bElement = document.getElementById('trend-badge');
            
            if(diff >= 0) {
                bElement.innerText = "+" + diff.toFixed(2) + "% ↑";
                bElement.style.color = '#10b981';
                bElement.style.background = 'rgba(16, 185, 129, 0.1)';
            } else {
                bElement.innerText = diff.toFixed(2) + "% ↓";
                bElement.style.color = '#ef4444';
                bElement.style.background = 'rgba(239, 68, 68, 0.1)';
            }

            v5_grafikCizici(v5_trendVerisi);

        } catch (err) {
            // Hata durumunda korumalı mod verileri aktarılır
            document.getElementById('sanofi-price-box').innerText = "€" + v5_fmtPara.format(v5_sanofiFiyati);
            document.getElementById('euro-price-box').innerText = "₺" + v5_fmtPara.format(v5_euroKuru);
            document.getElementById('trend-badge').innerText = "%0,00";
            document.getElementById('trend-badge').style.color = '#94a3b8';
            
            v5_arayuzHesapla();
            v5_zamanGuncelle();
            v5_grafikCizici(v5_trendVerisi);
        }
    }

    // İlk Çalıştırma Komutları
    v5_veriMerkezi();
    
    // Her 5 dakikada bir (300.000 ms) arka planda otomatik yenileme
    setInterval(v5_veriMerkezi, 300000);
    
    window.addEventListener('resize', () => {
        v5_grafikCizici(v5_trendVerisi);
    });
</script>

</body>
</html>
