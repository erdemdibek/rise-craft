<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takip</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start; /* Sola hizalama için */
            height: 100vh;
            padding-left: 10%; /* Mobilde şık durması için soldan boşluk */
            font-size: 2.2rem;
            font-weight: bold;
            color: #111;
        }
        div {
            margin: 15px 0;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div id="sanofi-alani">Sanofi : Yükleniyor...</div>
<div id="eur-alani">Euro/Tl : Yükleniyor...</div>

<script>
    async function verileriGetir() {
        try {
            // 1. Sanofi Güncel Hisse Fiyatı (Euro bazında - Paris Borsası)
            const sanofiRes = await fetch('https://query1.finance.yahoo.com/v8/finance/chart/SAN.PA');
            const sanofiData = await sanofiRes.json();
            const sanofiPrice = sanofiData.chart.result[0].meta.regularMarketPrice;

            // 2. Güncel Euro/TL Kuru
            const forexRes = await fetch('https://open.er-api.com/v6/latest/EUR');
            const forexData = await forexRes.json();
            const eurTryRate = forexData.rates.TRY;

            // Tam istediğin formatta ekrana yazdırma
            document.getElementById('sanofi-alani').innerText = `Sanofi : €${sanofiPrice.toFixed(2)}`;
            document.getElementById('eur-alani').innerText = `Euro/Tl : ₺${eurTryRate.toFixed(4)}`;

        } catch (error) {
            // Bağlantı hatası olursa veya borsa verisi anlık gecikirse tarayıcı engeline karşı yedek gösterim
            document.getElementById('sanofi-alani').innerText = "Sanofi : Veri alınamadı";
            document.getElementById('eur-alani').innerText = "Euro/Tl : Veri alınamadı";
        }
    }

    verileriGetir();
</script>

</body>
</html>
