<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sanofi Hisse Takip</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            user-select: none; 
        }
        
        /* Ekranı dikeyde tam kapla ve taşmayı engelle */
        html, body { 
            height: 100%; 
            width: 100%; 
            overflow: hidden;
            background-color: #070a12; 
        }

        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 12px;
        }

        /* Tüm uygulama konteyneri mobil ekran boyutuna kilitlendi */
        .app-container { 
            width: 100%; 
            max-width: 400px; 
            height: 100%;
            max-height: 92vh; /* Telefonlardaki alt/üst barlar için emniyet payı */
            background: linear-gradient(145deg, #0f1626 0%, #0b0f19 100%); 
            border-radius: 24px; 
            padding: 18px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.04); 
            display: flex;
            flex-direction: column; /* İçerikleri dikeyde hizala */
        }
        
        /* HEADER */
        .header { 
            text-align: center; 
            margin-bottom: 14px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.06); 
            padding-bottom: 10px;
            flex-shrink: 0; /* Boyutunun küçülmesini engelle */
        }
        .header h1 { font-size: 1.05rem; color: #fff; font-weight: 700; }
        .header p { font-size: 0.72rem; color: #38bdf8; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }

        /* ÖZET KARTLARI */
        .summary-card { 
            background: rgba(30, 41, 59, 0.3); 
            border: 1px solid rgba(255, 255, 255, 0.04); 
            border-radius: 14px; 
            padding: 12px; 
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .grid-cards {
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 8px;
            flex-shrink: 0;
        }
        .label { font-size: 0.68rem; color: #64748b; text-transform: uppercase; font-weight: 600; }
        .value { font-size: 1.25rem; font-weight: 800; margin-top: 2px; }
        .color-total { color: #ffffff; }
        .color-paid { color: #10b981; }
        .color-remaining { color: #f59e0b; }

        /* İLERLEME ÇUBUĞU */
        .progress-container { 
            margin: 10px 0; 
            flex-shrink: 0;
        }
        .progress-bar-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
        .progress-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #10b981, #3b82f6); transition: width 0.5s ease; }
        .progress-text { display: flex; justify-content: space-between; font-size: 0.7rem; color: #94a3b8; margin-top: 4px; font-weight: 600; }

        /* AY LİSTESİ (Sadece burası kaydırılabilir) */
        .list-wrapper {
            flex: 1; /* Kalan tüm dikey alanı bu listeye ver */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .list-title { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; font-weight: 600; }
        .history-list { 
            flex: 1;
            overflow-y: auto; /* Dikey kaydırmayı sadece listede aktif et */
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            padding-right: 2px;
            -webkit-overflow-scrolling: touch; /* Mobil akıcı kaydırma */
        }
        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
        
        .month-row { display: flex; justify-content: space-between; background: rgba(255,255,255,0.02); padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.01); }
        .month-name { font-weight: 600; color: #cbd5e1; }
        .month-val { font-family: monospace; font-weight: 700; color: #fff; }

        /* YENİ AY EKLEME FORMU */
        .add-form { 
            padding-top: 12px; 
            border-top: 1px dashed rgba(255, 255, 255, 0.1); 
            display: flex; 
            gap: 6px; 
            flex-shrink: 0;
        }
        .add-form input, .add-form select { background: #111827; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; color: #fff; padding: 10px; font-size: 0.85rem; outline: none; }
        .add-form select { flex: 1.2; }
        .add-form input { flex: 1; font-family: monospace; text-align: right; }
        .add-btn { background: #38bdf8; color: #070a12; border: none; padding: 0 14px; border-radius: 8px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Sanofi Hisse Hakları</h1>
        <p>88 Adet Hisse - Kesinti Takibi</p>
    </div>

    <div class="summary-card">
        <div class="label">Toplam Sözleşme Tutarı</div>
        <div class="value color-total" id="ui-toplam-odenecek">₺274.008,00</div>
    </div>

    <div class="grid-cards">
        <div class="summary-card">
            <div class="label">Toplam Ödenen</div>
            <div class="value color-paid" id="ui-toplam-odenen">₺0,00</div>
        </div>
        <div class="summary-card">
            <div class="label">Kalan Net Borç</div>
            <div class="value color-remaining" id="ui-kalan-borc">₺0,00</div>
        </div>
    </div>

    <div class="progress-container">
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="ui-progress-fill"></div>
        </div>
        <div class="progress-text">
            <span>Ödeme İlerlemesi</span>
            <span id="ui-progress-percent">%0</span>
        </div>
    </div>

    <div class="list-wrapper">
        <div class="list-title">Maaş Kesinti Geçmişi</div>
        <div class="history-list" id="ui-history-list">
            <!-- JS dinamik dolduracak -->
        </div>
    </div>

    <div class="add-form">
        <select id="input-ay">
            <option value="TEMMUZ">TEMMUZ</option>
            <option value="AĞUSTOS">AĞUSTOS</option>
            <option value="EYLÜL">EYLÜL</option>
            <option value="EKİM">EKİM</option>
            <option value="KASIM">KASIM</option>
            <option value="ARALIK">ARALIK</option>
            <option value="OCAK">OCAK</option>
            <option value="ŞUBAT">ŞUBAT</option>
            <option value="MART">MART</option>
            <option value="NİSAN">NİSAN</option>
            <option value="MAYIS">MAYIS</option>
            <option value="HAZİRAN">HAZİRAN</option>
        </select>
        <input type="number" id="input-tutar" placeholder="Tutar (TL)" inputmode="numeric">
        <button class="add-btn" onclick="v10_yeniAyEkle()">Ekle</button>
    </div>
</div>

<script>
    const v10_sabitToplamBorc = 274008;

    let v10_kesintiVerileri = [
        { ay: "TEMMUZ", tutar: 8383 },
        { ay: "AĞUSTOS", tutar: 11707 },
        { ay: "EYLÜL", tutar: 11308 },
        { ay: "EKİM", tutar: 6566 },
        { ay: "KASIM", tutar: 8418 },
        { ay: "ARALIK", tutar: 10168 },
        { ay: "OCAK", tutar: 9090 },
        { ay: "ŞUBAT", tutar: 9431 },
        { ay: "MART", tutar: 16632 },
        { ay: "NİSAN", tutar: 7854 },
        { ay: "MAYIS", tutar: 8426 },
        { ay: "HAZİRAN", tutar: 17603 }
    ];

    const v10_fmtTL = new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY', minimumFractionDigits: 0, maximumFractionDigits: 0 });

    function v10_paneliGuncelle() {
        const toplamOdenen = v10_kesintiVerileri.reduce((sum, item) => sum + item.tutar, 0);
        const kalanBorc = v10_sabitToplamBorc - toplamOdenen;
        const odemeYuzdesi = (toplamOdenen / v10_sabitToplamBorc) * 100;

        document.getElementById('ui-toplam-odenen').innerText = v10_fmtTL.format(toplamOdenen);
        document.getElementById('ui-kalan-borc').innerText = v10_fmtTL.format(kalanBorc >= 0 ? kalanBorc : 0);
        
        document.getElementById('ui-progress-fill').style.width = `${Math.min(odemeYuzdesi, 100)}%`;
        document.getElementById('ui-progress-percent').innerText = `%${odemeYuzdesi.toFixed(1)}`;

        const listContainer = document.getElementById('ui-history-list');
        listContainer.innerHTML = "";
        
        v10_kesintiVerileri.forEach(item => {
            const row = document.createElement('div');
            row.className = 'month-row';
            row.innerHTML = `
                <span class="month-name">${item.ay}</span>
                <span class="month-val">${v10_fmtTL.format(item.tutar)}</span>
            `;
            listContainer.appendChild(row);
        });
        
        // Yeni veri eklendikten sonra listeyi otomatik olarak en güncel aya (en aşağıya) odaklar
        setTimeout(() => {
            listContainer.scrollTop = listContainer.scrollHeight;
        }, 50);
    }

    function v10_yeniAyEkle() {
        const aySelect = document.getElementById('input-ay');
        const tutarInput = document.getElementById('input-tutar');

        const secilenAy = aySelect.value;
        const girilenTutar = parseFloat(tutarInput.value);

        if (isNaN(girilenTutar) || girilenTutar <= 0) {
            alert("Lütfen geçerli bir kesinti tutarı giriniz.");
            return;
        }

        v10_kesintiVerileri.push({ ay: secilenAy, tutar: girilenTutar });
        tutarInput.value = "";
        v10_paneliGuncelle();
    }

    v10_paneliGuncelle();
</script>

</body>
</html>
