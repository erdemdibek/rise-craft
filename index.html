<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Gerçek Zamanlı Finans Paneli</title>
    <style>
        body { background: #070a12; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .panel { width: 100%; max-width: 400px; background: #111; padding: 20px; border-radius: 20px; }
        .data-val { font-size: 1.8rem; font-weight: bold; color: #38bdf8; margin: 10px 0; }
        .trend-box { height: 100px; background: #1a1f2e; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="panel">
    <h3>Sanofi (SAN.PA) & Euro Takip</h3>
    <div id="sanofi-price" class="data-val">Yükleniyor...</div>
    <div id="euro-price" class="data-val" style="color: #10b981;">Yükleniyor...</div>
    <div class="trend-box" id="chart"></div>
</div>

<script>
    // Verileri hafızada tutan dizi
    let priceHistory = [];

    async function fetchData() {
        // Cache bypass için dinamik timestamp
        const url = `https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v7/finance/quote?symbols=SAN.PA,EURTRY=X')}&t=${Date.now()}`;
        
        try {
            const res = await fetch(url);
            const data = JSON.parse((await res.json()).contents);
            const quotes = data.quoteResponse.result;

            const sanofi = quotes.find(q => q.symbol === 'SAN.PA').regularMarketPrice;
            const euro = quotes.find(q => q.symbol === 'EURTRY=X').regularMarketPrice;

            document.getElementById('sanofi-price').innerText = `€${sanofi.toFixed(2)}`;
            document.getElementById('euro-price').innerText = `₺${euro.toFixed(2)}`;

            // Trend hafızası
            priceHistory.push(sanofi);
            if (priceHistory.length > 10) priceHistory.shift();
            
        } catch (e) {
            console.error("Veri akış hatası");
        }
    }

    // Her 15 saniyede bir otomatik ve güncel veri
    setInterval(fetchData, 15000);
    fetchData();
</script>
</body>
</html>
