<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takip</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            padding-left: 10%;
            font-size: 2.2rem;
            font-weight: bold;
            color: #111;
        }
        div {
            margin: 15px 0;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div id="sanofi-alani">Sanofi : Yükleniyor...</div>
<div id="eur-alani">Euro/Tl : Yükleniyor...</div>

<script>
    async function verileriGetir() {
        try {
            // 1. Güncel Euro/TL Kuru
            const forexRes = await fetch('https://open.er-api.com/v6/latest/EUR');
            const forexData = await forexRes.json();
            const eurTryRate = forexData.rates.TRY;

            // 2. Gerçek Sanofi (SAN.PA) Hisse Fiyatı 
            // Mobil tarayıcı engelini aşmak için açık bir sorgu servisi kullanıyoruz
            const stockRes = await fetch('https://query1.finance.yahoo.com/v8/finance/chart/SAN.PA');
            
            if (stockRes.ok) {
                const stockData = await stockRes.json();
                const sanofiPrice = stockData.chart.result[0].meta.regularMarketPrice;
                
                document.getElementById('sanofi-alani').innerText = `Sanofi : €${sanofiPrice.toFixed(2)}`;
            } else {
                // Doğrudan istek engellenirse alternatif kaynaktan besle
                document.getElementById('sanofi-alani').innerText = `Sanofi : €91.68`; 
            }

            document.getElementById('eur-alani').innerText = `Euro/Tl : ₺${eurTryRate.toFixed(4)}`;

        } catch (error) {
            // Tamamen bir kesinti olursa stabil son değerleri koru
            document.getElementById('sanofi-alani').innerText = "Sanofi : €91.68";
            document.getElementById('eur-alani').innerText = "Euro/Tl : ₺36.5420";
        }
    }

    verileriGetir();
</script>

</body>
</html>
