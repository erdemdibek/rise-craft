<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanofi Hisse Borç Takip Paneli</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; user-select: none; }
        body { background-color: #070a12; color: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
        .app-container { width: 100%; max-width: 420px; background: linear-gradient(145deg, #0f1626 0%, #0b0f19 100%); border-radius: 24px; padding: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.04); }
        
        /* HEADER */
        .header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.06); padding-bottom: 14px; }
        .header h1 { font-size: 1.1rem; color: #fff; font-weight: 700; }
        .header p { font-size: 0.75rem; color: #38bdf8; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }

        /* ÖZET KARTLARI */
        .summary-card { background: rgba(30, 41, 59, 0.3); border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
        .label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; font-weight: 600; }
        .value { font-size: 1.5rem; font-weight: 800; margin-top: 4px; }
        .color-total { color: #ffffff; }
        .color-paid { color: #10b981; }
        .color-remaining { color: #f59e0b; text-shadow: 0 0 10px rgba(245, 158, 11, 0.2); }

        /* İLERLEME ÇUBUĞU */
        .progress-container { margin: 16px 0; }
        .progress-bar-bg { width: 100%; height: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; overflow: hidden; }
        .progress-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #10b981, #3b82f6); transition: width 0.5s ease; }
        .progress-text { display: flex; justify-content: space-between; font-size: 0.75rem; color: #94a3b8; margin-top: 6px; font-weight: 600; }

        /* AY LİSTESİ */
        .list-title { font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }
        .history-list { max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 4px; }
        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
        .month-row { display: flex; justify-content: space-between; background: rgba(255,255,255,0.02); padding: 10px 14px; border-radius: 10px; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.01); }
        .month-name { font-weight: 600; color: #cbd5e1; }
        .month-val { font-family: monospace; font-weight: 700; color: #fff; }

        /* YENİ AY EKLEME FORMU */
        .add-form { margin-top: 20px; padding-top: 16px; border-top: 1px dashed rgba(255, 255, 255, 0.1); display: flex; gap: 8px; }
        .add-form input, .add-form select { background: #111827; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: #fff; padding: 10px; font-size: 0.85rem; outline: none; }
        .add-form select { flex: 1.2; }
        .add-form input { flex: 1; font-family: monospace; text-align: right; }
        .add-btn { background: #38bdf8; color: #070a12; border: none; padding: 0 16px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .add-btn:hover { background: #0ea5e9; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Sanofi Hisse Hakları</h1>
        <p>88 Adet Hisse - Maaş Kesinti Takibi</p>
    </div>

    <!-- ÖZET BİLGİLER -->
    <div class="summary-card">
        <div class="label">Toplam Sözleşme Tutarı</div>
        <div class="value color-total" id="ui-toplam-odenecek">₺274.008,00</div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="summary-card">
            <div class="label">Toplam Ödenen</div>
            <div class="value color-paid" id="ui-toplam-odenen">₺0,00</div>
        </div>
        <div class="summary-card">
            <div class="label">Kalan Net Borç</div>
            <div class="value color-remaining" id="ui-kalan-borc">₺0,00</div>
        </div>
    </div>

    <!-- İLERLEME BAR BAR -->
    <div class="progress-container">
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="ui-progress-fill"></div>
        </div>
        <div class="progress-text">
            <span>Ödeme İlerlemesi</span>
            <span id="ui-progress-percent">%0</span>
        </div>
    </div>

    <!-- AY LİSTESİ -->
    <div class="list-title">Maaş Kesinti Geçmişi</div>
    <div class="history-list" id="ui-history-list">
        <!-- Javascript dinamik dolduracak -->
    </div>

    <!-- YENİ AY EKLEME -->
    <div class="add-form">
        <select id="input-ay">
            <option value="TEMMUZ">TEMMUZ</option>
            <option value="AĞUSTOS">AĞUSTOS</option>
            <option value="EYLÜL">EYLÜL</option>
            <option value="EKİM">EKİM</option>
            <option value="KASIM">KASIM</option>
            <option value="ARALIK">ARALIK</option>
            <option value="OCAK">OCAK</option>
            <option value="ŞUBAT">ŞUBAT</option>
            <option value="MART">MART</option>
            <option value="NİSAN">NİSAN</option>
            <option value="MAYIS">MAYIS</option>
            <option value="HAZİRAN">HAZİRAN</option>
        </select>
        <input type="number" id="input-tutar" placeholder="Tutar (TL)" min="0">
        <button class="add-btn" onclick="v9_yeniAyEkle()">Ekle</button>
    </div>
</div>

<script>
    const v9_sabitToplamBorc = 274008;

    // Mevcut ödediğiniz verilerle sistemi başlatıyoruz
    let v9_kesintiVerileri = [
        { ay: "TEMMUZ", tutar: 8383 },
        { ay: "AĞUSTOS", tutar: 11707 },
        { ay: "EYLÜL", tutar: 11308 },
        { ay: "EKİM", tutar: 6566 },
        { ay: "KASIM", tutar: 8418 },
        { ay: "ARALIK", tutar: 10168 },
        { ay: "OCAK", tutar: 9090 },
        { ay: "ŞUBAT", tutar: 9431 },
        { ay: "MART", tutar: 16632 },
        { ay: "NİSAN", tutar: 7854 },
        { ay: "MAYIS", tutar: 8426 },
        { ay: "HAZİRAN", tutar: 17603 }
    ];

    const v9_fmtTL = new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY' });

    function v9_paneliGuncelle() {
        // 1. Toplam ödenen miktarı diziden hesapla
        const toplamOdenen = v9_kesintiVerileri.reduce((sum, item) => sum + item.tutar, 0);
        const kalanBorc = v9_sabitToplamBorc - toplamOdenen;
        const odemeYuzdesi = (toplamOdenen / v9_sabitToplamBorc) * 100;

        // 2. Arayüzü Giydir
        document.getElementById('ui-toplam-odenen').innerText = v9_fmtTL.format(toplamOdenen);
        document.getElementById('ui-kalan-borc').innerText = v9_fmtTL.format(kalanBorc >= 0 ? kalanBorc : 0);
        
        // Bar ve yüzde güncelleme
        document.getElementById('ui-progress-fill').style.width = `${Math.min(odemeYuzdesi, 100)}%`;
        document.getElementById('ui-progress-percent').innerText = `%${odemeYuzdesi.toFixed(1)}`;

        // 3. Listeyi Yeniden Bas
        const listContainer = document.getElementById('ui-history-list');
        listContainer.innerHTML = "";
        
        v9_kesintiVerileri.forEach(item => {
            const row = document.createElement('div');
            row.className = 'month-row';
            row.innerHTML = `
                <span class="month-name">${item.ay}</span>
                <span class="month-val">${v9_fmtTL.format(item.tutar)}</span>
            `;
            listContainer.appendChild(row);
        });
        
        // Listenin en altına otomatik kaydır
        listContainer.scrollTop = listContainer.scrollHeight;
    }

    function v9_yeniAyEkle() {
        const aySelect = document.getElementById('input-ay');
        const tutarInput = document.getElementById('input-tutar');

        const secilenAy = aySelect.value;
        const girilenTutar = parseFloat(tutarInput.value);

        if (isNaN(girilenTutar) || girilenTutar <= 0) {
            alert("Lütfen geçerli bir kesinti tutarı giriniz.");
            return;
        }

        // Listeye ekle
        v9_kesintiVerileri.push({ ay: secilenAy, tutar: girilenTutar });
        
        // Inputu temizle
        tutarInput.value = "";
        
        // Ekranı tazele
        v9_paneliGuncelle();
    }

    // İlk Çalıştırma
    v9_paneliGuncelle();
</script>

</body>
</html>
