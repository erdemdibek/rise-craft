<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rise Online Mobile Craft</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: radial-gradient(circle at top, #111827 0%, #030712 100%);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        /* Glassmorphism ve premium gölgeler */
        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen pb-24 selection:bg-amber-500 selection:text-black">

    <header class="glass-panel border-b border-gray-800/60 sticky top-0 z-50 shadow-lg">
        <div class="max-w-md mx-auto px-5 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-gradient-to-br from-amber-500 to-orange-600 text-black p-2 rounded-xl shadow-[0_0_15px_rgba(245,158,11,0.3)] flex items-center justify-center w-9 h-9">
                    <i class="fa-solid fa-gavel text-sm"></i>
                </div>
                <div>
                    <h1 class="text-xs font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-white via-gray-200 to-gray-400 uppercase">RISE CRAFT</h1>
                    <p class="text-[9px] text-amber-500 font-extrabold tracking-widest uppercase">Companion v2.0</p>
                </div>
            </div>
            <div class="bg-black/40 border border-gray-800/80 rounded-xl px-3 py-1.5 shadow-inner">
                <p id="gm-status" class="text-[11px] font-black tracking-wide text-amber-400">Hesaplanıyor...</p>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-5 space-y-5">
        
        <div>
            <div class="flex items-center justify-between mb-3 px-1">
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse"></span> Zanaat Meslekleri
                </p>
            </div>
            <div id="professions-grid" class="grid grid-cols-2 gap-2.5">
                <!-- JavaScript tarafından dinamik doldurulur -->
            </div>
        </div>

        <!-- Bonus Seçim Alanı ve Hesaplayıcı app.js tarafından bu panele enjekte edilir -->
        <div id="active-detail-panel" class="hidden"></div>

    </main>

    <div class="fixed bottom-0 left-0 right-0 glass-panel border-t border-gray-800/80 py-3.5 px-4 z-40 shadow-[0_-10px_25px_rgba(0,0,0,0.5)]">
        <div class="max-w-md mx-auto">
            <div id="gm-bar-container">
                <!-- JavaScript tarafından dinamik doldurulur -->
            </div>
        </div>
    </div>

    <!-- Modül mimarisi aktif -->
    <script type="module" src="app.js"></script>
</body>
</html>
