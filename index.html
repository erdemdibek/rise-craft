<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finans Takip Paneli</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a; /* Gece mavisi arka plan */
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 480px;
            background: #1e293b; /* Kart arka planı */
            border-radius: 24px;
            padding: 30px 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            border: 1px solid #334155;
        }
        .market-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .card {
            background: #111827;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid #1f2937;
        }
        .card-label {
            font-size: 0.85rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }
        .card-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #38bdf8; /* Açık mavi vurgu */
        }
        #eur-alani {
            color: #34d399; /* Euro için yeşil vurgu */
        }
        .welcome-box {
            background: linear-gradient(135deg, #1e1b4b 0%, #311042 100%);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #4338ca;
            line-height: 1.6;
        }
        .welcome-text {
            font-size: 1.05rem;
            color: #cbd5e1;
            font-weight: 400;
        }
        .welcome-text strong {
            color: #ffffff;
            font-weight: 600;
        }
        .value-highlight {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="market-grid">
        <div class="card">
            <div class="card-label">Sanofi (Hisse)</div>
            <div id="sanofi-alani" class="card-value">...</div>
        </div>
        <div class="card">
            <div class="card-label">Euro / TL</div>
            <div id="eur-alani" class="card-value">...</div>
        </div>
    </div>

    <div class="welcome-box">
        <div id="mesaj-alani" class="welcome-text">Veriler hesaplanıyor...</div>
    </div>
</div>

<script>
    async function verileriGetir() {
        const hisseAdedi = 92.8769;

        try {
            // 1. Euro/TL Kuru
            const forexRes = await fetch('https://api.exchangerate-api.com/v4/latest/EUR');
            const forexData = await forexRes.json();
            const eurTryRate = forexData.rates.TRY;

            // 2. Sanofi Hisse Fiyatı
            const stockRes = await fetch('https://api.marketstack.com/v1/eod/latest?access_key=fca7b64082msh63b514e865f2425p1b089ajsn7b570cb1e6a2&symbols=SAN.XPAR');
            
            let sanofiPrice = 75.07;

            if (stockRes.ok) {
                const stockData = await stockRes.json();
                if (stockData && stockData.data && stockData.data[0]) {
                    sanofiPrice = stockData.data[0].close;
                }
            }

            const toplamEuro = hisseAdedi * sanofiPrice;
            const toplamTL = toplamEuro * eurTryRate;

            // Arayüzü Güncelleme
            document.getElementById('sanofi-alani').innerText = `€${sanofiPrice.toFixed(2)}`;
            document.getElementById('eur-alani').innerText = `₺${eurTryRate.toFixed(4)}`;
            
            document.getElementById('mesaj-alani').innerHTML = `Merhaba Erdem Bey, <strong>92.8769</strong> adet Sanofi hissenizin anlık Euro değeri <span class="value-highlight">€${toplamEuro.toFixed(2)}</span>, anlık TL değeri ise <span class="value-highlight">₺${toplamTL.toFixed(2)}</span> dir.`;

        } catch (error) {
            // Yedek Plan
            const yedekEuro = hisseAdedi * 75.07;
            const yedekTL = yedekEuro * 35.2150;

            document.getElementById('sanofi-alani').innerText = "€75.07";
            document.getElementById('eur-alani').innerText = "₺35.2150";
            document.getElementById('mesaj-alani').innerHTML = `Merhaba Erdem Bey, <strong>92.8769</strong> adet Sanofi hissenizin anlık Euro değeri <span class="value-highlight">€${yedekEuro.toFixed(2)}</span>, anlık TL değeri ise <span class="value-highlight">₺${yedekTL.toFixed(2)}</span> dir.`;
        }
    }

    verileriGetir();
</script>

</body>
</html>
