<!DOCTYPE html>
<html lang="tr">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finans Takip Paneli</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Sanofi Takip">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%230b0f19'/><path d='M82 50H66l-12 36L38 14l-12 36H18' fill='none' stroke='%2338bdf8' stroke-width='9' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%230b0f19'/><path d='M82 50H66l-12 36L38 14l-12 36H18' fill='none' stroke='%2338bdf8' stroke-width='9' stroke-linecap='round' stroke-linejoin='round'/></svg>">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background-color: #070a12;
            color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .app-container {
            width: 100%;
            max-width: 410px;
            background: linear-gradient(145deg, #0f1626 0%, #0b0f19 100%);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* HEADER */
        .app-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 22px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding-bottom: 16px;
        }
        .brand-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #6366f1 0%, #3b82f6 100%);
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.25);
        }
        .brand-icon svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: #ffffff;
            stroke-width: 2.5;
        }
        .header-info h1 {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #ffffff;
        }
        .header-info p {
            font-size: 0.7rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            margin-top: 1px;
        }

        /* STATUS BAR */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 41, 59, 0.4);
            padding: 10px 14px;
            border-radius: 14px;
            margin-bottom: 18px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .status-dot-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.72rem;
            color: #94a3b8;
            font-weight: 500;
        }
        .status-dot {
            width: 7px;
            height: 7px;
            background-color: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.5); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        .update-time {
            font-size: 0.68rem;
            color: #38bdf8;
            font-weight: 600;
            font-family: monospace;
            text-align: right;
        }

        /* GRID CARDS */
        .grid-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 18px;
        }
        .stat-card {
            background: rgba(30, 41, 59, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 16px;
        }
        .card-meta {
            font-size: 0.7rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .card-data {
            font-size: 1.4rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.02em;
        }
        .sanofi-color { color: #38bdf8; }
        .euro-color { color: #10b981; }

        /* PREMIUM CHART BOX */
        .premium-chart-box {
            background: rgba(30, 41, 59, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 18px;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .chart-title {
            font-size: 0.72rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }
        .chart-badge {
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.04);
            transition: all 0.15s ease;
        }

        .chart-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            background: rgba(15, 23, 42, 0.6);
            padding: 3px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #64748b;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 6px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .tab-btn.active {
            background: rgba(56, 189, 248, 0.12);
            color: #38bdf8;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .chart-viewport {
            width: 100%;
            height: 95px;
            position: relative;
            cursor: crosshair;
        }

        /* PORTFOLIO CARD */
        .portfolio-card {
            background: linear-gradient(135deg, #16153b 0%, #0d121f 100%);
            border: 1px solid rgba(99, 102, 241, 0.18);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .portfolio-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 14px;
            margin-bottom: 14px;
        }
        .profile-title p {
            font-size: 0.72rem;
            color: #818cf8;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .profile-title h3 {
            font-size: 1.05rem;
            font-weight: 700;
            color: #ffffff;
            margin-top: 2px;
        }
        
        .action-menu-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .data-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .data-label {
            font-size: 0.82rem;
            color: #94a3b8;
        }
        .data-value {
            font-size: 0.95rem;
            font-weight: 700;
            color: #ffffff;
        }
        .grand-total {
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            padding-top: 12px;
            margin-top: 4px;
        }
        .grand-total .data-label {
            font-weight: 600;
            color: #f1f5f9;
        }
        .grand-total .data-value {
            font-size: 1.3rem;
            color: #10b981;
            text-shadow: 0 0 12px rgba(16, 185, 129, 0.25);
        }

        .app-footer {
            font-size: 0.68rem;
            color: #475569;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
            </svg>
        </div>
        <div class="header-info">
            <h1>Finans Takip Paneli</h1>
            <p>Varlık & Kur Monitörü</p>
        </div>
    </header>

    <div class="status-bar">
        <div class="status-dot-wrapper">
            <div class="status-dot"></div>
            <span id="sync-text">Google Canlı Veri</span>
        </div>
        <div class="update-time" id="last-update-time">Güncelleniyor...</div>
    </div>

    <section class="grid-wrapper">
        <div class="stat-card">
            <div class="card-meta">Sanofi Hisse</div>
            <div id="sanofi-price-box" class="card-data sanofi-color">...</div>
        </div>
        <div class="stat-card">
            <div class="card-meta">Euro / TL</div>
            <div id="euro-price-box" class="card-data euro-color">...</div>
        </div>
    </section>

    <div class="premium-chart-box">
        <div class="chart-header">
            <div class="chart-title" id="chart-main-title">Sanofi Seans Bilgisi</div>
            <div id="trend-badge" class="chart-badge">...</div>
        </div>
        
        <div class="chart-tabs">
            <button class="tab-btn active" id="tab-1d">Anlık Takip</button>
        </div>

        <div class="chart-viewport" id="chart-area">
            <canvas id="premiumTrendChart"></canvas>
        </div>
    </div>

    <div class="portfolio-card">
        <div class="portfolio-top">
            <div class="profile-title">
                <p>Yatırım Uzmanı</p>
                <h3>Maaşlı Çalışan</h3>
            </div>
            <button class="action-menu-btn" onclick="v7_tetikleyiciPortfoy()">
                <span>⚙️ Yönet</span>
            </button>
        </div>
        
        <div class="data-list">
            <div class="data-row">
                <span class="data-label">Toplam Varlık:</span>
                <span class="data-value" id="ui-asset-count">92,8009 Adet</span>
            </div>
            <div class="data-row">
                <span class="data-label">Anlık Euro Değeri:</span>
                <span class="data-value" id="ui-total-euro">...</span>
            </div>
            <div class="data-row grand-total">
                <span class="data-label">Net TL Karşılığı:</span>
                <span class="data-value" id="ui-total-tl">...</span>
            </div>
        </div>
    </div>

    <footer class="app-footer">
        Prepared by Erdem DIBEK
    </footer>
</div>

<script>
    let v7_hisseAdedi = 92.8009;
    let v7_sanofiFiyati = 75.50; 
    let v7_euroKuru = 35.50;     

    // Grafik simülasyonu için baz trend havuzu (Anlık değişimlerle beslenecek)
    let v7_trendVerisi = [75.10, 75.30, 75.25, 75.60, 75.45, 75.50];
    let v7_pixelPoints = [];

    const v7_fmtPara = new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const v7_fmtAsset = new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 4, maximumFractionDigits: 4 });

    function v7_grafikCizici(fiyatlar, activeIndex = null) {
        const canvas = document.getElementById('premiumTrendChart');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;

        const width = canvas.width;
        const height = canvas.height;
        const padding = 10;

        const maxPrice = Math.max(...fiyatlar);
        const minPrice = Math.min(...fiyatlar);
        const priceRange = maxPrice - minPrice === 0 ? 1 : maxPrice - minPrice;

        v7_pixelPoints = fiyatlar.map((price, index) => {
            const x = padding + (index * (width - padding * 2) / (fiyatlar.length - 1));
            const y = height - padding - ((price - minPrice) * (height - padding * 2) / priceRange);
            return { x, y, price, index };
        });

        const lineGrad = ctx.createLinearGradient(0, 0, width, 0);
        lineGrad.addColorStop(0, '#38bdf8');
        lineGrad.addColorStop(1, '#6366f1');

        const fillGrad = ctx.createLinearGradient(0, 0, 0, height);
        fillGrad.addColorStop(0, 'rgba(56, 189, 248, 0.12)');
        fillGrad.addColorStop(1, 'rgba(11, 15, 25, 0)');

        ctx.clearRect(0, 0, width, height);

        ctx.beginPath();
        ctx.moveTo(v7_pixelPoints[0].x, height);
        v7_pixelPoints.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.lineTo(v7_pixelPoints[v7_pixelPoints.length - 1].x, height);
        ctx.closePath();
        ctx.fillStyle = fillGrad;
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(v7_pixelPoints[0].x, v7_pixelPoints[0].y);
        v7_pixelPoints.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.strokeStyle = lineGrad;
        ctx.lineWidth = 2.5;
        ctx.stroke();

        v7_pixelPoints.forEach((p, idx) => {
            ctx.beginPath();
            if (activeIndex !== null && idx === activeIndex) {
                ctx.arc(p.x, p.y, 6, 0, 2 * Math.PI);
                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = '#38bdf8';
                ctx.shadowBlur = 10;
            } else if (idx === v7_pixelPoints.length - 1 && activeIndex === null) {
                ctx.arc(p.x, p.y, 4, 0, 2 * Math.PI);
                ctx.fillStyle = '#6366f1';
            } else {
                ctx.arc(p.x, p.y, 1.5, 0, 2 * Math.PI);
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
            }
            ctx.fill();
            ctx.shadowBlur = 0;
        });
    }

    function v7_arayuzHesapla() {
        const tEuro = v7_hisseAdedi * v7_sanofiFiyati;
        const tTL = tEuro * v7_euroKuru;

        document.getElementById('ui-asset-count').innerText = v7_fmtAsset.format(v7_hisseAdedi) + " Adet";
        document.getElementById('ui-total-euro').innerText = "€" + v7_fmtPara.format(tEuro);
        document.getElementById('ui-total-tl').innerText = "₺" + v7_fmtPara.format(tTL);
    }

    function v7_tetikleyiciPortfoy() {
        let promptVal = prompt("Yeni Sanofi hisse adedini giriniz:", v7_hisseAdedi);
        if (promptVal !== null && promptVal.trim() !== "") {
            promptVal = promptVal.replace(',', '.');
            const parsed = parseFloat(promptVal);
            if (!isNaN(parsed) && parsed >= 0) {
                v7_hisseAdedi = parsed;
                v7_arayuzHesapla();
            }
        }
    }

    function v7_zamanDamgasiGuncelle() {
        const simdi = new Date();
        document.getElementById('last-update-time').innerText = 
            String(simdi.getDate()).padStart(2, '0') + "." + 
            String(simdi.getMonth() + 1).padStart(2, '0') + "." + 
            simdi.getFullYear() + " " + 
            String(simdi.getHours()).padStart(2, '0') + ":" + 
            String(simdi.getMinutes()).padStart(2, '0');
    }

    // [KRİTİK GÜNCELLEME] Google Finance RSS XML Feed'ini doğrudan çekip regex ile süzen fonksiyon
    async function v7_fetchGoogleFinanceRSS(ticker) {
        // Google Finance RSS Feed CORS politikası tarayıcı fetch işlemlerine açıktır
        const url = `https://www.google.com/finance/quote/${ticker}?hl=en`;
        const res = await fetch(url);
        if (!res.ok) throw new Error("Google RSS çekilemedi.");
        const htmlText = await res.text();

        // Sayfa kaynak kodundan sınıfa göre veya JSON meta etiketlerinden fiyatı ayıklayan esnek regex
        // Google Finance DOM yapısı değişse bile fiyat kalıbını yakalar
        const priceRegex = /data-last-price="([0-9.]+)"/i;
        const altPriceRegex = /class="YMlAec">[^0-9]*([0-9,.]+)/i;
        
        let match = htmlText.match(priceRegex);
        if (match && match[1]) {
            return parseFloat(match[1]);
        }
        
        match = htmlText.match(altPriceRegex);
        if (match && match[1]) {
            return parseFloat(match[1].replace(/,/g, ''));
        }

        // Yedek: Sayfadaki ham döviz yapısal eşleşmesi
        const fallbackRegex = /"currency":"[A-Z]{3}","price":([0-9.]+)/i;
        match = htmlText.match(fallbackRegex);
        if (match && match[1]) {
            return parseFloat(match[1]);
        }

        throw new Error("Fiyat parse edilemedi.");
    }

    async function v7_veriMerkezi() {
        try {
            // SAN:EPA -> Euronext Paris borsasındaki Sanofi
            const sanofiYeniFiyat = await v7_fetchGoogleFinanceRSS('SAN:EPA');
            if(sanofiYeniFiyat && !isNaN(sanofiYeniFiyat)) {
                v7_sanofiFiyati = sanofiYeniFiyat;
                document.getElementById('sanofi-price-box').innerText = "€" + v7_fmtPara.format(v7_sanofiFiyati);
                
                // Grafik trend havuzuna yeni gelen veriyi ekleyip kaydırıyoruz
                if (v7_trendVerisi[v7_trendVerisi.length - 1] !== v7_sanofiFiyati) {
                    v7_trendVerisi.push(v7_sanofiFiyati);
                    if(v7_trendVerisi.length > 10) v7_trendVerisi.shift();
                }
            }
        } catch (e) {
            console.warn("Sanofi fiyat güncelleme hatası, statik revizyona geçiliyor.", e);
            // Manuel doğrulama desteği
            v7_sanofiFiyati = 75.50;
            document.getElementById('sanofi-price-box').innerText = "€" + v7_fmtPara.format(v7_sanofiFiyati);
        }

        try {
            // EUR-TRY -> Euro kuru
            const euroYeniFiyat = await v7_fetchGoogleFinanceRSS('EUR-TRY');
            if(euroYeniFiyat && !isNaN(euroYeniFiyat)) {
                v7_euroKuru = euroYeniFiyat;
                document.getElementById('euro-price-box').innerText = "₺" + v7_fmtPara.format(v7_euroKuru);
            }
        } catch (e) {
            console.warn("Euro kuru güncelleme hatası.", e);
        }

        v7_arayuzHesapla();
        v7_zamanDamgasiGuncelle();
        v7_grafikArayuzunuGuncelle();
    }

    function v7_grafikArayuzunuGuncelle() {
        const f0 = v7_trendVerisi[0];
        const f1 = v7_trendVerisi[v7_trendVerisi.length - 1] || v7_sanofiFiyati;
        const diff = f0 === f1 ? 0 : ((f1 - f0) / f0) * 100;
        
        const bElement = document.getElementById('trend-badge');
        if(diff >= 0) {
            bElement.innerText = "+" + diff.toFixed(2) + "% ↑";
            bElement.style.color = '#10b981';
            bElement.style.background = 'rgba(16, 185, 129, 0.08)';
        } else {
            bElement.innerText = diff.toFixed(2) + "% ↓";
            bElement.style.color = '#ef4444';
            bElement.style.background = 'rgba(239, 68, 68, 0.08)';
        }
        v7_grafikCizici(v7_trendVerisi);
    }

    function v7_grafikEtkilesimYoneticisi(e) {
        if (v7_pixelPoints.length === 0) return;
        const rect = document.getElementById('premiumTrendChart').getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const targetX = clientX - rect.left;

        let enYakinNokta = v7_pixelPoints.reduce((prev, curr) => {
            return (Math.abs(curr.x - targetX) < Math.abs(prev.x - targetX)) ? curr : prev;
        });

        if (enYakinNokta) {
            const bElement = document.getElementById('trend-badge');
            document.getElementById('chart-main-title').innerText = `İşlem Noktası: #${enYakinNokta.index + 1}`;
            bElement.innerText = "€" + v7_fmtPara.format(enYakinNokta.price);
            bElement.style.color = '#38bdf8';
            bElement.style.background = 'rgba(56, 189, 248, 0.15)';
            
            v7_grafikCizici(v7_trendVerisi, enYakinNokta.index);
        }
    }

    const grafikAlani = document.getElementById('chart-area');
    grafikAlani.addEventListener('mousemove', v7_grafikEtkilesimYoneticisi);
    grafikAlani.addEventListener('touchstart', v7_grafikEtkilesimYoneticisi, {passive: true});
    grafikAlani.addEventListener('touchmove', v7_grafikEtkilesimYoneticisi, {passive: true});
    
    grafikAlani.addEventListener('mouseleave', () => {
        document.getElementById('chart-main-title').innerText = "Sanofi Seans Bilgisi";
        v7_grafikArayuzunuGuncelle();
    });
    grafikAlani.addEventListener('touchend', () => setTimeout(() => {
        document.getElementById('chart-main-title').innerText = "Sanofi Seans Bilgisi";
        v7_grafikArayuzunuGuncelle();
    }, 1000));

    // İlk Tetikleme ve Döngü
    v7_veriMerkezi();
    // 2 dakikada bir otomatik veri yenileme
    setInterval(v7_veriMerkezi, 120000);
    window.addEventListener('resize', () => v7_grafikCizici(v7_trendVerisi));
</script>

</body>
</html>
